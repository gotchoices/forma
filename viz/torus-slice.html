<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Torus Slicer — totu viz</title>
<link rel="stylesheet" href="totu-viz.css">
<style>
.lbl { color: #777; }
.v { color: #4fc3f7; font-weight: 700; }
#info-panel {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(10,10,18,0.9); padding: 8px 18px; border-radius: 8px;
  backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.06);
  font-size: 11px; display: flex; gap: 18px; white-space: nowrap;
  pointer-events: none; z-index: 10;
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>Torus Slicer</h1><div class="sep"></div>

  <div class="cg">
    <label>a/R</label>
    <input type="range" id="sl-ar" min="0.1" max="3.0" step="0.01" value="0.34">
    <span class="val" id="v-ar">0.34</span>
  </div>
  <div class="cg" style="gap:3px">
    <button class="btn on" data-ar="0.34">R8</button>
    <button class="btn" data-ar="1.00">Horn</button>
    <button class="btn" data-ar="0.50">Ring</button>
  </div><div class="sep"></div>

  <button class="btn on" id="btn-play">▶ Play</button>
  <div class="cg">
    <label>Period</label>
    <input type="range" id="sl-period" min="0.5" max="15" step="0.1" value="4.0">
    <span class="val" id="v-period">4.0s</span>
  </div><div class="sep"></div>

  <div class="cg">
    <label>Slice</label>
    <input type="range" id="sl-pos" min="-1" max="1" step="0.005" value="0">
    <span class="val" id="v-pos">0.00</span>
  </div><div class="sep"></div>

  <div class="tog"><label><input type="checkbox" id="t-surf" checked> Surface</label></div>
  <div class="tog"><label><input type="checkbox" id="t-wire" checked> Wire</label></div>
  <div class="tog"><label><input type="checkbox" id="t-plane" checked> Plane</label></div>
  <div class="tog"><label><input type="checkbox" id="t-fill" checked> Fill</label></div>
  <div class="tog"><label><input type="checkbox" id="t-outline" checked> Outline</label></div>
</div>

<div class="view-full" id="view">
  <div id="info-panel">
    <div><span class="lbl">a/R = </span><span class="v" id="i-ar">0.34</span></div>
    <div><span class="lbl">y/a = </span><span class="v" id="i-y">0.000</span></div>
    <div><span class="lbl">R<sub>out</sub> = </span><span class="v" id="i-rout">—</span></div>
    <div><span class="lbl">R<sub>in</sub> = </span><span class="v" id="i-rin">—</span></div>
    <div><span class="lbl">Width = </span><span class="v" id="i-w">—</span></div>
  </div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}}
</script>
<script type="module">
import {
  THREE, createScene, autoResize, buildTorusGeom,
  torusMaterials, PALETTE
} from './totu-viz.js';

const $ = id => document.getElementById(id);
const R = 1.0, FIT = 2.2;

const S = {
  aR: 0.34, period: 4.0, playing: true,
  showSurf: true, showWire: true, showPlane: true,
  showFill: true, showOutline: true,
};

const { scene, camera, renderer, controls, clock } = createScene($('view'), {
  camPos: [2.5, 2.0, 3.0],
});
autoResize(renderer, camera, $('view'));

const world = new THREE.Group();
scene.add(world);

const mats = torusMaterials({ opacity: 0.15, wireOpacity: 0.04 });
let surfMesh, wireMesh;

const planeMat = new THREE.MeshBasicMaterial({
  color: 0xffaa44, transparent: true, opacity: 0.08,
  side: THREE.DoubleSide, depthWrite: false,
});
let planeMesh;

const fillMat = new THREE.MeshBasicMaterial({
  color: 0xff6e40, transparent: true, opacity: 0.5,
  side: THREE.DoubleSide, depthWrite: false,
});
const outlineMat = new THREE.LineBasicMaterial({
  color: 0xff6e40, linewidth: 2,
});
const outlineInnerMat = new THREE.LineBasicMaterial({
  color: 0x66bb6a, linewidth: 2,
});

const sliceGroup = new THREE.Group();
world.add(sliceGroup);

/* ── Build torus surface ──────────────────────────────── */
function rebuildSurface() {
  if (surfMesh) { surfMesh.geometry.dispose(); world.remove(surfMesh); }
  if (wireMesh) { wireMesh.geometry.dispose(); world.remove(wireMesh); }
  if (planeMesh) { planeMesh.geometry.dispose(); world.remove(planeMesh); }

  const a = S.aR * R;
  const gs = FIT / (R + a);
  world.scale.setScalar(gs);

  surfMesh = new THREE.Mesh(buildTorusGeom(R, a), mats.surface);
  wireMesh = new THREE.Mesh(buildTorusGeom(R, a, 24, 48), mats.wire);
  surfMesh.visible = S.showSurf;
  wireMesh.visible = S.showWire;
  world.add(surfMesh, wireMesh);

  const planeSize = 2 * (R + a) * 1.4;
  const pg = new THREE.PlaneGeometry(planeSize, planeSize);
  pg.rotateX(-Math.PI / 2);
  planeMesh = new THREE.Mesh(pg, planeMat);
  planeMesh.visible = S.showPlane;
  world.add(planeMesh);
}

/* ── Build cross-section at height y0 ─────────────────── */
function buildSlice(y0) {
  sliceGroup.clear();
  const a = S.aR * R;

  if (Math.abs(y0) > a) return;

  const span = Math.sqrt(Math.max(0, a * a - y0 * y0));
  const outerR = R + span;
  const innerR = Math.max(0, R - span);

  if (planeMesh) planeMesh.position.y = y0;

  if (S.showFill) {
    const rg = new THREE.RingGeometry(innerR, outerR, 128);
    rg.rotateX(-Math.PI / 2);
    const mesh = new THREE.Mesh(rg, fillMat);
    mesh.position.y = y0;
    sliceGroup.add(mesh);
  }

  if (S.showOutline) {
    const makeCircle = (radius, mat) => {
      const pts = [];
      for (let i = 0; i <= 128; i++) {
        const angle = (2 * Math.PI * i) / 128;
        pts.push(new THREE.Vector3(radius * Math.cos(angle), 0, radius * Math.sin(angle)));
      }
      const g = new THREE.BufferGeometry().setFromPoints(pts);
      const line = new THREE.Line(g, mat);
      line.position.y = y0;
      return line;
    };
    sliceGroup.add(makeCircle(outerR, outlineMat));
    if (innerR > 0.001) sliceGroup.add(makeCircle(innerR, outlineInnerMat));
  }

  $('i-rout').textContent = outerR.toFixed(3);
  $('i-rin').textContent = innerR > 0.001 ? innerR.toFixed(3) : '0';
  $('i-w').textContent = (outerR - innerR).toFixed(3);
  $('i-y').textContent = (y0 / a).toFixed(3);
}

function syncVis() {
  if (surfMesh) surfMesh.visible = S.showSurf;
  if (wireMesh) wireMesh.visible = S.showWire;
  if (planeMesh) planeMesh.visible = S.showPlane;
}

/* ── Controls ─────────────────────────────────────────── */
$('sl-ar').oninput = e => {
  S.aR = +e.target.value; $('v-ar').textContent = S.aR.toFixed(2);
  $('i-ar').textContent = S.aR.toFixed(2);
  document.querySelectorAll('[data-ar]').forEach(b => b.classList.remove('on'));
  rebuildSurface();
};

document.querySelectorAll('[data-ar]').forEach(btn => {
  btn.addEventListener('click', () => {
    S.aR = parseFloat(btn.dataset.ar);
    $('sl-ar').value = S.aR; $('v-ar').textContent = S.aR.toFixed(2);
    $('i-ar').textContent = S.aR.toFixed(2);
    document.querySelectorAll('[data-ar]').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    rebuildSurface();
  });
});

$('sl-period').oninput = e => {
  S.period = +e.target.value;
  $('v-period').textContent = S.period.toFixed(1) + 's';
};

$('sl-pos').oninput = e => {
  manualPos = +e.target.value;
  $('v-pos').textContent = manualPos.toFixed(2);
  if (!S.playing) {
    const a = S.aR * R;
    buildSlice(manualPos * a);
  }
};

let tAccum = 0, lastT = 0, manualPos = 0;

$('btn-play').addEventListener('click', () => {
  S.playing = !S.playing;
  const b = $('btn-play');
  b.textContent = S.playing ? '▶ Play' : '⏸ Pause';
  b.classList.toggle('on', S.playing);
  if (S.playing) lastT = clock.getElapsedTime();
});

const toggles = [
  ['t-surf', 'showSurf'], ['t-wire', 'showWire'], ['t-plane', 'showPlane'],
  ['t-fill', 'showFill'], ['t-outline', 'showOutline'],
];
toggles.forEach(([id, key]) => {
  $(id).addEventListener('change', e => { S[key] = e.target.checked; syncVis(); });
});

/* ── Animation ────────────────────────────────────────── */
rebuildSurface();

(function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const now = clock.getElapsedTime();
  if (S.playing) {
    tAccum += now - lastT;
    const a = S.aR * R;
    const phase = (tAccum / S.period) * 2 * Math.PI;
    const y0 = a * Math.sin(phase);
    buildSlice(y0);

    const normPos = y0 / a;
    $('sl-pos').value = normPos;
    $('v-pos').textContent = normPos.toFixed(2);
  }
  lastT = now;

  renderer.render(scene, camera);
})();

</script>
</body>
</html>
