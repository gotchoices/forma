<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geodesic Curvature — totu viz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e12;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;display:flex;flex-direction:column;height:100vh}
#bar{display:flex;align-items:center;gap:12px;padding:8px 14px;background:rgba(10,10,18,.95);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;flex-wrap:wrap}
#bar h1{font-size:14px;color:#aaa;font-weight:600}
.g{display:flex;align-items:center;gap:5px}
.g label{font-size:10.5px;color:#777;white-space:nowrap}
.g .v{color:#4fc3f7;font-weight:700;font-size:11px;min-width:28px;text-align:right}
input[type=range]{-webkit-appearance:none;width:90px;height:4px;border-radius:3px;background:#2a2a3a;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#4fc3f7;cursor:pointer}
.b{background:#1e1e2e;border:1px solid #333;color:#999;padding:2px 7px;border-radius:4px;font-size:10px;cursor:pointer;white-space:nowrap}
.b:hover{background:#2a2a40;color:#ddd;border-color:#4fc3f7}
.b.on{background:#1a3050;border-color:#4fc3f7;color:#4fc3f7}
.bx.on{background:#301a1a;border-color:#ff5577;color:#ff5577}
.by.on{background:#1a3018;border-color:#55ff99;color:#55ff99}
.bz.on{background:#1a1a30;border-color:#5599ff;color:#5599ff}
.bw.on{background:#302818;border-color:#ffaa44;color:#ffaa44}
.sep{width:1px;height:20px;background:#333}
#view{flex:1;position:relative}
#info{position:absolute;bottom:10px;left:14px;font:11px/1.4 monospace;color:#444;pointer-events:none}
</style>
</head>
<body>

<div id="bar">
  <h1>Geodesic Curvature</h1><div class="sep"></div>
  <div class="g">
    <button class="b on" id="b3d">3D Spatial</button>
    <button class="b" id="b2t">2D + Time</button>
  </div><div class="sep"></div>
  <div class="g">
    <button class="b on" id="bGeo">Geodesics</button>
    <button class="b" id="bFld">Field lines</button>
  </div><div class="sep"></div>
  <div class="g">
    <label>Show</label>
    <button class="b bx on" id="bX">X</button>
    <button class="b by on" id="bY">Y</button>
    <button class="b bz on" id="bZ">Z</button>
    <button class="b bw on" id="bW" style="display:none">W</button>
  </div><div class="sep"></div>
  <div class="g">
    <label>r<sub>s</sub>/R</label>
    <input type="range" id="sC" min="0" max="1.8" step="0.01" value="0.3">
    <span class="v" id="vC">0.30</span>
    <button class="b" id="bG">G</button>
  </div><div class="sep"></div>
  <div class="g">
    <label>Sphere R</label>
    <input type="range" id="sSR" min="0.2" max="3.0" step="0.05" value="1.0">
    <span class="v" id="vSR">1.00</span>
  </div><div class="sep"></div>
  <div class="g">
    <label>Density</label>
    <input type="range" id="sD" min="4" max="28" step="1" value="14">
    <span class="v" id="vD">14</span>
  </div><div class="sep"></div>
  <div class="g">
    <label>Opacity</label>
    <input type="range" id="sO" min="0.02" max="0.5" step="0.01" value="0.12">
    <span class="v" id="vO">0.12</span>
  </div><div class="sep"></div>
  <button class="b" id="bR">Reset view</button>
</div>

<div id="view"></div>
<div id="info">drag to orbit · scroll to zoom · sphere = Compton zone boundary</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const $ = id => document.getElementById(id);
const P = {
  mode:'3d', viz:'geo', rs:0.3, den:14, gsz:8, opa:0.12, sR:1.0,
  showX:true, showY:true, showZ:true, showW:true
};

const box = $('view');
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(50, 1, 0.1, 200);
const ren = new THREE.WebGLRenderer({ antialias: true });
ren.setPixelRatio(Math.min(devicePixelRatio, 2));
box.appendChild(ren.domElement);
const ctl = new OrbitControls(cam, ren.domElement);
ctl.enableDamping = true;
ctl.dampingFactor = 0.08;
ctl.maxDistance = 60;
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dl = new THREE.DirectionalLight(0xffffff, 0.5);
dl.position.set(5, 8, 6);
scene.add(dl);

const gX = new THREE.Group();
const gY = new THREE.Group();
const gZ = new THREE.Group();
const gW = new THREE.Group();
const gZone = new THREE.Group();
scene.add(gX, gY, gZ, gW, gZone);

const axLen = P.gsz;
[[1,0,0,0xff4444],[0,1,0,0x44ff44],[0,0,1,0x4488ff]].forEach(([x,y,z,c]) => {
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(
    [-x*axLen,-y*axLen,-z*axLen, x*axLen,y*axLen,z*axLen], 3));
  scene.add(new THREE.Line(g, new THREE.LineBasicMaterial({
    color:c, transparent:true, opacity:0.15
  })));
});

/* ---------- zone (sphere / cylinder) ---------- */
function buildZone() {
  gZone.clear();
  if (P.mode === '3d') {
    const mat = new THREE.MeshPhysicalMaterial({
      color:0x88aacc, transparent:true, opacity:P.opa,
      roughness:0.3, side:THREE.DoubleSide, depthWrite:false
    });
    gZone.add(new THREE.Mesh(new THREE.SphereGeometry(P.sR, 48, 36), mat));
    gZone.add(new THREE.Mesh(
      new THREE.SphereGeometry(P.sR, 18, 14),
      new THREE.MeshBasicMaterial({
        color:0x5588aa, wireframe:true, transparent:true,
        opacity:Math.min(P.opa*2, 0.3)
      })
    ));
  } else {
    const h = P.gsz * 2;
    const mat = new THREE.MeshPhysicalMaterial({
      color:0xcc9966, transparent:true, opacity:P.opa,
      roughness:0.3, side:THREE.DoubleSide, depthWrite:false
    });
    const cm = new THREE.Mesh(
      new THREE.CylinderGeometry(P.sR, P.sR, h, 32, 1, true), mat);
    cm.position.y = h / 2;
    gZone.add(cm);
    const wm = new THREE.Mesh(
      new THREE.CylinderGeometry(P.sR, P.sR, h, 14, 1, true),
      new THREE.MeshBasicMaterial({
        color:0xaa8855, wireframe:true, transparent:true,
        opacity:Math.min(P.opa*2, 0.3)
      })
    );
    wm.position.y = h / 2;
    gZone.add(wm);
  }
}

/* ---------- geodesic acceleration ---------- */
// Schwarzschild spatial metric in isotropic coords:
//   dl² = Ψ⁴(dx²+dy²+dz²),  Ψ = 1 + m/ρ,  m = r_s/4
// Let Ω = Ψ² = (1+m/ρ)².  Geodesic equation:
//   ẍⁱ = Ω⁻¹ [ Ω,ⁱ |ẋ|² − 2(∇Ω·ẋ) ẋⁱ ]
function gAcc(px, py, pz, vx, vy, vz, m) {
  const r2 = px*px + py*py + pz*pz;
  const rho = Math.sqrt(r2);
  if (rho < 0.02) return [0, 0, 0];
  const mr = m / rho, op = 1 + mr;
  const inv = 1 / (op * op);
  const f = -2 * m * op / (r2 * rho);
  const gx = f*px, gy = f*py, gz = f*pz;
  const v2 = vx*vx + vy*vy + vz*vz;
  const gv = gx*vx + gy*vy + gz*vz;
  return [
    inv*(gx*v2 - 2*gv*vx),
    inv*(gy*v2 - 2*gv*vy),
    inv*(gz*v2 - 2*gv*vz)
  ];
}

/* ---------- trace spatial geodesic (RK4) ---------- */
function traceGeo(sx,sy,sz, dx,dy,dz, rs) {
  const m = rs/4, pts = [];
  const sR2 = P.sR*P.sR*1.02, G = P.gsz*1.05, H = 0.06;
  let px=sx, py=sy, pz=sz, vx=dx, vy=dy, vz=dz;

  for (let i = 0; i < 1200; i++) {
    const r2 = px*px + py*py + pz*pz;
    if (r2 < sR2) break;
    if (Math.abs(px)>G || Math.abs(py)>G || Math.abs(pz)>G) {
      pts.push(px,py,pz);
      break;
    }
    pts.push(px,py,pz);
    const rho = Math.sqrt(r2);
    const h = rho < P.sR*3 ? H*0.25 : H;

    const a1 = gAcc(px,py,pz, vx,vy,vz, m);
    const p2x=px+h*.5*vx,    p2y=py+h*.5*vy,    p2z=pz+h*.5*vz;
    const w2x=vx+h*.5*a1[0], w2y=vy+h*.5*a1[1], w2z=vz+h*.5*a1[2];
    const a2 = gAcc(p2x,p2y,p2z, w2x,w2y,w2z, m);
    const p3x=px+h*.5*w2x,   p3y=py+h*.5*w2y,   p3z=pz+h*.5*w2z;
    const w3x=vx+h*.5*a2[0], w3y=vy+h*.5*a2[1], w3z=vz+h*.5*a2[2];
    const a3 = gAcc(p3x,p3y,p3z, w3x,w3y,w3z, m);
    const p4x=px+h*w3x,      p4y=py+h*w3y,      p4z=pz+h*w3z;
    const w4x=vx+h*a3[0],    w4y=vy+h*a3[1],    w4z=vz+h*a3[2];
    const a4 = gAcc(p4x,p4y,p4z, w4x,w4y,w4z, m);

    px += h/6*(vx  + 2*w2x + 2*w3x + w4x);
    py += h/6*(vy  + 2*w2y + 2*w3y + w4y);
    pz += h/6*(vz  + 2*w2z + 2*w3z + w4z);
    vx += h/6*(a1[0]+2*a2[0]+2*a3[0]+a4[0]);
    vy += h/6*(a1[1]+2*a2[1]+2*a3[1]+a4[1]);
    vz += h/6*(a1[2]+2*a2[2]+2*a3[2]+a4[2]);
  }
  return pts;
}

/* ---------- line helpers ---------- */
function addLine(group, pts, color, alpha=0.55) {
  if (pts.length < 6) return;
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  group.add(new THREE.Line(g, new THREE.LineBasicMaterial({
    color, transparent:true, opacity:alpha
  })));
}

/* ---------- 3D spatial grid ---------- */
function build3D() {
  gX.clear(); gY.clear(); gZ.clear(); gW.clear();
  const rs = P.rs * P.sR, n = P.den, G = P.gsz, sp = G*2/n;
  const cols = [0xff5577, 0x55ff99, 0x5599ff];
  const groups = [gX, gY, gZ];
  const cutoff = P.sR*5 + rs*3;

  for (let dir = 0; dir < 3; dir++) {
    const c = cols[dir], grp = groups[dir];
    const d1 = (dir+1)%3, d2 = (dir+2)%3;
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        const u = -G + (i+.5)*sp, w = -G + (j+.5)*sp;
        const b = Math.sqrt(u*u + w*w);
        const s = [0,0,0]; s[dir]=-G; s[d1]=u; s[d2]=w;
        const e = [0,0,0]; e[dir]= G; e[d1]=u; e[d2]=w;

        if (rs < 0.001 || b > cutoff) {
          addLine(grp, [s[0],s[1],s[2], e[0],e[1],e[2]], c);
        } else {
          const d = [0,0,0]; d[dir]=1;
          const fwd = traceGeo(s[0],s[1],s[2], d[0],d[1],d[2], rs);
          addLine(grp, fwd, c);
          if (fwd.length >= 3) {
            const li = fwd.length;
            const lr = Math.sqrt(fwd[li-3]**2 + fwd[li-2]**2 + fwd[li-1]**2);
            if (lr < P.sR*1.3) {
              const rd = [0,0,0]; rd[dir]=-1;
              addLine(grp, traceGeo(e[0],e[1],e[2], rd[0],rd[1],rd[2], rs), c);
            }
          }
        }
      }
    }
  }
}

/* ---------- 2D+T worldlines ---------- */
function build2DT() {
  gX.clear(); gY.clear(); gZ.clear(); gW.clear();
  const rs = P.rs*P.sR, n = P.den, G = P.gsz, sp = G*2/n;
  const gm = rs/2, tMax = G*2, dt = 0.03;

  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const x0 = -G+(i+.5)*sp, z0 = -G+(j+.5)*sp;
      if (Math.sqrt(x0*x0+z0*z0) < P.sR*1.01) continue;
      const pts = [];
      let x=x0, z=z0, vx=0, vz=0;
      for (let t=0; t<tMax; t+=dt) {
        const r = Math.sqrt(x*x+z*z);
        if (r < P.sR) break;
        pts.push(x, t, z);
        if (gm > 1e-4) {
          const r3 = r*r*r;
          vx -= gm*x/r3*dt;
          vz -= gm*z/r3*dt;
        }
        x += vx*dt; z += vz*dt;
      }
      addLine(gW, pts, 0xffaa44, 0.4);
    }
  }

  const sCols = [0xff5577, 0x5599ff];
  const sGroups = [gX, gZ];
  const cutoff = P.sR*5 + rs*3;
  for (let dir = 0; dir < 2; dir++) {
    const axis = dir===0 ? 0 : 2, perp = dir===0 ? 2 : 0;
    for (let i = 0; i < n; i++) {
      const u = -G+(i+.5)*sp;
      const s = [0,0,0]; s[axis]=-G; s[perp]=u;
      const e = [0,0,0]; e[axis]= G; e[perp]=u;

      if (rs < 0.001 || Math.abs(u) > cutoff) {
        addLine(sGroups[dir], [s[0],0,s[2], e[0],0,e[2]], sCols[dir], 0.25);
      } else {
        const d = [0,0,0]; d[axis]=1;
        const fwd = traceGeo(s[0],0,s[2], d[0],0,d[2], rs);
        for (let k=1; k<fwd.length; k+=3) fwd[k]=0;
        addLine(sGroups[dir], fwd, sCols[dir], 0.25);
        if (Math.abs(u) < P.sR*1.5 && rs > 0.001) {
          const rd = [0,0,0]; rd[axis]=-1;
          const rev = traceGeo(e[0],0,e[2], rd[0],0,rd[2], rs);
          for (let k=1; k<rev.length; k+=3) rev[k]=0;
          addLine(sGroups[dir], rev, sCols[dir], 0.25);
        }
      }
    }
  }
}

/* ---------- 3D field lines ---------- */
function buildField3D() {
  gX.clear(); gY.clear(); gZ.clear(); gW.clear();
  const G = P.gsz;
  const nLines = P.den * P.den;
  const cols = [0xff5577, 0x55ff99, 0x5599ff];
  const groups = [gX, gY, gZ];
  const golden = (1 + Math.sqrt(5)) / 2;

  for (let i = 0; i < nLines; i++) {
    const theta = Math.acos(1 - 2 * (i + 0.5) / nLines);
    const phi = 2 * Math.PI * i / golden;
    const nx = Math.sin(theta) * Math.cos(phi);
    const ny = Math.sin(theta) * Math.sin(phi);
    const nz = Math.cos(theta);

    const sx = P.sR * nx, sy = P.sR * ny, sz = P.sR * nz;
    const maxAbs = Math.max(Math.abs(nx), Math.abs(ny), Math.abs(nz));
    const reach = G / maxAbs;
    const ex = reach * nx, ey = reach * ny, ez = reach * nz;

    const ax = Math.abs(nx), ay = Math.abs(ny), az = Math.abs(nz);
    const idx = (ax >= ay && ax >= az) ? 0 : (ay >= az) ? 1 : 2;
    addLine(groups[idx], [sx,sy,sz, ex,ey,ez], cols[idx], 0.5);
  }
}

/* ---------- 2D+T field lines ---------- */
function buildField2DT() {
  gX.clear(); gY.clear(); gZ.clear(); gW.clear();
  const G = P.gsz, n = P.den;
  const gm = (P.rs * P.sR) / 2, tMax = G * 2, dt = 0.03;

  // Worldlines (same as geo mode)
  const sp = G * 2 / n;
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const x0 = -G + (i + .5) * sp, z0 = -G + (j + .5) * sp;
      if (Math.sqrt(x0 * x0 + z0 * z0) < P.sR * 1.01) continue;
      const pts = [];
      let x = x0, z = z0, vx = 0, vz = 0;
      for (let t = 0; t < tMax; t += dt) {
        const r = Math.sqrt(x * x + z * z);
        if (r < P.sR) break;
        pts.push(x, t, z);
        if (gm > 1e-4) {
          const r3 = r * r * r;
          vx -= gm * x / r3 * dt;
          vz -= gm * z / r3 * dt;
        }
        x += vx * dt; z += vz * dt;
      }
      addLine(gW, pts, 0xffaa44, 0.4);
    }
  }

  // Radial field lines in XZ plane at y=0
  const nRays = P.den * 4;
  for (let i = 0; i < nRays; i++) {
    const angle = 2 * Math.PI * i / nRays;
    const nx = Math.cos(angle), nz = Math.sin(angle);
    const sx = P.sR * nx, sz = P.sR * nz;
    const reach = G / Math.max(Math.abs(nx), Math.abs(nz) || 1);
    const ex = reach * nx, ez = reach * nz;
    const idx = Math.abs(nx) >= Math.abs(nz) ? 0 : 1;
    addLine(idx === 0 ? gX : gZ,
      [sx, 0, sz, ex, 0, ez],
      idx === 0 ? 0xff5577 : 0x5599ff, 0.35);
  }
}

/* ---------- rebuild ---------- */
function rebuild() {
  buildZone();
  if (P.viz === 'geo') {
    if (P.mode === '3d') build3D(); else build2DT();
  } else {
    if (P.mode === '3d') buildField3D(); else buildField2DT();
  }
  syncVis();
}

function syncVis() {
  gX.visible = P.showX;
  gY.visible = P.showY;
  gZ.visible = P.showZ;
  gW.visible = P.showW;
}

/* ---------- camera presets ---------- */
function setCam3D()  { cam.position.set(8,6,10);  ctl.target.set(0,0,0); }
function setCam2DT() { cam.position.set(12,P.gsz,10); ctl.target.set(0,P.gsz*.5,0); }

/* ---------- UI ---------- */
$('b3d').onclick = () => {
  P.mode='3d'; $('b3d').classList.add('on'); $('b2t').classList.remove('on');
  $('bY').style.display=''; $('bW').style.display='none';
  setCam3D(); rebuild();
};
$('b2t').onclick = () => {
  P.mode='2dt'; $('b2t').classList.add('on'); $('b3d').classList.remove('on');
  $('bY').style.display='none'; $('bW').style.display='';
  setCam2DT(); rebuild();
};

$('bGeo').onclick = () => {
  P.viz='geo'; $('bGeo').classList.add('on'); $('bFld').classList.remove('on');
  rebuild();
};
$('bFld').onclick = () => {
  P.viz='field'; $('bFld').classList.add('on'); $('bGeo').classList.remove('on');
  rebuild();
};

function toggleAxis(key, btnId) {
  P[key] = !P[key];
  $(btnId).classList.toggle('on', P[key]);
  syncVis();
}
$('bX').onclick = () => toggleAxis('showX', 'bX');
$('bY').onclick = () => toggleAxis('showY', 'bY');
$('bZ').onclick = () => toggleAxis('showZ', 'bZ');
$('bW').onclick = () => toggleAxis('showW', 'bW');

$('bG').onclick = () => {
  $('sC').value=0.3; P.rs=0.3; $('vC').textContent='0.30'; rebuild();
};
$('bR').onclick = () => { P.mode==='3d' ? setCam3D() : setCam2DT(); };

$('sC').oninput = e => {
  P.rs = +e.target.value; $('vC').textContent = P.rs.toFixed(2); rebuild();
};
$('sSR').oninput = e => {
  P.sR = +e.target.value; $('vSR').textContent = P.sR.toFixed(2); rebuild();
};
$('sD').oninput = e => {
  P.den = +e.target.value; $('vD').textContent = P.den; rebuild();
};
$('sO').oninput = e => {
  P.opa = +e.target.value; $('vO').textContent = P.opa.toFixed(2); buildZone();
};

/* ---------- resize & render loop ---------- */
function onResize() {
  const w = box.clientWidth, h = box.clientHeight;
  cam.aspect = w/h; cam.updateProjectionMatrix();
  ren.setSize(w, h);
}
addEventListener('resize', onResize);
onResize();
setCam3D();
rebuild();

(function loop() {
  requestAnimationFrame(loop);
  ctl.update();
  ren.render(scene, cam);
})();
</script>
</body>
</html>
