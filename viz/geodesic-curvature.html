{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",

<script type="module">
import { THREE, OrbitControls } from './totu-viz.js';

const $ = id => document.getElementById(id);
const P = {
  mode:'3d', viz:'geo', shape:'sphere', rs:0.3, den:12, gsz:8,
  opa:0.12, sR:1.0, aR:0.3,
  showX:true, showY:true, showZ:true, showW:true
};

const box=$('view'), scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(50,1,0.1,200);
const ren=new THREE.WebGLRenderer({antialias:true});
ren.setPixelRatio(Math.min(devicePixelRatio,2));
box.appendChild(ren.domElement);
const ctl=new OrbitControls(cam,ren.domElement);
ctl.enableDamping=true; ctl.dampingFactor=0.08; ctl.maxDistance=60;
scene.add(new THREE.AmbientLight(0xffffff,0.5));
const dl=new THREE.DirectionalLight(0xffffff,0.5);
dl.position.set(5,8,6); scene.add(dl);

const gX=new THREE.Group(), gY=new THREE.Group();
const gZ=new THREE.Group(), gW=new THREE.Group();
const gZone=new THREE.Group();
scene.add(gX,gY,gZ,gW,gZone);

const axL=P.gsz;
[[1,0,0,0xff4444],[0,1,0,0x44ff44],[0,0,1,0x4488ff]].forEach(([x,y,z,c])=>{
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(
    [-x*axL,-y*axL,-z*axL,x*axL,y*axL,z*axL],3));
  scene.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:c,transparent:true,opacity:0.15})));
});

/* ===== TORUS MASS ELEMENTS ===== */
let tEl = []; // flat [x,y,z, x,y,z, ...]
function genTorus() {
  tEl = [];
  const R=P.sR, a=P.sR*P.aR, nP=20, nT=10;
  for(let i=0;i<nP;i++){
    const phi=2*Math.PI*i/nP, cp=Math.cos(phi), sp=Math.sin(phi);
    for(let j=0;j<nT;j++){
      const th=2*Math.PI*j/nT, ct=Math.cos(th), st=Math.sin(th);
      const rr=R+a*ct;
      tEl.push(rr*cp, a*st, rr*sp); // torus in XZ plane, axis=Y
    }
  }
}

function inTorus(px,py,pz){
  const R=P.sR, a=P.sR*P.aR;
  const d=Math.sqrt(px*px+pz*pz), dr=d-R;
  return dr*dr+py*py < a*a*1.04;
}

/* ===== ZONE MESH ===== */
function buildZone(){
  gZone.clear();
  const mat=new THREE.MeshPhysicalMaterial({
    color:P.shape==='torus'?0x99aa88:0x88aacc, transparent:true, opacity:P.opa,
    roughness:0.3, side:THREE.DoubleSide, depthWrite:false
  });
  const wmat=new THREE.MeshBasicMaterial({
    color:P.shape==='torus'?0x77aa66:0x5588aa, wireframe:true, transparent:true,
    opacity:Math.min(P.opa*2,0.3)
  });
  if(P.mode==='3d'){
    if(P.shape==='sphere'){
      gZone.add(new THREE.Mesh(new THREE.SphereGeometry(P.sR,48,36),mat));
      gZone.add(new THREE.Mesh(new THREE.SphereGeometry(P.sR,18,14),wmat));
    } else {
      const tg=new THREE.TorusGeometry(P.sR,P.sR*P.aR,16,32);
      tg.rotateX(Math.PI/2);
      gZone.add(new THREE.Mesh(tg,mat));
      const tw=new THREE.TorusGeometry(P.sR,P.sR*P.aR,8,16);
      tw.rotateX(Math.PI/2);
      gZone.add(new THREE.Mesh(tw,wmat));
    }
  } else {
    const h=P.gsz*2;
    const tMat=new THREE.MeshPhysicalMaterial({
      color:0xcc9966, transparent:true, opacity:P.opa,
      roughness:0.3, side:THREE.DoubleSide, depthWrite:false
    });
    const cm=new THREE.Mesh(new THREE.CylinderGeometry(P.sR,P.sR,h,32,1,true),tMat);
    cm.position.y=h/2; gZone.add(cm);
    const wm=new THREE.Mesh(new THREE.CylinderGeometry(P.sR,P.sR,h,14,1,true),
      new THREE.MeshBasicMaterial({color:0xaa8855,wireframe:true,transparent:true,opacity:Math.min(P.opa*2,0.3)}));
    wm.position.y=h/2; gZone.add(wm);
  }
}

/* ===== ACCELERATION: SPHERE (Schwarzschild conformal) ===== */
function gAccS(px,py,pz,vx,vy,vz,m){
  const r2=px*px+py*py+pz*pz, rho=Math.sqrt(r2);
  if(rho<0.02) return [0,0,0];
  const mr=m/rho,op=1+mr,inv=1/(op*op);
  const f=-2*m*op/(r2*rho);
  const ox=f*px,oy=f*py,oz=f*pz;
  const v2=vx*vx+vy*vy+vz*vz, ov=ox*vx+oy*vy+oz*vz;
  return [inv*(ox*v2-2*ov*vx),inv*(oy*v2-2*ov*vy),inv*(oz*v2-2*ov*vz)];
}

/* ===== ACCELERATION: TORUS (Brill-Lindquist multi-source conformal) ===== */
function gAccT(px,py,pz,vx,vy,vz,mTot){
  const N=tEl.length/3, me=mTot/N;
  let psi=1, dpx=0,dpy=0,dpz=0;
  for(let k=0;k<tEl.length;k+=3){
    const dx=px-tEl[k],dy=py-tEl[k+1],dz=pz-tEl[k+2];
    const r2=dx*dx+dy*dy+dz*dz, r=Math.sqrt(r2);
    if(r<0.03) continue;
    const r3=r2*r;
    psi+=me/r; dpx-=me*dx/r3; dpy-=me*dy/r3; dpz-=me*dz/r3;
  }
  const om=psi*psi, inv=1/om;
  const ox=2*psi*dpx,oy=2*psi*dpy,oz=2*psi*dpz;
  const v2=vx*vx+vy*vy+vz*vz, ov=ox*vx+oy*vy+oz*vz;
  return [inv*(ox*v2-2*ov*vx),inv*(oy*v2-2*ov*vy),inv*(oz*v2-2*ov*vz)];
}

function gAccFn(px,py,pz,vx,vy,vz,m){
  return P.shape==='sphere' ? gAccS(px,py,pz,vx,vy,vz,m) : gAccT(px,py,pz,vx,vy,vz,m);
}

/* ===== COLLISION CHECK ===== */
function hitZone(px,py,pz){
  if(P.shape==='sphere') return px*px+py*py+pz*pz < P.sR*P.sR*1.02;
  return inTorus(px,py,pz);
}

/* ===== TRACE SPATIAL GEODESIC (RK4) ===== */
function traceGeo(sx,sy,sz,dx,dy,dz,rs){
  const m=rs/4, pts=[], G=P.gsz*1.05, H=0.06;
  let px=sx,py=sy,pz=sz,vx=dx,vy=dy,vz=dz;
  for(let i=0;i<1200;i++){
    if(hitZone(px,py,pz)) break;
    if(Math.abs(px)>G||Math.abs(py)>G||Math.abs(pz)>G){pts.push(px,py,pz);break;}
    pts.push(px,py,pz);
    const rho=Math.sqrt(px*px+py*py+pz*pz);
    const h=rho<P.sR*3?H*0.25:H;
    const a1=gAccFn(px,py,pz,vx,vy,vz,m);
    const p2x=px+h*.5*vx,p2y=py+h*.5*vy,p2z=pz+h*.5*vz;
    const w2x=vx+h*.5*a1[0],w2y=vy+h*.5*a1[1],w2z=vz+h*.5*a1[2];
    const a2=gAccFn(p2x,p2y,p2z,w2x,w2y,w2z,m);
    const p3x=px+h*.5*w2x,p3y=py+h*.5*w2y,p3z=pz+h*.5*w2z;
    const w3x=vx+h*.5*a2[0],w3y=vy+h*.5*a2[1],w3z=vz+h*.5*a2[2];
    const a3=gAccFn(p3x,p3y,p3z,w3x,w3y,w3z,m);
    const p4x=px+h*w3x,p4y=py+h*w3y,p4z=pz+h*w3z;
    const w4x=vx+h*a3[0],w4y=vy+h*a3[1],w4z=vz+h*a3[2];
    const a4=gAccFn(p4x,p4y,p4z,w4x,w4y,w4z,m);
    px+=h/6*(vx+2*w2x+2*w3x+w4x);
    py+=h/6*(vy+2*w2y+2*w3y+w4y);
    pz+=h/6*(vz+2*w2z+2*w3z+w4z);
    vx+=h/6*(a1[0]+2*a2[0]+2*a3[0]+a4[0]);
    vy+=h/6*(a1[1]+2*a2[1]+2*a3[1]+a4[1]);
    vz+=h/6*(a1[2]+2*a2[2]+2*a3[2]+a4[2]);
  }
  return pts;
}

/* ===== TRACE FIELD LINE (follows ∇Ψ outward from surface) ===== */
function traceFieldT(sx,sy,sz,mTot){
  const N=tEl.length/3, me=mTot/N, pts=[];
  const G=P.gsz*1.05, h=0.1;
  let px=sx,py=sy,pz=sz;
  for(let i=0;i<400;i++){
    if(Math.abs(px)>G||Math.abs(py)>G||Math.abs(pz)>G){pts.push(px,py,pz);break;}
    pts.push(px,py,pz);
    let fx=0,fy=0,fz=0;
    for(let k=0;k<tEl.length;k+=3){
      const dx=px-tEl[k],dy=py-tEl[k+1],dz=pz-tEl[k+2];
      const r2=dx*dx+dy*dy+dz*dz,r=Math.sqrt(r2);
      if(r<0.03) continue;
      const r3=r2*r;
      fx-=me*dx/r3; fy-=me*dy/r3; fz-=me*dz/r3;
    }
    const fm=Math.sqrt(fx*fx+fy*fy+fz*fz);
    if(fm<1e-10) break;
    px-=h*fx/fm; py-=h*fy/fm; pz-=h*fz/fm;
  }
  return pts;
}

/* ===== LINE HELPER ===== */
function addLine(group,pts,color,alpha=0.55){
  if(pts.length<6) return;
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  group.add(new THREE.Line(g,new THREE.LineBasicMaterial({color,transparent:true,opacity:alpha})));
}

/* ===== 3D GEODESIC GRID ===== */
function build3D(){
  gX.clear();gY.clear();gZ.clear();gW.clear();
  const rs=P.rs*P.sR, n=P.den, G=P.gsz, sp=G*2/n;
  const cols=[0xff5577,0x55ff99,0x5599ff], groups=[gX,gY,gZ];
  const extent=P.shape==='sphere'?P.sR:P.sR*(1+P.aR);
  const cutoff=extent*5+rs*3;
  for(let dir=0;dir<3;dir++){
    const c=cols[dir],grp=groups[dir],d1=(dir+1)%3,d2=(dir+2)%3;
    for(let i=0;i<n;i++) for(let j=0;j<n;j++){
      const u=-G+(i+.5)*sp, w=-G+(j+.5)*sp, b=Math.sqrt(u*u+w*w);
      const s=[0,0,0]; s[dir]=-G; s[d1]=u; s[d2]=w;
      const e=[0,0,0]; e[dir]=G; e[d1]=u; e[d2]=w;
      if(rs<0.001||b>cutoff){
        addLine(grp,[s[0],s[1],s[2],e[0],e[1],e[2]],c);
      } else {
        const d=[0,0,0]; d[dir]=1;
        const fwd=traceGeo(s[0],s[1],s[2],d[0],d[1],d[2],rs);
        addLine(grp,fwd,c);
        if(fwd.length>=3){
          const li=fwd.length;
          const lr=Math.sqrt(fwd[li-3]**2+fwd[li-2]**2+fwd[li-1]**2);
          if(lr<extent*1.3){
            const rd=[0,0,0]; rd[dir]=-1;
            addLine(grp,traceGeo(e[0],e[1],e[2],rd[0],rd[1],rd[2],rs),c);
          }
        }
      }
    }
  }
}

/* ===== 2D+T WORLDLINES ===== */
function build2DT(){
  gX.clear();gY.clear();gZ.clear();gW.clear();
  const rs=P.rs*P.sR, n=P.den, G=P.gsz, sp=G*2/n;
  const mTot=rs/4, tMax=G*2, dt=0.03;
  for(let i=0;i<n;i++) for(let j=0;j<n;j++){
    const x0=-G+(i+.5)*sp, z0=-G+(j+.5)*sp;
    if(hitZone(x0,0,z0)) continue;
    const pts=[]; let x=x0,z=z0,vx=0,vz=0;
    for(let t=0;t<tMax;t+=dt){
      if(hitZone(x,0,z)) break;
      pts.push(x,t,z);
      if(mTot>1e-5){
        let ax=0,az=0;
        if(P.shape==='sphere'){
          const r=Math.sqrt(x*x+z*z), r3=r*r*r;
          ax=-rs/2*x/r3; az=-rs/2*z/r3;
        } else {
          const N=tEl.length/3, me=mTot/N;
          for(let k=0;k<tEl.length;k+=3){
            const dx=x-tEl[k],dz=z-tEl[k+2];
            const dy=0-tEl[k+1];
            const r2=dx*dx+dy*dy+dz*dz,r=Math.sqrt(r2);
            if(r<0.03) continue;
            const r3=r2*r;
            ax-=me*dx/r3; az-=me*dz/r3;
          }
        }
        vx+=ax*dt; vz+=az*dt;
      }
      x+=vx*dt; z+=vz*dt;
    }
    addLine(gW,pts,0xffaa44,0.4);
  }
  const sCols=[0xff5577,0x5599ff], sGroups=[gX,gZ];
  const extent=P.shape==='sphere'?P.sR:P.sR*(1+P.aR);
  const cutoff=extent*5+rs*3;
  for(let dir=0;dir<2;dir++){
    const axis=dir===0?0:2, perp=dir===0?2:0;
    for(let i=0;i<n;i++){
      const u=-G+(i+.5)*sp;
      const s=[0,0,0]; s[axis]=-G; s[perp]=u;
      const e=[0,0,0]; e[axis]=G; e[perp]=u;
      if(rs<0.001||Math.abs(u)>cutoff){
        addLine(sGroups[dir],[s[0],0,s[2],e[0],0,e[2]],sCols[dir],0.25);
      } else {
        const d=[0,0,0]; d[axis]=1;
        const fwd=traceGeo(s[0],0,s[2],d[0],0,d[2],rs);
        for(let k=1;k<fwd.length;k+=3) fwd[k]=0;
        addLine(sGroups[dir],fwd,sCols[dir],0.25);
        if(Math.abs(u)<extent*1.5&&rs>0.001){
          const rd=[0,0,0]; rd[axis]=-1;
          const rev=traceGeo(e[0],0,e[2],rd[0],0,rd[2],rs);
          for(let k=1;k<rev.length;k+=3) rev[k]=0;
          addLine(sGroups[dir],rev,sCols[dir],0.25);
        }
      }
    }
  }
}

/* ===== 3D FIELD LINES ===== */
function buildField3D(){
  gX.clear();gY.clear();gZ.clear();gW.clear();
  const G=P.gsz, rs=P.rs*P.sR;
  const cols=[0xff5577,0x55ff99,0x5599ff], groups=[gX,gY,gZ];

  if(P.shape==='sphere'){
    const nL=P.den*P.den, golden=(1+Math.sqrt(5))/2;
    for(let i=0;i<nL;i++){
      const theta=Math.acos(1-2*(i+.5)/nL);
      const phi=2*Math.PI*i/golden;
      const nx=Math.sin(theta)*Math.cos(phi),ny=Math.sin(theta)*Math.sin(phi),nz=Math.cos(theta);
      const sx=P.sR*nx,sy=P.sR*ny,sz=P.sR*nz;
      const reach=G/Math.max(Math.abs(nx),Math.abs(ny),Math.abs(nz));
      const ax=Math.abs(nx),ay=Math.abs(ny),az=Math.abs(nz);
      const idx=(ax>=ay&&ax>=az)?0:(ay>=az)?1:2;
      addLine(groups[idx],[sx,sy,sz,reach*nx,reach*ny,reach*nz],cols[idx],0.5);
    }
  } else {
    const R=P.sR, a=P.sR*P.aR, eps=0.06;
    const nP=P.den, nT=Math.max(4,Math.floor(P.den*0.5));
    for(let i=0;i<nP;i++){
      const phi=2*Math.PI*i/nP, cp=Math.cos(phi), sp=Math.sin(phi);
      for(let j=0;j<nT;j++){
        const th=2*Math.PI*j/nT, ct=Math.cos(th), st=Math.sin(th);
        const rr=R+a*ct;
        const sx=rr*cp, sy=a*st, sz=rr*sp;
        const nx=ct*cp, ny=st, nz=ct*sp;
        const ox=sx+eps*nx, oy=sy+eps*ny, oz=sz+eps*nz;
        const pts=traceFieldT(ox,oy,oz,rs/4);
        const axv=Math.abs(nx),ayv=Math.abs(ny),azv=Math.abs(nz);
        const idx=(axv>=ayv&&axv>=azv)?0:(ayv>=azv)?1:2;
        addLine(groups[idx],pts,cols[idx],0.5);
      }
    }
  }
}

/* ===== 2D+T FIELD LINES ===== */
function buildField2DT(){
  gX.clear();gY.clear();gZ.clear();gW.clear();
  const rs=P.rs*P.sR, n=P.den, G=P.gsz, sp=G*2/n;
  const mTot=rs/4, tMax=G*2, dt=0.03;

  for(let i=0;i<n;i++) for(let j=0;j<n;j++){
    const x0=-G+(i+.5)*sp, z0=-G+(j+.5)*sp;
    if(hitZone(x0,0,z0)) continue;
    const pts=[]; let x=x0,z=z0,vx=0,vz=0;
    for(let t=0;t<tMax;t+=dt){
      if(hitZone(x,0,z)) break;
      pts.push(x,t,z);
      if(mTot>1e-5){
        let ax=0,az=0;
        if(P.shape==='sphere'){
          const r=Math.sqrt(x*x+z*z),r3=r*r*r;
          ax=-rs/2*x/r3; az=-rs/2*z/r3;
        } else {
          const N=tEl.length/3, me=mTot/N;
          for(let k=0;k<tEl.length;k+=3){
            const dx=x-tEl[k],dy=-tEl[k+1],dz=z-tEl[k+2];
            const r2=dx*dx+dy*dy+dz*dz,r=Math.sqrt(r2);
            if(r<0.03) continue;
            ax-=me*dx/(r2*r); az-=me*dz/(r2*r);
          }
        }
        vx+=ax*dt; vz+=az*dt;
      }
      x+=vx*dt; z+=vz*dt;
    }
    addLine(gW,pts,0xffaa44,0.4);
  }

  if(P.shape==='sphere'){
    const nRays=P.den*4;
    for(let i=0;i<nRays;i++){
      const angle=2*Math.PI*i/nRays;
      const nx=Math.cos(angle),nz=Math.sin(angle);
      const reach=G/Math.max(Math.abs(nx),Math.abs(nz)||1);
      const idx=Math.abs(nx)>=Math.abs(nz)?0:1;
      addLine(idx===0?gX:gZ,[P.sR*nx,0,P.sR*nz,reach*nx,0,reach*nz],
        idx===0?0xff5577:0x5599ff,0.35);
    }
  } else {
    const R=P.sR, a=P.sR*P.aR, nRays=P.den*4, eps=0.06;
    for(let i=0;i<nRays;i++){
      const phi=2*Math.PI*i/nRays, cp=Math.cos(phi), sp=Math.sin(phi);
      for(const th of [0, Math.PI]){
        const ct=Math.cos(th), rr=R+a*ct;
        const sx=rr*cp, sz=rr*sp;
        const nx=ct*cp, nz=ct*sp;
        const pts=traceFieldT(sx+eps*nx,eps*Math.sin(th),sz+eps*nz,rs/4);
        for(let k=1;k<pts.length;k+=3) pts[k]=0;
        const idx=Math.abs(nx)>=Math.abs(nz)?0:1;
        addLine(idx===0?gX:gZ,pts,idx===0?0xff5577:0x5599ff,0.35);
      }
    }
  }
}

/* ===== REBUILD ===== */
function rebuild(){
  if(P.shape==='torus') genTorus();
  buildZone();
  if(P.viz==='geo'){
    P.mode==='3d'?build3D():build2DT();
  } else {
    P.mode==='3d'?buildField3D():buildField2DT();
  }
  syncVis();
}
function syncVis(){
  gX.visible=P.showX; gY.visible=P.showY;
  gZ.visible=P.showZ; gW.visible=P.showW;
}

/* ===== CAMERA ===== */
function setCam3D(){cam.position.set(8,6,10);ctl.target.set(0,0,0);}
function setCam2DT(){cam.position.set(12,P.gsz,10);ctl.target.set(0,P.gsz*.5,0);}

/* ===== UI ===== */
$('b3d').onclick=()=>{
  P.mode='3d';$('b3d').classList.add('on');$('b2t').classList.remove('on');
  $('bY').style.display='';$('bW').style.display='none';
  setCam3D();rebuild();
};
$('b2t').onclick=()=>{
  P.mode='2dt';$('b2t').classList.add('on');$('b3d').classList.remove('on');
  $('bY').style.display='none';$('bW').style.display='';
  setCam2DT();rebuild();
};
$('bGeo').onclick=()=>{P.viz='geo';$('bGeo').classList.add('on');$('bFld').classList.remove('on');rebuild();};
$('bFld').onclick=()=>{P.viz='field';$('bFld').classList.add('on');$('bGeo').classList.remove('on');rebuild();};
$('bSph').onclick=()=>{
  P.shape='sphere';$('bSph').classList.add('on');$('bTor').classList.remove('on');
  $('gAR').classList.add('hide');rebuild();
};
$('bTor').onclick=()=>{
  P.shape='torus';$('bTor').classList.add('on');$('bSph').classList.remove('on');
  $('gAR').classList.remove('hide');rebuild();
};

function toggleAxis(key,btn){P[key]=!P[key];$(btn).classList.toggle('on',P[key]);syncVis();}
$('bX').onclick=()=>toggleAxis('showX','bX');
$('bY').onclick=()=>toggleAxis('showY','bY');
$('bZ').onclick=()=>toggleAxis('showZ','bZ');
$('bW').onclick=()=>toggleAxis('showW','bW');

$('bG').onclick=()=>{$('sC').value=0.3;P.rs=0.3;$('vC').textContent='0.30';rebuild();};
$('bR').onclick=()=>{P.mode==='3d'?setCam3D():setCam2DT();};
$('sC').oninput=e=>{P.rs=+e.target.value;$('vC').textContent=P.rs.toFixed(2);rebuild();};
$('sSR').oninput=e=>{P.sR=+e.target.value;$('vSR').textContent=P.sR.toFixed(2);rebuild();};
$('sAR').oninput=e=>{P.aR=+e.target.value;$('vAR').textContent=P.aR.toFixed(2);rebuild();};
$('sD').oninput=e=>{P.den=+e.target.value;$('vD').textContent=P.den;rebuild();};
$('sO').oninput=e=>{P.opa=+e.target.value;$('vO').textContent=P.opa.toFixed(2);buildZone();};

$('gAR').classList.add('hide');

/* ===== RESIZE & LOOP ===== */
function onResize(){
  const w=box.clientWidth,h=box.clientHeight;
  cam.aspect=w/h;cam.updateProjectionMatrix();ren.setSize(w,h);
}
addEventListener('resize',onResize);
onResize();setCam3D();rebuild();
(function loop(){requestAnimationFrame(loop);ctl.update();ren.render(scene,cam);})();
</script>
</body>
