<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nested Torus — totu viz</title>
<link rel="stylesheet" href="totu-viz.css">
<style>
#levels { background: var(--surface); border-bottom: 1px solid var(--border); }
.lrow {
  display: flex; align-items: center; gap: 8px; padding: 3px 14px;
  border-top: 1px solid var(--border); font-size: 10.5px;
}
.lrow .ltag { font-weight: 700; min-width: 22px; font-size: 11px; }
input[type=color] {
  -webkit-appearance: none; border: none; width: 22px; height: 22px;
  border-radius: 4px; cursor: pointer; padding: 0; background: none;
}
input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
input[type=color]::-webkit-color-swatch { border: none; border-radius: 3px; }
input[type=color].dim { opacity: 0.25; pointer-events: none; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Nested Torus</h1><div class="sep"></div>
  <div class="cg">
    <label>Depth</label>
    <button class="btn" id="d1">1</button>
    <button class="btn" id="d2">2</button>
    <button class="btn" id="d3">3</button>
    <button class="btn" id="d4">4</button>
    <button class="btn" id="d5">5</button>
  </div><div class="sep"></div>
  <div class="cg">
    <label>r₁</label>
    <input type="range" id="sl-r1" min="0.2" max="3" step="0.05">
    <span class="val" id="v-r1"></span>
  </div><div class="sep"></div>
  <div class="cg" id="palette"></div><div class="sep"></div>
  <div class="cg tog"><label><input type="checkbox" id="cb-fit"> Auto-fit</label></div>
  <button class="btn" id="btn-reset">Reset</button>
</div>

<div id="levels"></div>

<div class="view-full" id="view">
  <div class="info-line" id="info"></div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}}
</script>
<script type="module">
import { THREE, createScene, autoResize, animLoop, buildTorusGeom } from './totu-viz.js';

const $ = id => document.getElementById(id);

const KEY = 'nested-torus';
const DEFAULTS = {
  depth: 2, r1: 1.0,
  ratios: [0.3, 0.3, 0.3, 0.3],
  opacities: [0.8, 0.25, 0.25, 0.25, 0.25],
  modes: ['shell', 'shell', 'shell', 'shell', 'shell'],
  visible: [true, true, true, true, true],
  colors: ['#4fc3f7', '#ff8a50', '#66bb6a', '#ab47bc', '#ef5350'],
  autoFit: true,
};

function load() {
  try {
    const r = localStorage.getItem(KEY);
    if (r) return { ...structuredClone(DEFAULTS), ...JSON.parse(r) };
  } catch {}
  return structuredClone(DEFAULTS);
}
let S = load();
function save() { localStorage.setItem(KEY, JSON.stringify(S)); }

/* ── Radii ──────────────────────────────────────────── */

function computeRadii() {
  const r = [0, S.r1];
  for (let k = 2; k <= 5; k++) r[k] = S.ratios[k - 2] * r[k - 1];
  return r;
}

/**
 * Boundary tube radii at level k.
 * Tube radii = r[2] ± r[3] ± … ± r[k]  (r[2] always +).
 * All tori share major radius = r[1] + r[2] (offset so circle sits at inner edge).
 * Returns sorted array of positive values.
 */
function tubeRadii(r, k) {
  if (k < 2) return [];
  if (k === 2) return [r[2]];
  const n = k - 2, out = [];
  for (let m = 0; m < (1 << n); m++) {
    let s = r[2];
    for (let b = 0; b < n; b++) s += (m & (1 << b)) ? -r[b + 3] : r[b + 3];
    if (s > 1e-6) out.push(s);
  }
  return out.sort((a, b) => b - a);
}

/* ── Scene ──────────────────────────────────────────── */

const { scene, camera, renderer, controls } = createScene($('view'), {
  camPos: [3.2, 2.2, 4.0], maxDistance: 80,
});
autoResize(renderer, camera, $('view'));

const groups = [];
for (let k = 0; k <= 5; k++) { const g = new THREE.Group(); groups.push(g); scene.add(g); }

function clearGroup(g) {
  const disposed = new Set();
  while (g.children.length) {
    const c = g.children[0];
    c.geometry?.dispose();
    if (c.material && !disposed.has(c.material)) { c.material.dispose(); disposed.add(c.material); }
    g.remove(c);
  }
}

function makeMat(k) {
  return new THREE.MeshPhongMaterial({
    color: new THREE.Color(S.colors[k - 1]),
    transparent: true, opacity: S.opacities[k - 1],
    side: THREE.DoubleSide, depthWrite: false, shininess: 60,
    wireframe: S.modes[k - 1] === 'wire',
  });
}

function rebuild() {
  const r = computeRadii();
  for (let k = 1; k <= 5; k++) clearGroup(groups[k]);

  const N = 128;
  const M = S.depth >= 2 ? r[1] + r[2] : r[1]; // torus major radius (offset so circle = inner edge)

  /* Level 1 */
  const pts = [];
  if (S.depth === 1) {
    /* Depth 1: circle in XZ plane, radius r₁ */
    for (let i = 0; i <= N; i++) {
      const a = (i / N) * Math.PI * 2;
      pts.push(new THREE.Vector3(r[1] * Math.cos(a), 0, r[1] * Math.sin(a)));
    }
  } else {
    /* Depth ≥ 2: tube cross-section profile at φ=0 (circle in z=0 plane) */
    for (let i = 0; i <= N; i++) {
      const a = (i / N) * Math.PI * 2;
      pts.push(new THREE.Vector3(M + r[2] * Math.cos(a), r[2] * Math.sin(a), 0));
    }
  }
  const curve = new THREE.CatmullRomCurve3(pts, true);
  const tubeW = Math.max(0.008, 0.012 * (S.depth === 1 ? r[1] : r[2]));
  groups[1].add(new THREE.Mesh(new THREE.TubeGeometry(curve, N, tubeW, 8, true), makeMat(1)));

  /* Levels 2..depth: boundary tori (all share major M) */
  for (let k = 2; k <= S.depth; k++) {
    const trs = tubeRadii(r, k);
    const mat = makeMat(k);
    for (const tR of trs) {
      const su = Math.max(12, Math.min(48, Math.round(48 * tR / Math.max(M, 0.01))));
      groups[k].add(new THREE.Mesh(buildTorusGeom(M, tR, su, 64), mat));
    }
  }

  for (let k = 1; k <= 5; k++) groups[k].visible = k <= S.depth && S.visible[k - 1];
  if (S.autoFit) fitCamera(r);
  updateInfo(r);
  save();
}

function updateMats() {
  for (let k = 1; k <= 5; k++) {
    if (!groups[k].children.length) continue;
    const mat = groups[k].children[0].material;
    if (!mat) continue;
    mat.color.set(S.colors[k - 1]);
    mat.opacity = S.opacities[k - 1];
    mat.wireframe = S.modes[k - 1] === 'wire';
  }
  save();
}

function updateVis() {
  for (let k = 1; k <= 5; k++) groups[k].visible = k <= S.depth && S.visible[k - 1];
  save();
}

function fitCamera(r) {
  r = r || computeRadii();
  const M = S.depth >= 2 ? r[1] + r[2] : r[1];
  const tr = tubeRadii(r, S.depth);
  const bound = M + (tr.length ? Math.max(...tr) : 0) + 0.1;
  const dist = bound * 3.2;
  camera.position.set(dist * 0.55, dist * 0.4, dist * 0.72);
  controls.target.set(0, 0, 0);
  controls.update();
}

function updateInfo(r) {
  r = r || computeRadii();
  const SUB = '\u2080\u2081\u2082\u2083\u2084\u2085';
  const p = [`depth ${S.depth}`];
  for (let k = 1; k <= S.depth; k++) p.push(`r${SUB[k]}=${r[k].toFixed(4)}`);
  const M = S.depth >= 2 ? r[1] + r[2] : r[1];
  const tr = tubeRadii(r, S.depth);
  const bound = M + (tr.length ? Math.max(...tr) : 0);
  p.push(`bound=${bound.toFixed(3)}`);
  let total = 0;
  for (let k = 2; k <= S.depth; k++) total += tubeRadii(r, k).length;
  if (total) p.push(`${total} tori`);
  $('info').textContent = p.join('  ');
}

/* ── UI: palette ────────────────────────────────────── */

const palDiv = $('palette');
for (let k = 1; k <= 5; k++) {
  const inp = document.createElement('input');
  inp.type = 'color'; inp.id = `col-${k}`; inp.value = S.colors[k - 1];
  if (k > S.depth) inp.classList.add('dim');
  inp.oninput = () => { S.colors[k - 1] = inp.value; $(`lt-${k}`).style.color = inp.value; updateMats(); };
  palDiv.appendChild(inp);
}

/* ── UI: level rows ─────────────────────────────────── */

const levDiv = $('levels');
for (let k = 1; k <= 5; k++) {
  const row = document.createElement('div');
  row.className = 'lrow'; row.id = `lr-${k}`;
  if (k > S.depth) row.style.display = 'none';

  let h = `<span class="ltag" id="lt-${k}" style="color:${S.colors[k-1]}">L${k}</span>`;

  if (k >= 2) {
    const rv = S.ratios[k - 2];
    h += `<div class="cg"><label>ratio</label>
      <input type="range" id="sl-r-${k}" min="0.05" max="0.95" step="0.01" value="${rv}">
      <span class="val" id="vr-${k}">${rv.toFixed(2)}</span></div>`;
  }

  h += `<div class="cg"><label>\u03b1</label>
    <input type="range" id="sl-a-${k}" min="0" max="1" step="0.05" value="${S.opacities[k-1]}">
    <span class="val" id="va-${k}">${S.opacities[k-1].toFixed(2)}</span></div>`;

  if (k >= 2) {
    const w = S.modes[k - 1] === 'wire';
    h += `<button class="btn${w ? ' on' : ''}" id="bm-${k}">${S.modes[k - 1]}</button>`;
  }

  h += `<div class="cg tog"><label><input type="checkbox" id="cv-${k}" ${S.visible[k-1] ? 'checked' : ''}> vis</label></div>`;
  row.innerHTML = h;
  levDiv.appendChild(row);
}

/* ── UI: wire up per-level events ───────────────────── */

for (let k = 1; k <= 5; k++) {
  if (k >= 2) {
    $(`sl-r-${k}`).oninput = function () {
      S.ratios[k - 2] = +this.value;
      $(`vr-${k}`).textContent = (+this.value).toFixed(2);
      rebuild();
    };
    $(`bm-${k}`).onclick = function () {
      S.modes[k - 1] = S.modes[k - 1] === 'shell' ? 'wire' : 'shell';
      this.textContent = S.modes[k - 1];
      this.classList.toggle('on', S.modes[k - 1] === 'wire');
      updateMats();
    };
  }
  $(`sl-a-${k}`).oninput = function () {
    S.opacities[k - 1] = +this.value;
    $(`va-${k}`).textContent = (+this.value).toFixed(2);
    updateMats();
  };
  $(`cv-${k}`).onchange = function () {
    S.visible[k - 1] = this.checked;
    updateVis();
  };
}

/* ── UI: global controls ────────────────────────────── */

$('sl-r1').value = S.r1;
$('v-r1').textContent = S.r1.toFixed(2);
$('cb-fit').checked = S.autoFit;

for (let d = 1; d <= 5; d++) {
  $(`d${d}`).classList.toggle('on', d === S.depth);
  $(`d${d}`).onclick = () => { S.depth = d; refreshDepthUI(); rebuild(); };
}

$('sl-r1').oninput = function () {
  S.r1 = +this.value;
  $('v-r1').textContent = S.r1.toFixed(2);
  rebuild();
};
$('cb-fit').onchange = function () { S.autoFit = this.checked; save(); };
$('btn-reset').onclick = () => {
  localStorage.removeItem(KEY);
  S = structuredClone(DEFAULTS);
  syncAllUI();
  rebuild();
};

function refreshDepthUI() {
  for (let d = 1; d <= 5; d++) $(`d${d}`).classList.toggle('on', d === S.depth);
  for (let k = 1; k <= 5; k++) {
    $(`lr-${k}`).style.display = k <= S.depth ? 'flex' : 'none';
    $(`col-${k}`).classList.toggle('dim', k > S.depth);
  }
}

function syncAllUI() {
  $('sl-r1').value = S.r1;
  $('v-r1').textContent = S.r1.toFixed(2);
  $('cb-fit').checked = S.autoFit;
  refreshDepthUI();
  for (let k = 1; k <= 5; k++) {
    if (k >= 2) {
      $(`sl-r-${k}`).value = S.ratios[k - 2];
      $(`vr-${k}`).textContent = S.ratios[k - 2].toFixed(2);
      $(`bm-${k}`).textContent = S.modes[k - 1];
      $(`bm-${k}`).classList.toggle('on', S.modes[k - 1] === 'wire');
    }
    $(`sl-a-${k}`).value = S.opacities[k - 1];
    $(`va-${k}`).textContent = S.opacities[k - 1].toFixed(2);
    $(`cv-${k}`).checked = S.visible[k - 1];
    $(`col-${k}`).value = S.colors[k - 1];
    $(`lt-${k}`).style.color = S.colors[k - 1];
  }
}

/* ── Go ─────────────────────────────────────────────── */

rebuild();
animLoop(() => {}, { renderer, scene, camera, controls });
</script>
</body>
</html>
