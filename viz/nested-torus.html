<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nested Torus — totu viz</title>
<link rel="stylesheet" href="totu-viz.css">
<style>
#levels { background: var(--surface); border-bottom: 1px solid var(--border); }
.lrow {
  display: flex; align-items: center; gap: 8px; padding: 3px 14px;
  border-top: 1px solid var(--border); font-size: 10.5px;
}
.lrow .ltag { font-weight: 700; min-width: 22px; font-size: 11px; }
input[type=color] {
  -webkit-appearance: none; border: none; width: 22px; height: 22px;
  border-radius: 4px; cursor: pointer; padding: 0; background: none;
}
input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
input[type=color]::-webkit-color-swatch { border: none; border-radius: 3px; }
input[type=color].dim { opacity: 0.25; pointer-events: none; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Nested Torus</h1><div class="sep"></div>
  <div class="cg">
    <label>Depth</label>
    <button class="btn" id="d1">1</button>
    <button class="btn" id="d2">2</button>
    <button class="btn" id="d3">3</button>
    <button class="btn" id="d4">4</button>
    <button class="btn" id="d5">5</button>
  </div><div class="sep"></div>
  <div class="cg" id="palette"></div><div class="sep"></div>
  <div class="cg tog"><label><input type="checkbox" id="cb-fit"> Auto-fit</label></div>
  <button class="btn" id="btn-reset">Reset</button>
</div>

<div id="levels"></div>

<div class="view-full" id="view">
  <div class="info-line" id="info"></div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}}
</script>
<script type="module">
import { THREE, createScene, autoResize, animLoop, buildTorusGeom } from './totu-viz.js';

const $ = id => document.getElementById(id);

const KEY = 'nested-torus-v4';
const DEFAULTS = {
  depth: 2,
  ratios:    [2.5, 2.5, 2.5, 2.5, 2.5],
  opacities: [0.8, 0.4, 0.2, 0.1, 0.05],
  modes:     ['shell', 'shell', 'shell', 'shell', 'shell'],
  visible:   [true, true, true, true, true],
  colors:    ['#4fc3f7', '#ff8a50', '#66bb6a', '#ab47bc', '#ef5350'],
  autoFit:   true,
};

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const s = { ...structuredClone(DEFAULTS), ...JSON.parse(raw) };
      while (s.ratios.length < 5) s.ratios.push(DEFAULTS.ratios[s.ratios.length]);
      return s;
    }
  } catch {}
  return structuredClone(DEFAULTS);
}
let S = load();
function save() { localStorage.setItem(KEY, JSON.stringify(S)); }

/* ── Radii ──────────────────────────────────────────── */

function computeRadii() {
  const R = [0];
  R[1] = S.ratios[0];
  for (let k = 2; k <= 5; k++) R[k] = S.ratios[k - 1] * R[k - 1];
  return R;
}

function tubeRadii(R, k) {
  if (k < 2) return [];
  if (k === 2) return [R[1]];
  const n = k - 2, out = [];
  for (let m = 0; m < (1 << n); m++) {
    let s = R[k - 1];
    for (let b = 0; b < n; b++) s += (m & (1 << b)) ? -R[k - 2 - b] : R[k - 2 - b];
    if (s > 1e-6) out.push(s);
  }
  return out.sort((a, b) => b - a);
}

/* ── Axis & center helpers ─────────────────────────── */

function isYAxis(k) { return k % 2 === 0; }

// Center of level k's ring.
// C[2] = origin.  For k ≥ 3, C[k] = C[k−1] − offset(k).
// At φ_k = 0, tube center = C[k] + offset(k) = C[k−1].
function computeCenters(R) {
  const C = [null, null];
  C[2] = new THREE.Vector3(0, 0, 0);
  for (let k = 3; k <= 5; k++) {
    C[k] = C[k - 1].clone();
    if (isYAxis(k)) C[k].x -= R[k];
    else            C[k].y -= R[k];
  }
  return C;
}

/* ── X-axis torus geometry ──────────────────────────── */

function buildXTorusGeom(Rmaj, atube, segU = 32, segV = 64) {
  const nv = (segU + 1) * (segV + 1);
  const pos = new Float32Array(nv * 3);
  const nor = new Float32Array(nv * 3);
  const uv  = new Float32Array(nv * 2);
  const idx = [];
  let vi = 0, ni = 0, ui = 0;
  for (let i = 0; i <= segU; i++) {
    const th = (i / segU) * Math.PI * 2;
    const ct = Math.cos(th), st = Math.sin(th);
    for (let j = 0; j <= segV; j++) {
      const ph = (j / segV) * Math.PI * 2;
      const cp = Math.cos(ph), sp = Math.sin(ph);
      pos[vi++] = atube * st;
      pos[vi++] = (Rmaj + atube * ct) * cp;
      pos[vi++] = (Rmaj + atube * ct) * sp;
      nor[ni++] = st; nor[ni++] = ct * cp; nor[ni++] = ct * sp;
      uv[ui++] = i / segU; uv[ui++] = j / segV;
    }
  }
  for (let i = 0; i < segU; i++) {
    for (let j = 0; j < segV; j++) {
      const a = i * (segV + 1) + j, b = (i + 1) * (segV + 1) + j;
      idx.push(a, b, b + 1, a, b + 1, a + 1);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(nor, 3));
  geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uv,  2));
  geo.setIndex(idx);
  return geo;
}

function torusGeomForLevel(levelK, Rmaj, atube, R2) {
  const su = Math.max(12, Math.min(48, Math.round(48 * atube / Math.max(Rmaj, 0.01))));
  const sv = Math.max(32, Math.min(128, Math.round(64 * Rmaj / Math.max(R2, 0.01))));
  return isYAxis(levelK)
    ? buildTorusGeom(Rmaj, atube, su, sv)
    : buildXTorusGeom(Rmaj, atube, su, sv);
}

/* ── Scene ──────────────────────────────────────────── */

const { scene, camera, renderer, controls } = createScene($('view'), {
  camPos: [3.2, 2.2, 4.0], maxDistance: 2000,
});
autoResize(renderer, camera, $('view'));

const groups   = [];
const hlGroup2 = new THREE.Group();  // only L2 gets a highlight (L1 circle)
scene.add(hlGroup2);
for (let k = 0; k <= 5; k++) {
  const g = new THREE.Group(); groups.push(g); scene.add(g);
}

const levelMats = {};
let hlMat2 = null;

function clearGroup(g) {
  const disposed = new Set();
  while (g.children.length) {
    const c = g.children[0];
    c.geometry?.dispose();
    if (c.material && !disposed.has(c.material)) { c.material.dispose(); disposed.add(c.material); }
    g.remove(c);
  }
}

function makeMat(k) {
  return new THREE.MeshPhongMaterial({
    color: new THREE.Color(S.colors[k - 1]),
    transparent: true, opacity: S.opacities[k - 1],
    side: THREE.DoubleSide, depthWrite: false, shininess: 60,
    wireframe: S.modes[k - 1] === 'wire',
  });
}

const N_CIRCLE = 128;

function rebuild() {
  const R = computeRadii();
  const C = computeCenters(R);
  for (let k = 1; k <= 5; k++) { clearGroup(groups[k]); groups[k].position.set(0, 0, 0); }
  clearGroup(hlGroup2);

  /* ── Level 1: circle of radius r₁ ─────────────────── */
  {
    const pts = [];
    if (S.depth === 1) {
      for (let i = 0; i <= N_CIRCLE; i++) {
        const a = (i / N_CIRCLE) * Math.PI * 2;
        pts.push(new THREE.Vector3(R[1] * Math.cos(a), 0, R[1] * Math.sin(a)));
      }
    } else {
      for (let i = 0; i <= N_CIRCLE; i++) {
        const a = (i / N_CIRCLE) * Math.PI * 2;
        pts.push(new THREE.Vector3(R[2] + R[1] * Math.cos(a), R[1] * Math.sin(a), 0));
      }
    }
    const curve = new THREE.CatmullRomCurve3(pts, true);
    const tubeW = Math.max(0.008, 0.012 * R[1]);
    const mat = makeMat(1);
    levelMats[1] = mat;
    groups[1].add(new THREE.Mesh(new THREE.TubeGeometry(curve, N_CIRCLE, tubeW, 8, true), mat));
  }

  /* ── Levels 2..depth: boundary tori at C[k] ───────── */
  for (let k = 2; k <= S.depth; k++) {
    const trs = tubeRadii(R, k);
    const mat = makeMat(k);
    levelMats[k] = mat;

    for (const tR of trs) {
      groups[k].add(new THREE.Mesh(torusGeomForLevel(k, R[k], tR, R[2]), mat));
    }
    groups[k].position.copy(C[k]);

    // L2 highlight: the L1 circle at the φ₂=0 cross-section
    if (k === 2) {
      hlMat2 = new THREE.MeshPhongMaterial({
        color: new THREE.Color(S.colors[0]),
        transparent: true, opacity: Math.min(1, S.opacities[0] * 2),
        side: THREE.DoubleSide, depthWrite: false, shininess: 60,
        wireframe: true,
      });
      const pts = [];
      for (let i = 0; i <= N_CIRCLE; i++) {
        const a = (i / N_CIRCLE) * Math.PI * 2;
        pts.push(new THREE.Vector3(R[2] + R[1] * Math.cos(a), R[1] * Math.sin(a), 0));
      }
      const curve = new THREE.CatmullRomCurve3(pts, true);
      const tubeW = Math.max(0.009, 0.015 * R[1]);
      hlGroup2.add(new THREE.Mesh(
        new THREE.TubeGeometry(curve, N_CIRCLE, tubeW, 8, true), hlMat2));
    }
    // For k ≥ 3: no highlight — the level-(k−1) boundary at C[k−1]
    // naturally sits at the φ_k = 0 cross-section.
  }

  for (let k = 1; k <= 5; k++) {
    groups[k].visible = k <= S.depth && S.visible[k - 1];
  }
  hlGroup2.visible = S.depth >= 2 && S.visible[0];
  if (S.autoFit) fitCamera(R, C);
  updateInfo(R, C);
  save();
}

function updateMats() {
  for (let k = 1; k <= 5; k++) {
    if (levelMats[k]) {
      levelMats[k].color.set(S.colors[k - 1]);
      levelMats[k].opacity = S.opacities[k - 1];
      levelMats[k].wireframe = S.modes[k - 1] === 'wire';
      levelMats[k].needsUpdate = true;
    }
  }
  if (hlMat2) {
    hlMat2.color.set(S.colors[0]);
    hlMat2.opacity = Math.min(1, S.opacities[0] * 2);
    hlMat2.needsUpdate = true;
  }
  save();
}

function updateVis() {
  for (let k = 1; k <= 5; k++) {
    groups[k].visible = k <= S.depth && S.visible[k - 1];
  }
  hlGroup2.visible = S.depth >= 2 && S.visible[0];
  save();
}

function fitCamera(R, C) {
  R = R || computeRadii();
  C = C || computeCenters(R);
  const d = S.depth;

  const lo = new THREE.Vector3(Infinity, Infinity, Infinity);
  const hi = new THREE.Vector3(-Infinity, -Infinity, -Infinity);

  function expand(cx, cy, cz, r) {
    lo.x = Math.min(lo.x, cx - r); lo.y = Math.min(lo.y, cy - r); lo.z = Math.min(lo.z, cz - r);
    hi.x = Math.max(hi.x, cx + r); hi.y = Math.max(hi.y, cy + r); hi.z = Math.max(hi.z, cz + r);
  }

  if (d === 1) {
    expand(0, 0, 0, R[1]);
  } else {
    expand(R[2], 0, 0, R[1]);
    for (let k = 2; k <= d; k++) {
      const tr = tubeRadii(R, k);
      const ext = R[k] + (tr.length ? Math.max(...tr) : 0);
      expand(C[k].x, C[k].y, C[k].z, ext);
    }
  }

  const center = lo.clone().add(hi).multiplyScalar(0.5);
  const sz = hi.clone().sub(lo);
  const bound = Math.max(sz.x, sz.y, sz.z) * 0.5;
  const dist = bound * 2.8;
  camera.position.set(center.x + dist * 0.55, center.y + dist * 0.4, center.z + dist * 0.72);
  controls.target.copy(center);
  controls.update();
}

function updateInfo(R, C) {
  R = R || computeRadii();
  C = C || computeCenters(R);
  const SUB = '\u2080\u2081\u2082\u2083\u2084\u2085';
  const p = [`depth ${S.depth}`];
  for (let k = 1; k <= S.depth; k++) p.push(`r${SUB[k]}=${R[k].toFixed(2)}`);
  let total = 0;
  for (let k = 2; k <= S.depth; k++) total += tubeRadii(R, k).length;
  if (total) p.push(`${total} tori`);
  $('info').textContent = p.join('  ');
}

/* ── UI: palette ────────────────────────────────────── */

const palDiv = $('palette');
for (let k = 1; k <= 5; k++) {
  const inp = document.createElement('input');
  inp.type = 'color'; inp.id = `col-${k}`; inp.value = S.colors[k - 1];
  if (k > S.depth) inp.classList.add('dim');
  inp.oninput = () => { S.colors[k - 1] = inp.value; $(`lt-${k}`).style.color = inp.value; updateMats(); };
  palDiv.appendChild(inp);
}

/* ── UI: level rows ─────────────────────────────────── */

const levDiv = $('levels');
for (let k = 1; k <= 5; k++) {
  const row = document.createElement('div');
  row.className = 'lrow'; row.id = `lr-${k}`;
  if (k > S.depth) row.style.display = 'none';

  const rv = S.ratios[k - 1];
  let h = `<span class="ltag" id="lt-${k}" style="color:${S.colors[k-1]}">L${k}</span>`;
  h += `<div class="cg"><label>ratio</label>
    <input type="range" id="sl-r-${k}" min="0.1" max="10" step="0.1" value="${rv}">
    <span class="val" id="vr-${k}">${rv.toFixed(1)}</span></div>`;

  h += `<div class="cg"><label>\u03b1</label>
    <input type="range" id="sl-a-${k}" min="0" max="1" step="0.05" value="${S.opacities[k-1]}">
    <span class="val" id="va-${k}">${S.opacities[k-1].toFixed(2)}</span></div>`;

  if (k >= 2) {
    const w = S.modes[k - 1] === 'wire';
    h += `<button class="btn${w ? ' on' : ''}" id="bm-${k}">${S.modes[k - 1]}</button>`;
  }

  h += `<div class="cg tog"><label><input type="checkbox" id="cv-${k}" ${S.visible[k-1] ? 'checked' : ''}> vis</label></div>`;
  row.innerHTML = h;
  levDiv.appendChild(row);
}

/* ── UI: wire up per-level events ───────────────────── */

for (let k = 1; k <= 5; k++) {
  $(`sl-r-${k}`).oninput = function () {
    S.ratios[k - 1] = +this.value;
    $(`vr-${k}`).textContent = (+this.value).toFixed(1);
    rebuild();
  };
  if (k >= 2) {
    $(`bm-${k}`).onclick = function () {
      S.modes[k - 1] = S.modes[k - 1] === 'shell' ? 'wire' : 'shell';
      this.textContent = S.modes[k - 1];
      this.classList.toggle('on', S.modes[k - 1] === 'wire');
      updateMats();
    };
  }
  $(`sl-a-${k}`).oninput = function () {
    S.opacities[k - 1] = +this.value;
    $(`va-${k}`).textContent = (+this.value).toFixed(2);
    updateMats();
  };
  $(`cv-${k}`).onchange = function () {
    S.visible[k - 1] = this.checked;
    updateVis();
  };
}

/* ── UI: global controls ────────────────────────────── */

$('cb-fit').checked = S.autoFit;

for (let d = 1; d <= 5; d++) {
  $(`d${d}`).classList.toggle('on', d === S.depth);
  $(`d${d}`).onclick = () => { S.depth = d; refreshDepthUI(); rebuild(); };
}

$('cb-fit').onchange = function () { S.autoFit = this.checked; save(); };
$('btn-reset').onclick = () => {
  localStorage.removeItem(KEY);
  S = structuredClone(DEFAULTS);
  syncAllUI();
  rebuild();
};

function refreshDepthUI() {
  for (let d = 1; d <= 5; d++) $(`d${d}`).classList.toggle('on', d === S.depth);
  for (let k = 1; k <= 5; k++) {
    $(`lr-${k}`).style.display = k <= S.depth ? 'flex' : 'none';
    $(`col-${k}`).classList.toggle('dim', k > S.depth);
  }
}

function syncAllUI() {
  $('cb-fit').checked = S.autoFit;
  refreshDepthUI();
  for (let k = 1; k <= 5; k++) {
    $(`sl-r-${k}`).value = S.ratios[k - 1];
    $(`vr-${k}`).textContent = S.ratios[k - 1].toFixed(1);
    if (k >= 2) {
      $(`bm-${k}`).textContent = S.modes[k - 1];
      $(`bm-${k}`).classList.toggle('on', S.modes[k - 1] === 'wire');
    }
    $(`sl-a-${k}`).value = S.opacities[k - 1];
    $(`va-${k}`).textContent = S.opacities[k - 1].toFixed(2);
    $(`cv-${k}`).checked = S.visible[k - 1];
    $(`col-${k}`).value = S.colors[k - 1];
    $(`lt-${k}`).style.color = S.colors[k - 1];
  }
}

/* ── Go ─────────────────────────────────────────────── */

rebuild();
animLoop(() => {}, { renderer, scene, camera, controls });
</script>
</body>
</html>
