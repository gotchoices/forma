<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Toroidal Explorer — WvM Electron Model</title>
<link rel="stylesheet" href="totu-viz.css">
<style>
body { display: block; height: auto; }

#controls {
  position: absolute; top: 16px; left: 16px;
  background: rgba(10,10,18,0.88); padding: 18px; border-radius: 10px;
  width: 290px; backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.06);
  z-index: 10;
}
#controls h2 { font-size: 15px; margin-bottom: 14px; color: #ccc; font-weight: 600; }

.slider-group { margin-bottom: 12px; }
.slider-group label { display: block; font-size: 12px; color: #999; margin-bottom: 3px; }
.slider-group .sval { float: right; color: #4fc3f7; font-weight: 700; font-size: 13px; }
#controls input[type=range] { width: 100%; height: 6px; }

.presets { margin-bottom: 12px; }
.presets label { display: block; font-size: 11px; color: #777; margin-bottom: 4px; }

.badge {
  display: inline-block; padding: 1px 8px; border-radius: 3px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
}
.b-ring    { background: #1b3a1b; color: #81c784; }
.b-horn    { background: #3e2700; color: #ffb74d; }
.b-spindle { background: #3b1010; color: #ef9a9a; }

#info {
  position: absolute; top: 16px; right: 16px;
  background: rgba(10,10,18,0.88); padding: 18px; border-radius: 10px;
  width: 240px; backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.06);
  font-size: 12px; line-height: 2; z-index: 10;
}
#info h2 { font-size: 15px; margin-bottom: 6px; color: #ccc; font-weight: 600; }
.lbl { color: #777; }
.v { color: #4fc3f7; font-weight: 700; }

#legend {
  position: absolute; bottom: 16px; left: 16px;
  background: rgba(10,10,18,0.80); padding: 10px 14px; border-radius: 8px;
  font-size: 11px; backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.05); z-index: 10;
}
.leg { display: flex; align-items: center; margin: 3px 0; color: #aaa; }
.sw { width: 18px; height: 4px; border-radius: 2px; margin-right: 8px; flex-shrink: 0; }

#note {
  position: absolute; bottom: 16px; right: 16px;
  background: rgba(10,10,18,0.70); padding: 8px 12px; border-radius: 6px;
  font-size: 10px; color: #555; max-width: 240px; text-align: right;
  border: 1px solid rgba(255,255,255,0.04); z-index: 10;
}

#view { position: fixed; inset: 0; }
</style>
</head>
<body>
<div id="view"></div>

<div id="controls">
  <h2>Toroidal Explorer</h2>

  <div class="slider-group">
    <label>Tube / Ring ratio (a/R) <span class="sval" id="ar-v">0.50</span></label>
    <input type="range" id="ar" min="0.05" max="12" step="0.01" value="0.5">
  </div>

  <div class="presets">
    <label>Presets</label>
    <button class="btn" data-v="0.50">Ring 0.5</button>
    <button class="btn" data-v="1.00">Horn 1.0</button>
    <button class="btn" data-v="5.28">Horizon</button>
    <button class="btn" data-v="6.60">q = e</button>
    <button class="btn" data-v="7.26">WvM sphere</button>
  </div>

  <div class="slider-group">
    <label>Surface opacity <span class="sval" id="op-v">0.45</span></label>
    <input type="range" id="op" min="0" max="1" step="0.01" value="0.45">
  </div>

  <div class="tog"><label><input type="checkbox" id="tw" checked> Wireframe</label></div>
  <div class="tog"><label><input type="checkbox" id="tg" checked> Geodesic (spin-½ path)</label></div>
  <div class="tog"><label><input type="checkbox" id="tp" checked> Photon (animated)</label></div>
  <div class="tog"><label><input type="checkbox" id="th"> Rotation horizon sphere</label></div>
  <div class="tog"><label><input type="checkbox" id="ta"> Symmetry axis</label></div>
  <hr style="border-color:#333; margin:8px 0 6px">
  <div class="tog"><label><input type="checkbox" id="tf" checked> Auto-fit scale</label></div>
</div>

<div id="info">
  <h2>Properties</h2>
  <div><span class="lbl">Type</span> <span id="i-type" class="badge b-ring">RING</span></div>
  <div><span class="lbl">a / R =</span> <span class="v" id="i-ar">0.50</span></div>
  <div><span class="lbl">Outer edge =</span> <span class="v" id="i-out">—</span> <span class="lbl">&#955;</span></div>
  <div><span class="lbl">V<sub>torus</sub> / V<sub>sphere</sub> =</span> <span class="v" id="i-vr">—</span></div>
  <div><span class="lbl">q / e &asymp;</span> <span class="v" id="i-qe">—</span></div>
  <hr style="border-color:#222; margin:6px 0">
  <div style="font-size:10px; color:#555; line-height:1.5">
    Uniform-field approx: V = 2&pi;&sup2;Ra&sup2;, r<sub>c</sub> = R.<br>
    Horizon sphere: r = &lambda;/2 = 2&pi;R.
  </div>
</div>

<div id="legend">
  <div class="leg"><div class="sw" style="background:#4fc3f7"></div>Torus surface</div>
  <div class="leg"><div class="sw" style="background:#ff6e40"></div>Geodesic orbit</div>
  <div class="leg"><div class="sw" style="background:#fdd835"></div>Photon</div>
  <div class="leg"><div class="sw" style="background:#66bb6a"></div>Rotation horizon</div>
</div>

<div id="note">
  Drag to rotate &middot; Scroll to zoom &middot; Right-drag to pan
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}}
</script>
<script type="module">
import {
  THREE, createScene, autoResize, buildTorusGeom,
  torusPt, torusPathGeom, createPhoton, PALETTE
} from './totu-viz.js';

const $ = id => document.getElementById(id);
const R = 1.0, FIT = 2.0, HORIZON = 2 * Math.PI;

let aR = 0.5, autoFit = true;

const { scene, camera, renderer, controls, clock } = createScene($('view'), {
  maxDistance: 80,
});
autoResize(renderer, camera, $('view'));

const world = new THREE.Group();
scene.add(world);

const torusMat = new THREE.MeshPhongMaterial({
  color: PALETTE.surface, transparent: true, opacity: 0.45,
  side: THREE.DoubleSide, depthWrite: false, shininess: 60,
});
const wireMat = new THREE.MeshBasicMaterial({
  color: PALETTE.surface, wireframe: true, transparent: true, opacity: 0.08,
  side: THREE.DoubleSide,
});
const geoMat = new THREE.MeshPhongMaterial({
  color: PALETTE.path, emissive: 0x661800, shininess: 80,
});

let torusMesh, wireMesh, geoMesh;

const photon = createPhoton({ r: 0.06 });
world.add(photon.mesh);

const horizonMesh = new THREE.Mesh(
  new THREE.SphereGeometry(HORIZON, 40, 24),
  new THREE.MeshBasicMaterial({ color: 0x66bb6a, wireframe: true, transparent: true, opacity: 0.07 })
);
horizonMesh.visible = false;
world.add(horizonMesh);

const axisMesh = new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-20,0), new THREE.Vector3(0,20,0)]),
  new THREE.LineBasicMaterial({ color: 0x444444 })
);
axisMesh.visible = false;
world.add(axisMesh);

function rebuild() {
  const a = aR * R;
  const gs = autoFit ? FIT / (R + a) : 1.0;
  world.scale.setScalar(gs);

  if (torusMesh) { torusMesh.geometry.dispose(); world.remove(torusMesh); }
  if (wireMesh)  { wireMesh.geometry.dispose();  world.remove(wireMesh); }
  if (geoMesh)   { geoMesh.geometry.dispose();   world.remove(geoMesh); }

  const tg = buildTorusGeom(R, a, 96, 192);
  torusMesh = new THREE.Mesh(tg, torusMat);
  wireMesh  = new THREE.Mesh(buildTorusGeom(R, a, 48, 96), wireMat);
  geoMesh   = new THREE.Mesh(
    torusPathGeom(R, a, 1, 2, { segments: 600, tubeR: 0.025 / gs }),
    geoMat
  );

  world.add(torusMesh, wireMesh, geoMesh);
  wireMesh.visible = $('tw').checked;
  geoMesh.visible = $('tg').checked;

  photon.mesh.scale.setScalar(0.06 / gs);
  photon.glow.distance = 3 / gs;
  updateInfo();
}

function updateInfo() {
  $('i-ar').textContent = aR.toFixed(2);
  const ty = $('i-type');
  if (aR < 0.999)      { ty.textContent = 'RING';    ty.className = 'badge b-ring'; }
  else if (aR < 1.001) { ty.textContent = 'HORN';    ty.className = 'badge b-horn'; }
  else                  { ty.textContent = 'SPINDLE'; ty.className = 'badge b-spindle'; }
  $('i-out').textContent = ((1 + aR) / (4 * Math.PI)).toFixed(4);
  const vr = 3 * aR * aR / (16 * Math.PI * Math.PI);
  $('i-vr').textContent = vr.toFixed(4);
  $('i-qe').textContent = (0.910318 / Math.sqrt(vr)).toFixed(4);
}

/* ── Controls ─────────────────────────────────────────── */

$('ar').addEventListener('input', e => {
  aR = parseFloat(e.target.value);
  $('ar-v').textContent = aR.toFixed(2);
  rebuild();
});
$('op').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  $('op-v').textContent = v.toFixed(2);
  torusMat.opacity = v;
});

document.querySelectorAll('[data-v]').forEach(btn => {
  btn.addEventListener('click', () => {
    aR = parseFloat(btn.dataset.v);
    $('ar').value = aR; $('ar-v').textContent = aR.toFixed(2);
    rebuild();
  });
});

$('tw').addEventListener('change', e => { if (wireMesh) wireMesh.visible = e.target.checked; });
$('tg').addEventListener('change', e => { if (geoMesh) geoMesh.visible = e.target.checked; });
$('tp').addEventListener('change', e => { photon.mesh.visible = e.target.checked; });
$('th').addEventListener('change', e => { horizonMesh.visible = e.target.checked; });
$('ta').addEventListener('change', e => { axisMesh.visible = e.target.checked; });
$('tf').addEventListener('change', e => { autoFit = e.target.checked; rebuild(); });

/* ── Animation ────────────────────────────────────────── */

rebuild();

(function animate() {
  requestAnimationFrame(animate);
  controls.update();

  if (photon.mesh.visible) {
    const t = clock.getElapsedTime() * 1.2;
    const phase = t % (4 * Math.PI);
    const a = aR * R;
    const pt = torusPt(phase, R, a, 1, 2);
    photon.mesh.position.copy(pt);
  }

  renderer.render(scene, camera);
})();

</script>
</body>
</html>
