<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Torus Lab — totu viz</title>
<link rel="stylesheet" href="totu-viz.css">
<style>
.main-wrap { display: flex; flex: 1; overflow: hidden; }
#left-panel {
  width: 300px; overflow-y: auto; border-right: 1px solid var(--border);
  background: rgba(14,14,18,0.95); font-size: 13px;
  flex-shrink: 0;
}
#left-panel::-webkit-scrollbar { width: 4px; }
#left-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
#main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#view-3d { flex: 2; min-height: 160px; position: relative; }
.cpanel { flex: 1; min-height: 90px; border-top: 1px solid var(--border); position: relative; }
.cpanel canvas { display: block; width: 100%; height: 100%; }
.lp-sec { border-bottom: 1px solid var(--border); padding: 8px 12px; }
.lp-sec h3 { font-size: 12px; margin: 0 0 6px 0; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
.lp-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; flex-wrap: wrap; }
.lp-lbl { color: #aaa; font-size: 12px; min-width: 22px; }
.lp-val { color: var(--accent); font-size: 12px; font-family: monospace; }
.lp-input {
  width: 56px; background: #111; border: 1px solid var(--border);
  color: var(--text); border-radius: 3px; padding: 2px 5px; font-size: 12px;
}
select.lp-input { width: auto; font-size: 12px; }
.nc-row {
  display: flex; align-items: center; gap: 6px; margin: 3px 0;
  padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px;
  background: rgba(20,20,30,0.6);
}
.nc-swatch { width: 8px; height: 16px; border-radius: 2px; flex-shrink: 0; }
#status-bar {
  height: 24px; padding: 2px 14px; font-size: 12px; color: #aaa;
  border-top: 1px solid var(--border); background: var(--surface);
  display: flex; align-items: center; flex-shrink: 0;
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>Torus Lab</h1><div class="sep"></div>
  <div class="cg">
    <label title="Aspect ratio ε = tube radius / ring radius. Controls the shape of the torus cross-section. Small values make a thin ring; large values make a fat donut.">a/R</label>
    <input type="range" id="sl-eps" min="0" max="1" step="0.001" value="0.248" title="Drag to set aspect ratio ε = a/R">
    <span class="val" id="v-eps">0.50</span>
  </div>
  <div class="cg" style="gap:3px">
    <button class="btn on" data-ar="0.50" title="Ring: ε=0.50 — thin ring torus">Ring</button>
    <button class="btn" data-ar="1.00" title="Horn: ε=1.00 — tube radius equals ring radius">Horn</button>
    <button class="btn" data-ar="2.00" title="Fat: ε=2.00 — self-intersecting geometry">r=2</button>
  </div>
  <div class="sep"></div>
  <div class="cg">
    <label title="Shear s = helical offset per tube revolution. Relates tube and ring coordinates; determines charge via α formula. Units: fraction of tube circumference.">shear</label>
    <input type="range" id="sl-s" min="0" max="0.5" step="0.0001" value="0.068" title="Drag to set shear parameter s">
    <span class="val" id="v-s">0.0680</span>
  </div>
  <button class="btn" id="btn-solve" title="Auto-solve shear s so α matches the fine-structure constant 1/137.036">Solve α</button>
  <div class="sep"></div>
  <div class="cg tog"><label title="Show photon paths (torus knot geodesics) for the selected mode and ghost on the 3D torus and 2D sheet"><input type="checkbox" id="cb-geo" checked> geodesics</label></div>
  <div class="cg tog"><label title="Show wireframe mesh on the 3D torus surface"><input type="checkbox" id="cb-wire"> wire</label></div>
</div>

<div class="main-wrap">
<div id="left-panel">

  <div class="lp-sec">
    <h3 title="Select which material sheet (particle type) to analyze. Sets the reference mass for physical dimensions.">Particle</h3>
    <div class="lp-row">
      <select class="lp-input" id="sel-particle" title="Electron: Ma_e sheet. Proton: Ma_p sheet. Custom: arbitrary mass.">
        <option value="electron">Electron</option>
        <option value="proton">Proton</option>
        <option value="custom">Custom</option>
      </select>
      <input type="number" class="lp-input" id="in-mass" style="width:80px;display:none" step="any" title="Custom particle mass in kg">
    </div>
  </div>

  <div class="lp-sec" id="sec-derived">
    <h3 title="Values computed from current settings: α = fine-structure constant from shear formula; R = ring radius; a = tube radius; modes = total resonant modes found.">Derived</h3>
    <div id="derived-vals"></div>
  </div>

  <div class="lp-sec">
    <h3 title="Node constraints force f(θ₁)=0 at specified tube positions — like touching a guitar string. Modes with a natural node there survive; modes with an antinode there are killed.">Node Constraints</h3>
    <div id="nc-list"></div>
    <button class="btn" id="btn-add-nc" style="margin-top:4px" title="Add a node constraint at a tube position θ₁">+ Add Node</button>
  </div>

  <div class="lp-sec">
    <h3 title="Save and restore complete configurations (ε, shear, node constraints) to browser localStorage.">Profiles</h3>
    <div class="lp-row">
      <select class="lp-input" id="sel-profile" style="flex:1"><option value="">— none —</option></select>
      <button class="btn" id="btn-load-prof" title="Load selected profile">Load</button>
      <button class="btn" id="btn-del-prof" title="Delete selected profile">Del</button>
    </div>
    <div class="lp-row" style="margin-top:3px">
      <button class="btn" id="btn-save-prof" title="Save current settings as a named profile">Save current…</button>
    </div>
  </div>

  <div class="lp-sec">
    <h3 title="Survival scores: 1.0 = mode has natural nodes at all constraints (survives). 0.0 = mode has antinodes at constraints (killed).">Metrics</h3>
    <div id="metrics-vals"></div>
  </div>

</div>

<div id="main-area">
  <div id="view-3d" title="3D torus with energy density (orange glow) and geodesic paths. Click and drag to orbit; scroll to zoom."></div>
  <div class="cpanel" title="Unrolled torus surface: θ₂ (ring) horizontal, θ₁ (tube) vertical. Proportional to real circumferences. Orange heat = selected mode energy density. Lines = photon geodesics. Horizontal lines = node constraints."><canvas id="cv-sheet"></canvas></div>
  <div class="cpanel" title="Mode spectrum: all resonant modes sorted by mass (m/mₑ). Click a dot to select that mode and see its profile. Orange = electron, Yellow = ghost, Dim blue = charged but spin-filtered, Gray = dark/uncharged."><canvas id="cv-spectrum"></canvas></div>
  <div class="cpanel" title="Tube cross-section profile: |f(θ₁)|² shows where energy concentrates around the tube (0° = outer equator, 180° = inner equator). Orange = selected mode, Dashed yellow = ghost. Vertical lines = node constraint positions. Place nodes where the ghost is strong but the electron is weak."><canvas id="cv-profile"></canvas></div>
</div>
</div>

<div id="status-bar"></div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}}
</script>
<script type="module">
import { THREE, createScene, autoResize, animLoop } from './totu-viz.js';

const $ = id => document.getElementById(id);
const TAU = 2 * Math.PI;
const PI = Math.PI;

/* ═══════════════════════════════════════════════════════
   Constants
   ═══════════════════════════════════════════════════════ */
const ALPHA = 7.2973525693e-3;
const M_E = 9.1093837015e-31;
const M_P = 1.67262192e-27;
const HBAR = 1.054571817e-34;
const CC = 299792458;
const PARTICLE_MASS = { electron: M_E, proton: M_P };
const REF_MASS_RATIO = { muon: 206.768, tau: 3477.23, proton: 1836.15 };
const NC_COLORS = ['#ff4400','#2277cc','#22aa44','#cc44cc','#ddaa00','#00aacc','#cc6600','#8844cc'];

/* ═══════════════════════════════════════════════════════
   Non-linear a/R slider (same as torus-modes)
   ═══════════════════════════════════════════════════════ */
function sliderToAR(v) { return v <= 0.5 ? 0.01 + (v/0.5)*0.99 : 1 + ((v-0.5)/0.5)*9; }
function arToSlider(r) { return r <= 1 ? ((r-0.01)/0.99)*0.5 : 0.5+((r-1)/9)*0.5; }

/* ═══════════════════════════════════════════════════════
   State
   ═══════════════════════════════════════════════════════ */
const S = {
  eps: 0.5, shear: 0.068, particle: 'electron', customMass: M_E,
  nodes: [], selectedModeIdx: -1,
  shellAlpha: 0.5, geodesics: true, wire: false,
};
let modeData = [];

function particleMass() {
  return S.particle === 'custom' ? S.customMass : (PARTICLE_MASS[S.particle] || M_E);
}

/* ═══════════════════════════════════════════════════════
   Eigensolver (from torus-modes.html)
   ═══════════════════════════════════════════════════════ */
const NFOURIER = 16;

function solveEigenmodes(eps, qeff, parity) {
  const N = NFOURIER;
  const isEven = parity === 'even';
  const dim = isEven ? N + 1 : N;
  const NQ = 512;
  const dth = TAU / NQ;
  const H = new Float64Array(dim * dim);
  const M = new Float64Array(dim * dim);
  for (let q = 0; q < NQ; q++) {
    const th = (q + 0.5) * dth;
    const ct = Math.cos(th);
    const p = 1 + eps * ct;
    const pot = eps * eps * qeff * qeff / p;
    const w = p;
    const phi = new Float64Array(dim);
    const dphi = new Float64Array(dim);
    if (isEven) {
      for (let n = 0; n <= N; n++) { phi[n] = n === 0 ? 1 : Math.cos(n * th); dphi[n] = n === 0 ? 0 : -n * Math.sin(n * th); }
    } else {
      for (let n = 0; n < N; n++) { phi[n] = Math.sin((n+1) * th); dphi[n] = (n+1) * Math.cos((n+1) * th); }
    }
    for (let i = 0; i < dim; i++)
      for (let j = i; j < dim; j++) {
        const hij = (p * dphi[i] * dphi[j] + pot * phi[i] * phi[j]) * dth;
        const mij = (w * phi[i] * phi[j]) * dth;
        H[i*dim+j] += hij; M[i*dim+j] += mij;
        if (j !== i) { H[j*dim+i] += hij; M[j*dim+i] += mij; }
      }
  }
  const L = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++)
    for (let j = 0; j <= i; j++) {
      let sum = M[i*dim+j];
      for (let k = 0; k < j; k++) sum -= L[i*dim+k] * L[j*dim+k];
      L[i*dim+j] = i === j ? Math.sqrt(Math.max(sum, 1e-30)) : sum / L[j*dim+j];
    }
  const Linv = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++) {
    Linv[i*dim+i] = 1 / L[i*dim+i];
    for (let j = i+1; j < dim; j++) {
      let sum = 0;
      for (let k = i; k < j; k++) sum -= L[j*dim+k] * Linv[k*dim+i];
      Linv[j*dim+i] = sum / L[j*dim+j];
    }
  }
  const A = new Float64Array(dim * dim);
  const tmp = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++)
    for (let j = 0; j < dim; j++) { let s = 0; for (let k = 0; k < dim; k++) s += Linv[i*dim+k]*H[k*dim+j]; tmp[i*dim+j] = s; }
  for (let i = 0; i < dim; i++)
    for (let j = 0; j < dim; j++) { let s = 0; for (let k = 0; k < dim; k++) s += tmp[i*dim+k]*Linv[j*dim+k]; A[i*dim+j] = s; }
  const V = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++) V[i*dim+i] = 1;
  const evals = new Float64Array(dim);
  for (let i = 0; i < dim; i++) evals[i] = A[i*dim+i];
  for (let iter = 0; iter < 200; iter++) {
    let off = 0;
    for (let i = 0; i < dim; i++) for (let j = i+1; j < dim; j++) off += A[i*dim+j]**2;
    if (off < 1e-24) break;
    for (let i = 0; i < dim; i++)
      for (let j = i+1; j < dim; j++) {
        const aij = A[i*dim+j]; if (Math.abs(aij) < 1e-15) continue;
        const diff = evals[j] - evals[i];
        let t; if (Math.abs(diff) < 1e-30) t = 1;
        else { const tau = diff/(2*aij); t = Math.sign(tau)/(Math.abs(tau)+Math.sqrt(1+tau*tau)); }
        const c = 1/Math.sqrt(1+t*t), s2 = t*c;
        evals[i] -= t*aij; evals[j] += t*aij;
        A[i*dim+j] = 0; A[j*dim+i] = 0; A[i*dim+i] = evals[i]; A[j*dim+j] = evals[j];
        for (let k = 0; k < dim; k++) { if (k===i||k===j) continue;
          const aki=A[k*dim+i],akj=A[k*dim+j];
          A[k*dim+i]=A[i*dim+k]=c*aki-s2*akj; A[k*dim+j]=A[j*dim+k]=s2*aki+c*akj; }
        for (let k = 0; k < dim; k++) { const vki=V[k*dim+i],vkj=V[k*dim+j];
          V[k*dim+i]=c*vki-s2*vkj; V[k*dim+j]=s2*vki+c*vkj; }
      }
  }
  const order = Array.from({length:dim},(_,i)=>i).sort((a,b)=>evals[a]-evals[b]);
  const evecs = [], sortedEvals = new Float64Array(dim);
  for (let idx = 0; idx < dim; idx++) {
    const oi = order[idx]; sortedEvals[idx] = evals[oi];
    const u = new Float64Array(dim);
    for (let k = 0; k < dim; k++) u[k] = V[k*dim+oi];
    const v = new Float64Array(dim);
    for (let i = dim-1; i >= 0; i--) { let s = u[i]; for (let k = i+1; k < dim; k++) s -= L[k*dim+i]*v[k]; v[i] = s/L[i*dim+i]; }
    evecs.push(v);
  }
  return { eigenvalues: sortedEvals, eigenvectors: evecs };
}

const DENSITY_N = 256;

function evalDensity(coeffs, parity, nSamples) {
  const isEven = parity === 'even';
  const out = new Float64Array(nSamples);
  for (let i = 0; i < nSamples; i++) {
    const th = (i / nSamples) * TAU;
    let f = 0;
    if (isEven) { for (let n = 0; n < coeffs.length; n++) f += coeffs[n] * (n === 0 ? 1 : Math.cos(n*th)); }
    else { for (let n = 0; n < coeffs.length; n++) f += coeffs[n] * Math.sin((n+1)*th); }
    out[i] = f * f;
  }
  let mx = 0; for (let i = 0; i < nSamples; i++) if (out[i] > mx) mx = out[i];
  if (mx > 0) for (let i = 0; i < nSamples; i++) out[i] /= mx;
  return out;
}

function chargeOverlap(coeffs, parity, eps) {
  const NQ = 512, dth = TAU / NQ;
  let c = 0, norm = 0;
  for (let q = 0; q < NQ; q++) {
    const th = (q+0.5)*dth, ct = Math.cos(th);
    let f = 0;
    if (parity === 'even') { for (let n = 0; n < coeffs.length; n++) f += coeffs[n]*(n===0?1:Math.cos(n*th)); }
    else { for (let n = 0; n < coeffs.length; n++) f += coeffs[n]*Math.sin((n+1)*th); }
    const w = 1 + eps*ct;
    c += f*ct*w*dth; norm += f*f*w*dth;
  }
  return norm > 0 ? c/Math.sqrt(norm) : 0;
}

/* ═══════════════════════════════════════════════════════
   Physics helpers
   ═══════════════════════════════════════════════════════ */
function alphaFormula(eps, s) {
  const q = 2 - s;
  if (q <= 0) return 0;
  const sn = Math.sin(TAU * s);
  if (Math.abs(sn) < 1e-15) return 0;
  const mu = Math.sqrt(1/(eps*eps) + q*q);
  return mu * sn*sn / (4*PI*q*q);
}

function solveShear(eps) {
  let lo = 0.001, hi = 0.499;
  for (let i = 0; i < 80; i++) {
    const mid = (lo+hi)/2;
    if (alphaFormula(eps, mid) > ALPHA) hi = mid; else lo = mid;
  }
  return (lo+hi)/2;
}

function modeMu(eps, qeff) { return Math.sqrt(1/(eps*eps) + qeff*qeff); }

function densityAt(density, theta1Deg) {
  const idx = Math.floor(((theta1Deg / 360 % 1 + 1) % 1) * density.length) % density.length;
  return density[idx];
}

function getAnchor() { return S.nodes.find(nc => nc.enabled); }

function density2D(density, qeff, theta1Deg, theta2Deg, anchor) {
  const d1 = densityAt(density, theta1Deg);
  if (!anchor) return d1;
  const dt2 = (theta2Deg - anchor.theta2) * PI / 180;
  return d1 * Math.sin(qeff * dt2) ** 2;
}

/* ═══════════════════════════════════════════════════════
   Mode sweep
   ═══════════════════════════════════════════════════════ */
function sweepModes() {
  modeData = [];
  for (let n2 = 1; n2 <= 6; n2++) {
    for (let n1 = 0; n1 <= 3; n1++) {
      for (const parity of ['even', 'odd']) {
        if (parity === 'odd' && n1 === 0) continue;
        const qeff = n2 - S.shear * n1;
        if (qeff <= 0.01) continue;
        const result = solveEigenmodes(S.eps, qeff, parity);
        const eigIdx = parity === 'even' ? n1 : Math.max(0, n1-1);
        if (eigIdx >= result.eigenvectors.length) continue;
        const coeffs = result.eigenvectors[eigIdx];
        const ev = result.eigenvalues[eigIdx];
        if (ev < 0) continue;
        const density = evalDensity(coeffs, parity, DENSITY_N);
        const C = chargeOverlap(coeffs, parity, S.eps);
        const mu = modeMu(S.eps, qeff);
        modeData.push({ n1, n2, parity, qeff, eigenvalue: ev, coeffs, density,
          chargeOverlap: C, mu, survival: 1 });
      }
    }
  }
  modeData.sort((a, b) => a.mu - b.mu);
  const elIdx = modeData.findIndex(m => m.n1===1 && m.n2===2 && m.parity==='even');
  if (S.selectedModeIdx < 0 || S.selectedModeIdx >= modeData.length) S.selectedModeIdx = Math.max(0, elIdx);
  computeSurvival();
}

function computeSurvival() {
  const anchor = getAnchor();
  for (const m of modeData) {
    let s = 1;
    for (const nc of S.nodes) {
      if (!nc.enabled) continue;
      if (nc === anchor) continue;
      const d = density2D(m.density, m.qeff, nc.theta1, nc.theta2, anchor);
      s *= (1 - d);
    }
    m.survival = s;
  }
}

function electronIdx() { return modeData.findIndex(m => m.n1===1 && m.n2===2 && m.parity==='even'); }
function ghostIdx() { return modeData.findIndex(m => m.n1===1 && m.n2===1 && m.parity==='even'); }

/* ═══════════════════════════════════════════════════════
   3D Scene
   ═══════════════════════════════════════════════════════ */
const R_MAJOR = 2.0;
const { scene, camera, renderer, controls } = createScene($('view-3d'), { camPos: [3,2,3.5], far: 300, maxDistance: 80 });
autoResize(renderer, camera, $('view-3d'));

const shellMat = new THREE.MeshPhongMaterial({ color: 0x0d1520, transparent: true, opacity: 0.2, side: THREE.DoubleSide, depthWrite: false, shininess: 50 });
const glowMat = new THREE.MeshBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.8, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending });
const wireMat = new THREE.MeshBasicMaterial({ color: 0x334455, wireframe: true, transparent: true, opacity: 0.07, side: THREE.DoubleSide });

let torusGeom = null, shellMesh = null, glowMesh = null, wireMesh = null;
let geoMeshes = [];

function buildTorusGeom(R, a, segU, segV) {
  const nv = (segU+1)*(segV+1);
  const pos = new Float32Array(nv*3), col = new Float32Array(nv*3);
  const th1s = new Float32Array(nv), th2s = new Float32Array(nv);
  const idx = [];
  let vi=0,ci=0,ti=0;
  for (let i = 0; i <= segU; i++) {
    const th = (i/segU)*TAU, ct = Math.cos(th), st = Math.sin(th);
    for (let j = 0; j <= segV; j++) {
      const ph = (j/segV)*TAU, rr = R+a*ct;
      pos[vi++]=rr*Math.cos(ph); pos[vi++]=a*st; pos[vi++]=rr*Math.sin(ph);
      col[ci++]=0; col[ci++]=0; col[ci++]=0;
      th1s[ti]=th; th2s[ti]=ph; ti++;
    }
  }
  for (let i = 0; i < segU; i++) for (let j = 0; j < segV; j++) {
    const a_=i*(segV+1)+j, b_=a_+segV+1;
    idx.push(a_,b_,a_+1, b_,b_+1,a_+1);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(col,3));
  g.setIndex(idx); g.computeVertexNormals();
  g.userData = { th1s, th2s };
  return g;
}

function rebuildTorus() {
  if (shellMesh) scene.remove(shellMesh, glowMesh, wireMesh);
  if (torusGeom) torusGeom.dispose();
  const a = S.eps * R_MAJOR;
  torusGeom = buildTorusGeom(R_MAJOR, a, 64, 128);
  shellMesh = new THREE.Mesh(torusGeom, shellMat);
  glowMesh = new THREE.Mesh(torusGeom, glowMat);
  wireMesh = new THREE.Mesh(torusGeom, wireMat);
  wireMesh.visible = S.wire;
  scene.add(shellMesh, glowMesh, wireMesh);
  const bound = R_MAJOR + a + 0.2, dist = bound * 2.5;
  camera.position.set(dist*0.5, dist*0.65, dist*0.68);
  controls.target.set(0,0,0); controls.update();
}

function updateVertexColors() {
  if (!torusGeom) return;
  const { th1s, th2s } = torusGeom.userData;
  const nv = th1s.length, arr = torusGeom.attributes.color.array;
  const md = modeData[S.selectedModeIdx];
  const modeCol = new THREE.Color('#ff6e40');
  const anchor = getAnchor();
  for (let vi = 0; vi < nv; vi++) {
    if (!md) { arr[vi*3]=0; arr[vi*3+1]=0; arr[vi*3+2]=0; continue; }
    const si = Math.floor(((th1s[vi]/TAU+1)%1)*DENSITY_N) % DENSITY_N;
    let d = md.density[si];
    if (anchor) {
      const dt2 = th2s[vi] - anchor.theta2 * PI / 180;
      d *= Math.sin(md.qeff * dt2) ** 2;
    }
    arr[vi*3]=modeCol.r*d*0.8; arr[vi*3+1]=modeCol.g*d*0.8; arr[vi*3+2]=modeCol.b*d*0.8;
  }
  torusGeom.attributes.color.needsUpdate = true;
}

function rebuildGeodesics() {
  for (const m of geoMeshes) { scene.remove(m); m.geometry.dispose(); m.material.dispose(); }
  geoMeshes = [];
  if (!S.geodesics) return;
  const a = S.eps * R_MAJOR;
  if (a < 1e-6) return;
  const anchor = getAnchor();
  const configs = [];
  const sel = modeData[S.selectedModeIdx];
  if (sel) configs.push({ n1: sel.n1, n2: sel.n2, color: '#ff6e40' });
  const gi = ghostIdx();
  if (gi >= 0 && gi !== S.selectedModeIdx) configs.push({ n1: 1, n2: 1, color: '#fdd835' });
  for (const cfg of configs) {
    const nSeg = Math.max(200, (cfg.n1+cfg.n2)*60);
    const pts = [];
    const off1 = anchor ? anchor.theta1 * PI / 180 : 0;
    const off2 = anchor ? anchor.theta2 * PI / 180 : 0;
    for (let i = 0; i <= nSeg; i++) {
      const t = (i/nSeg)*TAU;
      const th1 = cfg.n1*t + off1, ph = cfg.n2*t + off2;
      const rr = R_MAJOR + a*Math.cos(th1);
      pts.push(new THREE.Vector3(rr*Math.cos(ph), a*Math.sin(th1), rr*Math.sin(ph)));
    }
    const curve = new THREE.CatmullRomCurve3(pts, true);
    const tubeR = Math.max(0.007, Math.min(0.025, 0.012/Math.max(1, S.eps*0.5)));
    const geo = new THREE.TubeGeometry(curve, nSeg, tubeR, 6, true);
    const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(cfg.color) });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh); geoMeshes.push(mesh);
  }
}

/* ═══════════════════════════════════════════════════════
   Canvas helpers
   ═══════════════════════════════════════════════════════ */
function fitCanvas(cv) {
  const p = cv.parentElement, w = p.clientWidth, h = p.clientHeight;
  const dpr = Math.min(devicePixelRatio, 2);
  cv.width = w*dpr; cv.height = h*dpr;
  cv.style.width = w+'px'; cv.style.height = h+'px';
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return { ctx, w, h };
}

/* ── 2D Sheet ─────────────────────────────────────── */
function drawSheet() {
  const { ctx, w, h } = fitCanvas($('cv-sheet'));
  ctx.fillStyle = '#0a0a10'; ctx.fillRect(0,0,w,h);
  const md = modeData[S.selectedModeIdx];
  if (!md) return;
  const pad = { l:35, r:10, t:12, b:18 };
  const avW = w-pad.l-pad.r, avH = h-pad.t-pad.b;
  const realAR = Math.max(0.05, S.eps);
  let pw, ph;
  if (avH / avW > realAR) { pw = avW; ph = pw * realAR; }
  else { ph = avH; pw = ph / realAR; }
  const ox = pad.l + (avW - pw) / 2;
  const oy = pad.t + (avH - ph) / 2;
  const anchor = getAnchor();
  // 2D heatmap — draw pixel-by-pixel using fillRect to respect canvas transform
  for (let py = 0; py < Math.ceil(ph); py++) {
    const th1 = (py / ph) * 360;
    const d1 = densityAt(md.density, th1);
    if (!anchor) {
      const r = Math.floor(d1*255*0.7), g = Math.floor(d1*120*0.7), b = Math.floor(d1*40*0.3);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(ox, oy+py, pw, 1);
    } else {
      const step = Math.max(1, Math.floor(pw / 200));
      for (let px = 0; px < Math.ceil(pw); px += step) {
        const th2 = (px / pw) * 360;
        const d = d1 * Math.sin(md.qeff * (th2 - anchor.theta2) * PI / 180) ** 2;
        const r = Math.floor(d*255*0.7), g = Math.floor(d*120*0.7), b = Math.floor(d*40*0.3);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(ox+px, oy+py, step, 1);
      }
    }
  }
  // Geodesics — launch from anchor node, or drift if none
  const drawGeo = (n1, n2, color, off1, off2) => {
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.7;
    const steps = 800;
    let prevX = null, prevY = null;
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const t1 = (((n1 * t * 360 + off1) % 360) + 360) % 360;
      const t2 = (((n2 * t * 360 + off2) % 360) + 360) % 360;
      const y = (t1 / 360) * ph + oy;
      const x = (t2 / 360) * pw + ox;
      if (prevX !== null) {
        const dx = Math.abs(x - prevX), dy = Math.abs(y - prevY);
        if (dx > pw * 0.4 || dy > ph * 0.4) {
          ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        } else { ctx.lineTo(x, y); }
      } else { ctx.moveTo(x, y); }
      prevX = x; prevY = y;
    }
    ctx.stroke(); ctx.globalAlpha = 1;
  };
  if (S.geodesics) {
    const now = performance.now() * 0.001;
    if (anchor) {
      drawGeo(md.n1, md.n2, '#ff6e40', anchor.theta1, anchor.theta2);
      const gi = ghostIdx();
      if (gi >= 0 && gi !== S.selectedModeIdx) {
        const gm = modeData[gi];
        drawGeo(gm.n1, gm.n2, '#fdd835', anchor.theta1, anchor.theta2);
      }
    } else {
      const eOff1 = (now * 11.0) % 360, eOff2 = (now * 7.3 + 137) % 360;
      drawGeo(md.n1, md.n2, '#ff6e40', eOff1, eOff2);
      const gi = ghostIdx();
      if (gi >= 0 && gi !== S.selectedModeIdx) {
        const gm = modeData[gi];
        const gOff1 = (now * 5.7 + 83) % 360, gOff2 = (now * 9.1 + 211) % 360;
        drawGeo(gm.n1, gm.n2, '#fdd835', gOff1, gOff2);
      }
    }
  }
  // Node constraints as dots
  for (const nc of S.nodes) {
    if (!nc.enabled) continue;
    const nx = (nc.theta2 / 360) * pw + ox;
    const ny = (nc.theta1 / 360) * ph + oy;
    ctx.fillStyle = nc.color; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(nx, ny, 5, 0, TAU); ctx.fill(); ctx.stroke();
  }
  // Border
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.strokeRect(ox, oy, pw, ph);
  // Axes
  ctx.fillStyle = '#bbb'; ctx.font = '11px monospace';
  ctx.fillText('0°', ox-2, oy+ph+14);
  ctx.fillText('360°', ox+pw-22, oy+ph+14);
  ctx.save(); ctx.translate(ox-18, oy+ph/2); ctx.rotate(-PI/2);
  ctx.fillText('θ₁', -6, 0); ctx.restore();
  ctx.fillStyle = '#aaa'; ctx.font = '10px monospace';
  ctx.fillText('θ₂ →', ox+pw/2-14, oy+ph+14);
  ctx.fillStyle = '#999'; ctx.font = '9px monospace';
  ctx.fillText(`${S.eps.toFixed(2)}:1`, ox+pw-30, oy-3);
  if (anchor) { ctx.fillStyle = '#8cf'; ctx.fillText('phase-locked', ox+2, oy-3); }
}

/* ── Spectrum ─────────────────────────────────────── */
function drawSpectrum() {
  const { ctx, w, h } = fitCanvas($('cv-spectrum'));
  ctx.fillStyle = '#0a0a10'; ctx.fillRect(0,0,w,h);
  if (modeData.length === 0) return;
  const eIdx = electronIdx(), eMu = eIdx >= 0 ? modeData[eIdx].mu : 1;
  const pad = { l:48, r:15, t:16, b:22 };
  const pw = w-pad.l-pad.r, ph = h-pad.t-pad.b;
  const maxRatio = Math.min(20, Math.max(5, modeData[modeData.length-1].mu/eMu*1.1));
  const minRatio = 0.3;
  const logMin = Math.log10(minRatio), logMax = Math.log10(maxRatio);
  const yOf = ratio => { const lr = Math.log10(Math.max(ratio, minRatio)); return pad.t + ph*(1 - (lr-logMin)/(logMax-logMin)); };

  // ── Generation markers (triangles on Y-axis) ──
  const GEN = [
    { name: 'e⁻', ratio: 1.0, color: '#ff6e40' },
    { name: 'μ⁻', ratio: 206.768, color: '#66bb6a' },
    { name: 'τ⁻', ratio: 3477.23, color: '#ab47bc' },
  ];
  for (const g of GEN) {
    if (g.ratio <= maxRatio) {
      const y = yOf(g.ratio);
      ctx.fillStyle = g.color;
      ctx.beginPath(); ctx.moveTo(pad.l-1, y-6); ctx.lineTo(pad.l+7, y); ctx.lineTo(pad.l-1, y+6); ctx.fill();
      ctx.font = '11px sans-serif';
      ctx.fillText(g.name, 4, y+4);
      ctx.strokeStyle = g.color + '44'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+pw, y); ctx.stroke();
      ctx.setLineDash([]);
    } else {
      ctx.fillStyle = g.color; ctx.font = '10px sans-serif';
      ctx.beginPath(); ctx.moveTo(pad.l-1, pad.t+2); ctx.lineTo(pad.l+5, pad.t-4); ctx.lineTo(pad.l-1, pad.t-4); ctx.fill();
    }
  }
  // Off-chart generation labels at top
  let offX = pad.l + 10;
  ctx.font = '10px sans-serif';
  for (const g of GEN) {
    if (g.ratio <= maxRatio) continue;
    ctx.fillStyle = g.color;
    const lbl = `↑ ${g.name} ${g.ratio.toFixed(0)}×`;
    ctx.fillText(lbl, offX, pad.t + 10);
    offX += ctx.measureText(lbl).width + 14;
  }

  // ── Build visible list ──
  const visible = [];
  for (let i = 0; i < modeData.length; i++) {
    const ratio = modeData[i].mu / eMu;
    if (ratio >= minRatio && ratio <= maxRatio) visible.push(i);
  }
  const colW = visible.length > 0 ? pw / visible.length : pw;
  const hasConstraints = S.nodes.some(nc => nc.enabled);

  // R33 F1: only |n₁|=1 modes carry charge from WvM integral
  // R21: only even parity has nonzero charge overlap C
  const isChargedMode = m => m.n1 === 1 && m.parity === 'even';

  // ── Draw mode dots ──
  let lastLabelX = -Infinity;
  for (let vi = 0; vi < visible.length; vi++) {
    const i = visible[vi];
    const m = modeData[i];
    const ratio = m.mu / eMu;
    const x = pad.l + (vi + 0.5) * colW;
    const y = yOf(ratio);
    const isElectron = i === eIdx, isGhost = i === ghostIdx(), isSel = i === S.selectedModeIdx;
    const charged = isChargedMode(m);
    const killed = hasConstraints && m.survival < 0.1;
    const weakened = hasConstraints && m.survival < 0.5 && !killed;

    const isKey = isElectron || isGhost || isSel;
    const r = isKey ? 7 : (charged ? 5 : 3.5);

    ctx.globalAlpha = killed ? 0.15 : (weakened ? 0.4 : 1);

    if (isSel) {
      ctx.fillStyle = '#ff6e40'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill(); ctx.stroke();
    } else if (isElectron) {
      ctx.fillStyle = '#ff6e40'; ctx.strokeStyle = '#ff6e40'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill(); ctx.stroke();
    } else if (isGhost) {
      ctx.fillStyle = '#fdd835'; ctx.strokeStyle = '#fdd835'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill(); ctx.stroke();
    } else if (charged) {
      ctx.fillStyle = '#4fc3f733'; ctx.strokeStyle = '#4fc3f755'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill(); ctx.stroke();
    } else {
      ctx.fillStyle = '#33333366'; ctx.strokeStyle = '#44444466'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill(); ctx.stroke();
    }

    // X through killed modes
    if (killed && isKey) {
      ctx.strokeStyle = '#f44'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x-r, y-r); ctx.lineTo(x+r, y+r); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+r, y-r); ctx.lineTo(x-r, y+r); ctx.stroke();
    }

    ctx.globalAlpha = 1;

    // Labels
    const forceLabel = isSel || isElectron || isGhost;
    if (forceLabel || (charged && x - lastLabelX > 40)) {
      ctx.fillStyle = forceLabel ? '#ddd' : '#888'; ctx.font = '9px monospace';
      const lbl = isElectron ? 'e⁻' : (isGhost ? 'ghost' : `${m.n1},${m.n2}`);
      const survTxt = hasConstraints && isKey ? ` ${(m.survival*100).toFixed(0)}%` : '';
      ctx.fillText(lbl + survTxt, x - ctx.measureText(lbl + survTxt).width/2, y - r - 4);
      lastLabelX = x;
    }
  }

  // ── Y axis grid ──
  ctx.fillStyle = '#bbb'; ctx.font = '10px monospace';
  for (const v of [0.5, 1, 2, 5, 10]) {
    if (v < minRatio || v > maxRatio) continue;
    const y = yOf(v);
    ctx.fillText(v.toString(), 2, y+4);
    ctx.strokeStyle = '#1a1a2a'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+pw, y); ctx.stroke();
  }
  ctx.fillStyle = '#aaa'; ctx.font = '10px sans-serif';
  ctx.fillText('m/mₑ', 2, pad.t-3);

  // ── Legend (bottom-right) ──
  const lgW = 175, lgH = 64;
  const lgX = pad.l + pw - lgW + 4, lgY = pad.t + ph - lgH + 4;
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = '#0a0a10dd'; ctx.fillRect(lgX-4, lgY-4, lgW, lgH);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5;
  ctx.strokeRect(lgX-4, lgY-4, lgW, lgH);
  ctx.globalAlpha = 1;
  ctx.font = '9px sans-serif';
  let ly = lgY + 6;
  ctx.fillStyle = '#ff6e40'; ctx.beginPath(); ctx.arc(lgX+5, ly, 5, 0, TAU); ctx.fill();
  ctx.fillStyle = '#bbb'; ctx.fillText('electron (1,2)', lgX+16, ly+3);
  ly += 14;
  ctx.fillStyle = '#fdd835'; ctx.beginPath(); ctx.arc(lgX+5, ly, 5, 0, TAU); ctx.fill();
  ctx.fillStyle = '#bbb'; ctx.fillText('ghost (1,1) — unobserved', lgX+16, ly+3);
  ly += 14;
  ctx.fillStyle = '#4fc3f733'; ctx.strokeStyle = '#4fc3f755'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(lgX+5, ly, 4, 0, TAU); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#999'; ctx.fillText('charged, spin-filtered (R33)', lgX+16, ly+3);
  ly += 14;
  ctx.fillStyle = '#33333366'; ctx.beginPath(); ctx.arc(lgX+5, ly, 3, 0, TAU); ctx.fill();
  ctx.fillStyle = '#888'; ctx.fillText('dark / uncharged', lgX+16, ly+3);
}

/* ── 1D Profile ───────────────────────────────────── */
function drawProfile() {
  const { ctx, w, h } = fitCanvas($('cv-profile'));
  ctx.fillStyle = '#0a0a10'; ctx.fillRect(0,0,w,h);
  const pad = { l:35, r:10, t:12, b:18 };
  const pw = w-pad.l-pad.r, ph = h-pad.t-pad.b;
  const sel = modeData[S.selectedModeIdx];
  const gi = ghostIdx();
  const ghost = gi >= 0 ? modeData[gi] : null;
  // Draw profile curves
  const drawCurve = (density, color, dash) => {
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash(dash);
    ctx.beginPath();
    for (let i = 0; i <= DENSITY_N; i++) {
      const si = i % DENSITY_N;
      const x = pad.l + (i/DENSITY_N)*pw;
      const y = pad.t + ph*(1 - density[si]);
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke(); ctx.setLineDash([]);
  };
  if (sel) drawCurve(sel.density, '#ff6e40', []);
  if (ghost && ghost !== sel) drawCurve(ghost.density, '#fdd835', [6,3]);
  // Node constraint lines (on profile, θ₁ only — θ₂ modulation shown on sheet)
  const anchor = getAnchor();
  for (const nc of S.nodes) {
    if (!nc.enabled) continue;
    const isAnc = nc === anchor;
    ctx.strokeStyle = nc.color; ctx.lineWidth = isAnc ? 2 : 1.5;
    const xc = pad.l + (nc.theta1/360)*pw;
    ctx.setLineDash(isAnc ? [] : [4,3]);
    ctx.beginPath(); ctx.moveTo(xc, pad.t); ctx.lineTo(xc, pad.t+ph); ctx.stroke();
    ctx.setLineDash([]);
    if (sel) {
      const d = density2D(sel.density, sel.qeff, nc.theta1, nc.theta2, anchor);
      ctx.fillStyle = d < 0.1 ? '#4a4' : '#f44'; ctx.font = '10px monospace';
      ctx.fillText(`e:${d.toFixed(2)}`, xc+4, pad.t+12);
    }
    if (ghost) {
      const d = density2D(ghost.density, ghost.qeff, nc.theta1, nc.theta2, anchor);
      ctx.fillStyle = d < 0.1 ? '#4a4' : '#f44'; ctx.font = '10px monospace';
      ctx.fillText(`g:${d.toFixed(2)}`, xc+4, pad.t+24);
    }
  }
  // Axes
  ctx.fillStyle = '#bbb'; ctx.font = '11px monospace';
  ctx.fillText('0°', pad.l-2, pad.t+ph+14);
  ctx.fillText('360°', pad.l+pw-22, pad.t+ph+14);
  ctx.fillStyle = '#aaa'; ctx.font = '10px sans-serif';
  ctx.fillText('θ₁ →', pad.l+pw/2-12, pad.t+ph+14);
  ctx.fillText('|f|²', 2, pad.t+10);
  // Legend
  ctx.font = '10px sans-serif';
  ctx.fillStyle = '#ff6e40'; ctx.fillText('● selected', pad.l+pw-68, pad.t+12);
  if (ghost) { ctx.fillStyle = '#fdd835'; ctx.fillText('- - ghost', pad.l+pw-68, pad.t+24); }
}

/* ═══════════════════════════════════════════════════════
   Spectrum click → select mode
   ═══════════════════════════════════════════════════════ */
$('cv-spectrum').addEventListener('click', e => {
  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const padL = 48, pw = rect.width - padL - 15;
  const eIdx2 = electronIdx(), eMu2 = eIdx2 >= 0 ? modeData[eIdx2].mu : 1;
  const maxR = Math.min(20, Math.max(5, modeData.length > 0 ? modeData[modeData.length-1].mu/eMu2*1.1 : 5));
  const vis = [];
  for (let i = 0; i < modeData.length; i++) { const r2 = modeData[i].mu/eMu2; if (r2 >= 0.3 && r2 <= maxR) vis.push(i); }
  const cw = vis.length > 0 ? pw / vis.length : pw;
  const vi = Math.floor((x - padL) / cw);
  if (vi >= 0 && vi < vis.length) { S.selectedModeIdx = vis[vi]; fullRedraw(); }
});

/* ═══════════════════════════════════════════════════════
   Node constraint UI
   ═══════════════════════════════════════════════════════ */
function renderConstraints() {
  const list = $('nc-list');
  list.innerHTML = '';
  const anchor = getAnchor();
  S.nodes.forEach((nc, idx) => {
    if (nc.theta2 === undefined) nc.theta2 = 0;
    const isAnchor = nc === anchor;
    const div = document.createElement('div');
    div.className = 'nc-row';
    div.style.opacity = nc.enabled ? '1' : '0.4';
    div.innerHTML = `
      <input type="checkbox" class="nc-en" data-i="${idx}" ${nc.enabled ? 'checked' : ''} title="Enable/disable">
      <div class="nc-swatch" style="background:${nc.color}"></div>
      <span class="lp-lbl" title="Tube position (0°=outer, 180°=inner)">θ₁</span>
      <input type="number" class="lp-input nc-t1" data-i="${idx}" value="${nc.theta1}" min="0" max="360" step="0.1" style="width:54px">
      <span class="lp-lbl" title="Ring position">θ₂</span>
      <input type="number" class="lp-input nc-t2" data-i="${idx}" value="${nc.theta2}" min="0" max="360" step="0.1" style="width:54px">
      ${isAnchor ? '<span style="color:#4a4;font-size:9px" title="This node pins the standing wave phase">⚓</span>' : ''}
      <button class="btn" data-del="${idx}" title="Remove" style="margin-left:auto">✕</button>`;
    list.appendChild(div);
  });
  list.querySelectorAll('.nc-en').forEach(el => el.onchange = function() { S.nodes[+this.dataset.i].enabled = this.checked; onNCChange(); renderConstraints(); });
  list.querySelectorAll('.nc-t1').forEach(el => el.onchange = function() { S.nodes[+this.dataset.i].theta1 = +this.value; onNCChange(); });
  list.querySelectorAll('.nc-t2').forEach(el => el.onchange = function() { S.nodes[+this.dataset.i].theta2 = +this.value; onNCChange(); });
  list.querySelectorAll('[data-del]').forEach(el => el.onclick = function() { S.nodes.splice(+this.dataset.del, 1); onNCChange(); renderConstraints(); });
}

function onNCChange() { computeSurvival(); fullRedraw(); }

$('btn-add-nc').onclick = () => {
  S.nodes.push({
    theta1: 180, theta2: 0, enabled: true,
    color: NC_COLORS[S.nodes.length % NC_COLORS.length],
  });
  renderConstraints(); onNCChange();
};

/* ═══════════════════════════════════════════════════════
   Derived values + Metrics
   ═══════════════════════════════════════════════════════ */
function updateDerived() {
  const a = alphaFormula(S.eps, S.shear);
  const m = particleMass();
  const lambdaBar = HBAR / (m * CC);
  const eIdx = electronIdx();
  const eMu = eIdx >= 0 ? modeData[eIdx].mu : 1;
  const R = lambdaBar * eMu;
  const aPhys = S.eps * R;
  const html = [
    `<div class="lp-row"><span class="lp-lbl">α</span><span class="lp-val">1/${(1/a).toFixed(3)}</span></div>`,
    `<div class="lp-row"><span class="lp-lbl">s</span><span class="lp-val">${S.shear.toFixed(6)}</span></div>`,
    `<div class="lp-row"><span class="lp-lbl">R</span><span class="lp-val">${(R*1e15).toFixed(2)} fm</span></div>`,
    `<div class="lp-row"><span class="lp-lbl">a</span><span class="lp-val">${(aPhys*1e15).toFixed(2)} fm</span></div>`,
    `<div class="lp-row"><span class="lp-lbl">modes</span><span class="lp-val">${modeData.length}</span></div>`,
  ];
  const sel = modeData[S.selectedModeIdx];
  if (sel) {
    const charged = sel.n1 === 1 && sel.parity === 'even';
    const tag = charged ? ' ⚡' : ' (dark)';
    html.push(`<div class="lp-row"><span class="lp-lbl">sel</span><span class="lp-val">(${sel.n1},${sel.n2}) ${sel.parity[0]}${tag}</span></div>`);
    html.push(`<div class="lp-row"><span class="lp-lbl">μ</span><span class="lp-val">${sel.mu.toFixed(4)}</span></div>`);
    html.push(`<div class="lp-row"><span class="lp-lbl">q_eff</span><span class="lp-val">${sel.qeff.toFixed(4)}</span></div>`);
    html.push(`<div class="lp-row"><span class="lp-lbl">C</span><span class="lp-val">${sel.chargeOverlap.toFixed(4)}</span></div>`);
    if (charged) {
      const spin = `${sel.n1}/${sel.n2}`;
      html.push(`<div class="lp-row"><span class="lp-lbl">spin</span><span class="lp-val">${spin}</span></div>`);
    }
  }
  $('derived-vals').innerHTML = html.join('');
}

function updateMetrics() {
  const eIdx2 = electronIdx(), gi2 = ghostIdx();
  const el = eIdx2 >= 0 ? modeData[eIdx2] : null;
  const gh = gi2 >= 0 ? modeData[gi2] : null;
  const hasNC = S.nodes.some(nc => nc.enabled);
  const lines = [];
  if (hasNC) {
    const fmtSurv = (m, label, col) => {
      const pct = (m.survival * 100).toFixed(1);
      const status = m.survival > 0.9 ? '✓ lives' : (m.survival < 0.1 ? '✗ killed' : '⚠ weakened');
      const sc = m.survival > 0.9 ? '#4a4' : (m.survival < 0.1 ? '#f44' : '#da4');
      return `<div class="lp-row"><span class="lp-lbl" style="color:${col}">${label}</span><span class="lp-val" style="color:${sc}">${pct}% ${status}</span></div>`;
    };
    if (el) lines.push(fmtSurv(el, 'e⁻', '#ff6e40'));
    if (gh) lines.push(fmtSurv(gh, 'ghost', '#fdd835'));
    const anc = getAnchor();
    for (const nc of S.nodes) {
      if (!nc.enabled) continue;
      const isAnc = nc === anc;
      const de = el ? density2D(el.density, el.qeff, nc.theta1, nc.theta2, anc).toFixed(2) : '-';
      const dg = gh ? density2D(gh.density, gh.qeff, nc.theta1, nc.theta2, anc).toFixed(2) : '-';
      const lbl = `(${nc.theta1.toFixed(0)},${nc.theta2.toFixed(0)})${isAnc?' ⚓':''}`;
      lines.push(`<div class="lp-row" style="color:${nc.color}"><span class="lp-lbl">${lbl}</span><span class="lp-val">e:${de} g:${dg}</span></div>`);
    }
  } else {
    lines.push('<div class="lp-row"><span class="lp-val" style="color:#555">Add nodes to see survival</span></div>');
  }
  $('metrics-vals').innerHTML = lines.join('');
}

/* ═══════════════════════════════════════════════════════
   Profiles (save / load)
   ═══════════════════════════════════════════════════════ */
const PROF_KEY = 'torus-lab-profiles';
function getProfiles() { try { return JSON.parse(localStorage.getItem(PROF_KEY) || '{}'); } catch { return {}; } }
function saveProfiles(p) { localStorage.setItem(PROF_KEY, JSON.stringify(p)); }

function refreshProfileList() {
  const sel = $('sel-profile'), profs = getProfiles();
  sel.innerHTML = '<option value="">— none —</option>';
  for (const name of Object.keys(profs).sort()) {
    const o = document.createElement('option'); o.value = name; o.textContent = name;
    sel.appendChild(o);
  }
}

$('btn-save-prof').onclick = () => {
  const name = prompt('Profile name:');
  if (!name) return;
  const profs = getProfiles();
  profs[name] = { eps: S.eps, shear: S.shear, particle: S.particle, customMass: S.customMass, nodes: structuredClone(S.nodes) };
  saveProfiles(profs); refreshProfileList();
  $('sel-profile').value = name;
};

$('btn-load-prof').onclick = () => {
  const name = $('sel-profile').value;
  if (!name) return;
  const profs = getProfiles();
  const p = profs[name]; if (!p) return;
  S.eps = p.eps; S.shear = p.shear; S.particle = p.particle;
  S.customMass = p.customMass || M_E;
  S.nodes = structuredClone(p.nodes || p.slotGroups || []);
  S.selectedModeIdx = -1;
  syncControls(); rebuildTorus(); fullRecompute();
};

$('btn-del-prof').onclick = () => {
  const name = $('sel-profile').value;
  if (!name) return;
  const profs = getProfiles();
  delete profs[name]; saveProfiles(profs); refreshProfileList();
};

/* ═══════════════════════════════════════════════════════
   Controls
   ═══════════════════════════════════════════════════════ */
function syncControls() {
  $('sl-eps').value = arToSlider(S.eps).toFixed(4);
  $('v-eps').textContent = S.eps.toFixed(2);
  $('sl-s').value = S.shear.toFixed(4);
  $('v-s').textContent = S.shear.toFixed(4);
  $('sel-particle').value = S.particle;
  $('in-mass').style.display = S.particle === 'custom' ? '' : 'none';
  $('cb-geo').checked = S.geodesics;
  $('cb-wire').checked = S.wire;
  document.querySelectorAll('[data-ar]').forEach(b =>
    b.classList.toggle('on', Math.abs(+b.dataset.ar - S.eps) < 0.01));
}

function fullRecompute() {
  sweepModes(); renderConstraints(); fullRedraw();
}

function fullRedraw() {
  updateVertexColors(); rebuildGeodesics();
  drawSheet(); drawSpectrum(); drawProfile();
  updateDerived(); updateMetrics(); updateStatus();
}

$('sl-eps').addEventListener('input', function() {
  S.eps = sliderToAR(+this.value);
  $('v-eps').textContent = S.eps.toFixed(2);
  document.querySelectorAll('[data-ar]').forEach(b =>
    b.classList.toggle('on', Math.abs(+b.dataset.ar - S.eps) < 0.01));
});
$('sl-eps').addEventListener('change', function() {
  rebuildTorus(); fullRecompute();
});

document.querySelectorAll('[data-ar]').forEach(btn => {
  btn.onclick = () => {
    S.eps = +btn.dataset.ar;
    syncControls(); rebuildTorus(); fullRecompute();
  };
});

$('sl-s').addEventListener('input', function() {
  S.shear = +this.value;
  $('v-s').textContent = S.shear.toFixed(4);
});
$('sl-s').addEventListener('change', function() { fullRecompute(); });

$('btn-solve').onclick = () => {
  S.shear = solveShear(S.eps);
  syncControls(); fullRecompute();
};

$('sel-particle').onchange = function() {
  S.particle = this.value;
  $('in-mass').style.display = S.particle === 'custom' ? '' : 'none';
  fullRedraw();
};
$('in-mass').onchange = function() { S.customMass = +this.value; fullRedraw(); };

$('cb-geo').onchange = function() { S.geodesics = this.checked; rebuildGeodesics(); };
$('cb-wire').onchange = function() { S.wire = this.checked; if (wireMesh) wireMesh.visible = S.wire; };

/* ═══════════════════════════════════════════════════════
   Status bar
   ═══════════════════════════════════════════════════════ */
function updateStatus() {
  const a = alphaFormula(S.eps, S.shear);
  const ok = Math.abs(1/a - 137.036) < 0.01;
  $('status-bar').textContent = `α = 1/${(1/a).toFixed(3)}${ok ? ' ✓' : '  ⚠ not solved'}  ·  ε = ${S.eps.toFixed(3)}  ·  s = ${S.shear.toFixed(6)}  ·  ${modeData.length} modes`;
  $('status-bar').style.color = ok ? '#6c6' : '#da6';
}

/* ═══════════════════════════════════════════════════════
   Resize handling
   ═══════════════════════════════════════════════════════ */
window.addEventListener('resize', () => { drawSheet(); drawSpectrum(); drawProfile(); });

/* ═══════════════════════════════════════════════════════
   Init
   ═══════════════════════════════════════════════════════ */
S.shear = solveShear(S.eps);
syncControls();
rebuildTorus();
fullRecompute();
refreshProfileList();
let _lastSheetTick = 0;
animLoop(() => {
  if (S.geodesics && !getAnchor()) {
    const now = performance.now();
    if (now - _lastSheetTick > 50) { _lastSheetTick = now; drawSheet(); }
  }
}, { renderer, scene, camera, controls });
</script>
</body>
</html>
