<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hex Bundles — totu viz</title>
<link rel="stylesheet" href="totu-viz.css">
<style>
#main { flex: 1; position: relative; min-height: 0; overflow: hidden; }
canvas { position: absolute; inset: 0; display: block; }
canvas       { cursor: grab; }
canvas.drag  { cursor: grabbing; }

#hint {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(8,8,14,.88); border: 1px solid rgba(255,255,255,.06);
  border-radius: 6px; padding: 5px 16px; font-size: 10px; color: #444;
  backdrop-filter: blur(4px); pointer-events: none; white-space: nowrap;
  transition: opacity .4s;
}

#info {
  position: absolute; top: 10px; right: 14px;
  font-size: 10px; color: #333; text-align: right; line-height: 1.6;
  pointer-events: none;
}

.lbadge {
  display: inline-block; border-radius: 3px;
  background: rgba(255,255,255,.06); padding: 1px 5px;
  font-size: 9px; color: #666; margin-left: 4px;
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>Hex Bundles</h1><div class="sep"></div>

  <div class="cg">
    <label>Level</label>
    <button class="btn" id="btn-dn">−</button>
    <span class="val" id="v-lv" style="min-width:14px;text-align:center">1</span>
    <button class="btn" id="btn-up">+</button>
  </div>

  <span id="v-cnt" style="color:#555;font-size:10px;min-width:180px;padding-left:4px"></span>
  <div class="sep"></div>
  <div class="cg" style="gap:8px;flex-wrap:wrap" id="legend"></div>
  <div class="sep"></div>
  <button class="btn on" id="btn-fit">Fit</button>
  <span style="color:#333;font-size:10px;margin-left:2px">· ← → keys</span>
</div>

<div id="main">
  <canvas id="c"></canvas>
  <div id="hint">Scroll to zoom · Drag to pan</div>
  <div id="info"></div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────

const SQRT3 = Math.sqrt(3);
const SQRT7 = Math.sqrt(7);

// Supertile rotation: angle of vector A₁ = (5/2, √3/2) in hex-spacing units.
// Derivation: at level 3, the 6 surrounding cluster centers are at
//   A₁ = 2·a₁ + a₂  (a₁=(1,0), a₂=(½,√3/2) — flat-top hex basis at s=1)
//   A₁ = (5/2, √3/2)  →  angle = atan(√3/5) ≈ 19.106°
// Each higher level adds one more rotation of THETA_S (supertile rotation).
const THETA_S = Math.atan2(SQRT3, 5);

// Flat-top hex: 6 neighbor directions in units of hex-spacing s.
const DIRS = [
  [ 1,          0         ],
  [ 0.5,        SQRT3/2   ],
  [-0.5,        SQRT3/2   ],
  [-1,          0         ],
  [-0.5,       -SQRT3/2   ],
  [ 0.5,       -SQRT3/2   ],
];

// 7 palette entries: index 0 = center sub-cluster, 1..6 = surrounding.
const PAL = [
  '#b8ccff',   // 0  center   — soft blue-white
  '#ff6b6b',   // 1  ring 1   — coral
  '#ffb347',   // 2  ring 2   — amber
  '#ffd700',   // 3  ring 3   — gold
  '#2ecc71',   // 4  ring 4   — emerald
  '#55c8ff',   // 5  ring 5   — sky
  '#c084fc',   // 6  ring 6   — violet
];

// ── Geometry ───────────────────────────────────────────────────────────────────

// The level-n cluster is 7 copies of the level-(n-1) cluster arranged as:
//   one center copy  +  6 surrounding copies.
//
// The 6 surrounding centers are given by applying the hex-neighbor directions
// scaled by  s · √7^(n-2)  and rotated by  (n-2) · THETA_S.
//
// Why √7?  Each level multiplies the cluster area by 7  →  linear scale × √7.
// Why THETA_S?  The supertile vector A₁ = (5/2, √3/2) in hex-spacing units
// has magnitude √7 and angle THETA_S.  Each additional level compounds the
// same rotation, producing the characteristic 19.1° twist per level
// (this is the Gosper/flowsnake rep-tile construction).

function surroundCenters(lv, s) {
  const scale = s * Math.pow(SQRT7, lv - 2);
  const phi   = (lv - 2) * THETA_S;
  const cp = Math.cos(phi), sp = Math.sin(phi);
  return DIRS.map(([dx, dy]) => [
    (dx * cp - dy * sp) * scale,
    (dx * sp + dy * cp) * scale,
  ]);
}

// Returns [{x, y, g}] where g ∈ {0..6} is the top-level sub-cluster index.
function buildCluster(lv, s = 1.0) {
  if (lv === 1) return [{ x: 0, y: 0, g: 0 }];
  const sub  = buildCluster(lv - 1, s);
  const ctrs = surroundCenters(lv, s);
  // Centre copy → group 0
  const out  = sub.map(h => ({ x: h.x, y: h.y, g: 0 }));
  // 6 surrounding copies → groups 1..6
  for (let i = 0; i < 6; i++) {
    const [cx, cy] = ctrs[i];
    for (const h of sub) out.push({ x: h.x + cx, y: h.y + cy, g: i + 1 });
  }
  return out;
}

// ── State ──────────────────────────────────────────────────────────────────────

let level = 1;
const MAX_LV = 6;
let hexes = [];

// For flat-top hexes with spacing s = 1: circumradius R = 1/√3.
const HEX_R = 1 / SQRT3;

// View:  canvas_x = world_x · vS + W/2 + vX
let vS = 1, vX = 0, vY = 0;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Render ─────────────────────────────────────────────────────────────────────

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#08080e';
  ctx.fillRect(0, 0, W, H);

  const ox = W / 2 + vX;
  const oy = H / 2 + vY;
  const R  = HEX_R * vS;       // screen-space circumradius
  const Rg = R * 0.94;         // with seam gap

  const lw = Math.max(0.5, R * 0.055);

  for (const { x, y, g } of hexes) {
    const px = x * vS + ox;
    const py = y * vS + oy;
    const col = PAL[g];

    ctx.beginPath();
    for (let k = 0; k < 6; k++) {
      // a = π/2 + k·π/3 gives pointy-top hex (vertex at top/bottom of screen).
      // This is consistent with DIRS at 0°,60°,…: each DIRS direction is
      // perpendicular to one of the six edges, so adjacent hexes share edges
      // rather than meeting vertex-to-vertex (which happens with flat-top a=k·π/3).
      const a = Math.PI / 2 + k * Math.PI / 3;
      const vx = px + Rg * Math.cos(a);
      const vy = py + Rg * Math.sin(a);
      k === 0 ? ctx.moveTo(vx, vy) : ctx.lineTo(vx, vy);
    }
    ctx.closePath();
    ctx.fillStyle   = col + '1e';    // ~12 % fill
    ctx.fill();
    ctx.strokeStyle = col + 'cc';    // ~80 % stroke
    ctx.lineWidth   = lw;
    ctx.stroke();
  }
}

// ── Fit / Rebuild ──────────────────────────────────────────────────────────────

function autoFit() {
  if (!hexes.length) return;
  const W = canvas.width, H = canvas.height;
  let x0 = Infinity, x1 = -Infinity, y0 = Infinity, y1 = -Infinity;
  for (const { x, y } of hexes) {
    x0 = Math.min(x0, x); x1 = Math.max(x1, x);
    y0 = Math.min(y0, y); y1 = Math.max(y1, y);
  }
  const pad = HEX_R * 1.6;
  x0 -= pad; x1 += pad; y0 -= pad; y1 += pad;
  vS = Math.min(W / (x1 - x0), H / (y1 - y0));
  vX = -((x0 + x1) / 2) * vS;
  vY = -((y0 + y1) / 2) * vS;
  draw();
}

function rebuild() {
  hexes = buildCluster(level);
  autoFit();
  updateUI();
}

// ── Controls UI ────────────────────────────────────────────────────────────────

function updateUI() {
  const n    = Math.pow(7, level - 1);
  const nSub = Math.pow(7, level - 2);

  document.getElementById('v-lv').textContent    = level;
  document.getElementById('btn-dn').disabled      = level <= 1;
  document.getElementById('btn-up').disabled      = level >= MAX_LV;

  const cntEl = document.getElementById('v-cnt');
  if (level === 1)
    cntEl.textContent = '1 hexagon';
  else if (level === 2)
    cntEl.textContent = '7 hexagons  (1 center + 6 surrounding)';
  else
    cntEl.textContent =
      `7^${level - 1} = ${n.toLocaleString()} hexagons` +
      `  ·  ${nSub.toLocaleString()} per color`;

  // Info overlay
  const infoEl = document.getElementById('info');
  if (level >= 2) {
    infoEl.innerHTML =
      `<span style="color:#2a2a3a">` +
      `scale ×√7 per level<br>` +
      `rotation +19.1° per level<br>` +
      `Gosper / flowsnake rep-tile` +
      `</span>`;
  } else {
    infoEl.innerHTML = '';
  }

  // Legend
  const lgd = document.getElementById('legend');
  if (level < 2) {
    lgd.innerHTML = `<span style="display:flex;align-items:center;gap:3px;font-size:10px;color:#666">
      <span style="width:9px;height:9px;border-radius:2px;background:${PAL[0]};display:inline-block"></span>
      single hexagon
    </span>`;
    return;
  }
  lgd.innerHTML = PAL.map((c, i) => `
    <span style="display:flex;align-items:center;gap:3px;font-size:10px;color:#999">
      <span style="width:9px;height:9px;border-radius:2px;background:${c};display:inline-block"></span>
      ${i === 0 ? 'center' : 'ring ' + i}
    </span>`).join('');
}

document.getElementById('btn-dn').addEventListener('click', () => {
  if (level > 1) { level--; rebuild(); }
});
document.getElementById('btn-up').addEventListener('click', () => {
  if (level < MAX_LV) { level++; rebuild(); }
});
document.getElementById('btn-fit').addEventListener('click', autoFit);

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === '-') {
    if (level > 1)    { level--; rebuild(); }
  } else if (e.key === 'ArrowRight' || e.key === '=' || e.key === '+') {
    if (level < MAX_LV) { level++; rebuild(); }
  }
});

// ── Zoom / Pan ─────────────────────────────────────────────────────────────────

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const dpr  = window.devicePixelRatio || 1;
  const mx   = (e.clientX - rect.left) * dpr;
  const my   = (e.clientY - rect.top)  * dpr;
  const f    = e.deltaY < 0 ? 1.14 : 1 / 1.14;
  const W = canvas.width, H = canvas.height;
  // Zoom about cursor: keep world point under cursor fixed.
  vX = (mx - W / 2) * (1 - f) + vX * f;
  vY = (my - H / 2) * (1 - f) + vY * f;
  vS *= f;
  draw();
}, { passive: false });

let isDrag = false, px0 = 0, py0 = 0, vx0 = 0, vy0 = 0;
canvas.addEventListener('mousedown', e => {
  isDrag = true; canvas.classList.add('drag');
  px0 = e.clientX; py0 = e.clientY; vx0 = vX; vy0 = vY;
});
window.addEventListener('mousemove', e => {
  if (!isDrag) return;
  const dpr = window.devicePixelRatio || 1;
  vX = vx0 + (e.clientX - px0) * dpr;
  vY = vy0 + (e.clientY - py0) * dpr;
  draw();
});
window.addEventListener('mouseup', () => { isDrag = false; canvas.classList.remove('drag'); });

// ── Resize ─────────────────────────────────────────────────────────────────────

function resize() {
  const el  = document.getElementById('main');
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = el.clientWidth  * dpr;
  canvas.height = el.clientHeight * dpr;
  canvas.style.width  = el.clientWidth  + 'px';
  canvas.style.height = el.clientHeight + 'px';
  draw();
}

window.addEventListener('resize', () => { resize(); autoFit(); });

// ── Init ───────────────────────────────────────────────────────────────────────

resize();
rebuild();
</script>
</body>
</html>
