<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hydrogen Fusion — totu viz</title>
<link rel="stylesheet" href="totu-viz.css">
<style>
.panels { flex:1; display:flex; min-height:0; }
.chart-wrap { flex:1; position:relative; border-right:1px solid var(--border); }
.chart-wrap:last-child { border-right:none; }
.chart-wrap canvas { display:block; width:100%; height:100%; }
#info {
  background: var(--surface); border-top:1px solid var(--border);
  padding: 6px 14px; font-size:11px; display:flex; flex-wrap:wrap;
  gap:4px 20px; color:var(--muted); flex-shrink:0;
}
#info .kv { display:inline-flex; gap:3px; }
#info .k { color:var(--dim); }
#info .v { color:var(--accent); font-weight:700; }
#info .sep-i { width:1px; height:14px; background:var(--btn-border); align-self:center; }
#scenario-text {
  width:100%; font-size:10.5px; color:#777; padding-top:2px;
  border-top:1px solid var(--border); margin-top:2px;
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>Hydrogen Fusion</h1><div class="sep"></div>
  <div class="cg">
    <label>log₁₀ T</label>
    <input type="range" id="sl-temp" min="5" max="10" step="0.02" value="7.196">
    <span class="val" id="v-temp">1.57×10⁷ K</span>
  </div>
  <div class="cg">
    <label>B</label>
    <input type="range" id="sl-B" min="0" max="1000" step="1" value="0">
    <span class="val" id="v-B">0 T</span>
  </div>
  <div class="sep"></div>
  <div class="cg">
    <label>V₀</label>
    <input type="range" id="sl-V0" min="10" max="300" step="1" value="149">
    <span class="val" id="v-V0">149 MeV</span>
  </div>
  <div class="cg">
    <label>Range</label>
    <input type="range" id="sl-range" min="0.5" max="4.0" step="0.01" value="1.32">
    <span class="val" id="v-range">1.32 fm</span>
  </div>
  <div class="sep"></div>
  <div class="cg" style="gap:3px">
    <button class="btn on" id="btn-mast">MaSt</button>
    <button class="btn" id="btn-empirical">Empirical</button>
  </div>
  <div class="sep"></div>
  <div class="cg" style="gap:3px">
    <button class="btn on" data-sc="solar">&#9737; Solar</button>
    <button class="btn" data-sc="tokamak">Tokamak</button>
    <button class="btn" data-sc="gas">H&#x2082; gas</button>
    <button class="btn" data-sc="water">H&#x2082;O</button>
  </div>
</div>

<div class="panels">
  <div class="chart-wrap"><canvas id="cv-pot"></canvas></div>
  <div class="chart-wrap"><canvas id="cv-rate"></canvas></div>
</div>
<div id="info"></div>

<script>
(function(){
"use strict";
const $ = id => document.getElementById(id);

// ═══════════════════════════════════════════════════════════════
//  Physical constants
// ═══════════════════════════════════════════════════════════════
const ALPHA   = 1/137.036;
const KE2     = 1.43997;       // MeV·fm  (e²/4πε₀ = α ℏc)
const MP      = 938.272;       // MeV/c²  proton mass
const MU      = MP / 2;        // MeV/c²  reduced mass (pp)
const KB      = 8.617e-11;     // MeV/K
const MU_N    = 3.152e-14;     // MeV/T   nuclear magneton
const E_G     = Math.pow(Math.PI * ALPHA, 2) * 2 * MU;   // 0.493 MeV
const SQRT_EG = Math.sqrt(E_G);
const KAPPA_PRE = Math.sqrt(2 * MU) / 197.327;  // fm⁻¹ / √MeV
const T_SUN   = 1.57e7;       // K
const NA      = 6.022e23;

// ═══════════════════════════════════════════════════════════════
//  Mutable state
// ═══════════════════════════════════════════════════════════════
const S = {
  logT: 7.196,          // log10(T/K)
  B: 0,                 // Tesla
  V0: 149,              // MeV  (well depth)
  R: 1.32,              // fm   (force range)
  scenario: 'solar',
  hover: null,          // {x, y} in chart coords when mouse over potential
};

// ═══════════════════════════════════════════════════════════════
//  Nuclear potential
// ═══════════════════════════════════════════════════════════════
const R_CORE = 0.4;     // fm — hard-core radius

function V_coulomb(r) { return KE2 / r; }

function V_nuclear(r) {
  if (r < R_CORE) return S.V0 * 5 * Math.pow(R_CORE / r, 12);
  const a = Math.max(S.R / 6, 0.12);
  return -S.V0 / (1 + Math.exp((r - S.R) / a));
}

function V_total(r) { return V_coulomb(r) + V_nuclear(r); }

function findBarrier() {
  let maxV = -1e20, rMax = 1;
  for (let r = R_CORE + 0.02; r <= 20; r += 0.005) {
    const v = V_total(r);
    if (v > maxV) { maxV = v; rMax = r; }
  }
  return { height: maxV, radius: rMax };
}

function findWellMin() {
  let minV = 1e20, rMin = 1;
  for (let r = R_CORE + 0.02; r <= S.R + 2; r += 0.005) {
    const v = V_total(r);
    if (v < minV) { minV = v; rMin = r; }
  }
  return { depth: minV, radius: rMin };
}

// ═══════════════════════════════════════════════════════════════
//  WKB tunneling
// ═══════════════════════════════════════════════════════════════
function wkbTunnel(E) {
  const rOuter = Math.min(KE2 / Math.max(E, 1e-6) + 1, 300);
  const dr = 0.02;
  let crossings = [];
  let prevAbove = V_total(R_CORE + 0.03) > E;
  for (let r = R_CORE + 0.03 + dr; r <= rOuter; r += dr) {
    const above = V_total(r) > E;
    if (above !== prevAbove) crossings.push(r - dr / 2);
    prevAbove = above;
  }
  if (crossings.length < 2) return prevAbove ? 0 : 1;
  const rI = crossings[0], rO = crossings[crossings.length - 1];
  if (rI >= rO) return 1;
  let G = 0;
  const N = 400;
  const step = (rO - rI) / N;
  for (let i = 0; i < N; i++) {
    const r = rI + (i + 0.5) * step;
    const dV = V_total(r) - E;
    if (dV > 0) G += KAPPA_PRE * Math.sqrt(dV) * step;
  }
  return Math.exp(-2 * G);
}

function gamowFactor(E) {
  if (E <= 0) return 0;
  const eta = ALPHA * Math.sqrt(MU / (2 * E));
  return Math.exp(-2 * Math.PI * eta);
}

// ═══════════════════════════════════════════════════════════════
//  Fusion rate
// ═══════════════════════════════════════════════════════════════
const C_RATE = 6.15e-39;  // calibrated so ppRate(T_SUN) ≈ 1.5e-43

function ppRate(T) {
  const T9 = T / 1e9;
  if (T9 < 1e-6) return 0;
  const t13 = Math.pow(T9, 1/3);
  const tau = 3.380 / t13;
  if (tau > 500) return 0;
  const f = 1 + 0.123 * t13 + 1.09 * Math.pow(T9, 2/3) + 0.938 * T9;
  return C_RATE / Math.pow(T9, 2/3) * Math.exp(-tau) * f;
}

function mastRate(T) {
  const base = ppRate(T);
  if (base <= 0) return 0;
  const kT = KB * T;
  const E0 = Math.pow(E_G * kT * kT / 4, 1/3);
  const Pg = gamowFactor(E0);
  const Pw = wkbTunnel(E0);
  const enhancement = Pg > 0 ? Pw / Pg : 1;
  const fa = alignFrac(S.B, T) / 0.25;
  return base * enhancement * fa;
}

function gamowPeakE(T) {
  const kT = KB * T;
  return Math.pow(E_G * kT * kT / 4, 1/3);
}

function tempExponent(T) {
  const kT = KB * T;
  const E0 = gamowPeakE(T);
  return 2/3 + E0 / kT;
}

// ═══════════════════════════════════════════════════════════════
//  Alignment
// ═══════════════════════════════════════════════════════════════
function langevin(x) {
  if (Math.abs(x) < 1e-8) return x / 3;
  return 1 / Math.tanh(x) - 1 / x;
}

function alignFrac(B, T) {
  const kT = KB * T;
  if (kT <= 0 || B <= 0) return 0.25;
  const x = MU_N * B / kT;
  const L = langevin(x);
  return 0.25 + 0.75 * L * L;
}

// ═══════════════════════════════════════════════════════════════
//  Canvas helpers
// ═══════════════════════════════════════════════════════════════
// Per-canvas state: populated by setupCanvas, reused by reuseCanvas.
const cvCache = {};

// Full resize + context init — call only from update() or on init.
// Touching canvas.width / style.width on every mousemove causes layout
// reflows that make getBoundingClientRect() return jittering values,
// which changes pw and shifts the x-scale while just hovering.
function setupCanvas(canvas) {
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = Math.round(rect.width);
  const h = Math.round(rect.height);
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  cvCache[canvas.id] = { ctx, w, h, dpr };
  return cvCache[canvas.id];
}

// Reuse cached context without touching the DOM.
// Uses setTransform (absolute) to restore DPR scaling safely.
function reuseCanvas(canvas) {
  const st = cvCache[canvas.id];
  if (!st) return setupCanvas(canvas);
  st.ctx.setTransform(st.dpr, 0, 0, st.dpr, 0, 0);
  return st;
}

function fmtSci(v, digits) {
  if (v === 0) return '0';
  if (!isFinite(v)) return '—';
  const e = Math.floor(Math.log10(Math.abs(v)));
  const m = v / Math.pow(10, e);
  if (e === 0) return m.toFixed(digits || 2);
  const sup = String(e).replace(/-/g, '\u207B')
    .replace(/0/g,'\u2070').replace(/1/g,'\u00B9').replace(/2/g,'\u00B2')
    .replace(/3/g,'\u00B3').replace(/4/g,'\u2074').replace(/5/g,'\u2075')
    .replace(/6/g,'\u2076').replace(/7/g,'\u2077').replace(/8/g,'\u2078')
    .replace(/9/g,'\u2079');
  return m.toFixed(digits || 1) + '\u00D710' + sup;
}

function fmtTemp(logT) {
  const T = Math.pow(10, logT);
  return fmtSci(T, 2) + ' K';
}

// ═══════════════════════════════════════════════════════════════
//  Potential chart
// ═══════════════════════════════════════════════════════════════
const POT_PAD = { t:32, r:16, b:44, l:62 };

function drawPotentialChart() {
  const cv = $('cv-pot');
  const { ctx, w, h } = reuseCanvas(cv);
  const P = POT_PAD;
  const pw = w - P.l - P.r, ph = h - P.t - P.b;

  const barrier = findBarrier();
  const yMax = Math.max(barrier.height * 2.5, 2);
  const yMin = Math.min(-Math.max(5, barrier.height * 4), -2);
  const xMin = 0, xMax = Math.min(Math.max(barrier.radius * 3, 8), 20);

  function toX(v) { return P.l + (v - xMin) / (xMax - xMin) * pw; }
  function toY(v) { return P.t + (1 - (v - yMin) / (yMax - yMin)) * ph; }

  // background
  ctx.fillStyle = '#0e0e12';
  ctx.fillRect(0, 0, w, h);

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  const yStep = niceStep(yMax - yMin, 6);
  for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
    const py = toY(y);
    ctx.beginPath(); ctx.moveTo(P.l, py); ctx.lineTo(P.l + pw, py); ctx.stroke();
  }
  const xStep = niceStep(xMax - xMin, 8);
  for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
    const px = toX(x);
    ctx.beginPath(); ctx.moveTo(px, P.t); ctx.lineTo(px, P.t + ph); ctx.stroke();
  }

  // axes
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(P.l, P.t); ctx.lineTo(P.l, P.t + ph); ctx.lineTo(P.l + pw, P.t + ph); ctx.stroke();

  // zero line
  if (yMin < 0 && yMax > 0) {
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(P.l, toY(0)); ctx.lineTo(P.l + pw, toY(0)); ctx.stroke();
    ctx.setLineDash([]);
  }

  // axis labels
  ctx.fillStyle = '#888'; ctx.font = '10px system-ui';
  for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(y.toFixed(y === Math.round(y) ? 0 : 1), P.l - 6, toY(y));
  }
  for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
    if (x <= 0) continue;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(x.toFixed(x === Math.round(x) ? 0 : 1), toX(x), P.t + ph + 6);
  }
  ctx.fillStyle = '#666'; ctx.font = '10px system-ui';
  ctx.textAlign = 'center'; ctx.fillText('r  (fm)', P.l + pw / 2, h - 6);
  ctx.save(); ctx.translate(12, P.t + ph / 2); ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center'; ctx.fillText('V(r)  (MeV)', 0, 0);
  ctx.restore();

  // title
  ctx.fillStyle = '#aaa'; ctx.font = 'bold 11px system-ui';
  ctx.textAlign = 'left'; ctx.fillText('Nuclear Potential', P.l + 4, P.t - 10);

  // compute curves
  const N = 600;
  const dr = (xMax - 0.25) / N;
  const pts_c = [], pts_n = [], pts_t = [];
  for (let i = 0; i <= N; i++) {
    const r = 0.25 + i * dr;
    const vc = V_coulomb(r);
    const vn = V_nuclear(r);
    const vt = vc + vn;
    pts_c.push({ r, v: vc });
    pts_n.push({ r, v: vn });
    pts_t.push({ r, v: vt });
  }

  function drawCurve(pts, color, lineW, dash) {
    ctx.strokeStyle = color; ctx.lineWidth = lineW;
    ctx.setLineDash(dash || []);
    ctx.beginPath();
    let started = false;
    for (const p of pts) {
      const px = toX(p.r), py = toY(Math.max(yMin, Math.min(yMax, p.v)));
      if (p.v < yMin * 5 || p.v > yMax * 5) { started = false; continue; }
      if (!started) { ctx.moveTo(px, py); started = true; }
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  drawCurve(pts_c, '#e05050', 1.5, [6, 4]);  // Coulomb (red dashed)
  drawCurve(pts_n, '#50b0e0', 1.5, [6, 4]);  // Nuclear (blue dashed)
  drawCurve(pts_t, '#e0e0e0', 2);              // Total (white solid)

  // thermal energy line
  const T = Math.pow(10, S.logT);
  const kT_MeV = KB * T;
  if (kT_MeV > yMin && kT_MeV < yMax) {
    ctx.strokeStyle = '#fdd835'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    const yy = toY(kT_MeV);
    ctx.beginPath(); ctx.moveTo(P.l, yy); ctx.lineTo(P.l + pw, yy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#fdd835'; ctx.font = '9px system-ui'; ctx.textAlign = 'right';
    ctx.fillText('kT = ' + (kT_MeV * 1000).toFixed(2) + ' keV', P.l + pw - 4, yy - 5);
  }

  // barrier annotation
  if (barrier.height > yMin && barrier.height < yMax) {
    const bx = toX(barrier.radius), by = toY(barrier.height);
    ctx.fillStyle = '#fff'; ctx.font = '9px system-ui'; ctx.textAlign = 'left';
    ctx.fillText('barrier ' + barrier.height.toFixed(2) + ' MeV', bx + 6, by - 6);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI * 2); ctx.fill();
  }

  // well depth annotation
  const well = findWellMin();
  ctx.fillStyle = '#50b0e0'; ctx.font = '9px system-ui'; ctx.textAlign = 'left';
  if (well.depth < yMin) {
    ctx.fillText('well: ' + well.depth.toFixed(0) + ' MeV \u2193', P.l + 8, P.t + ph - 8);
  } else {
    const wx = toX(well.radius), wy = toY(well.depth);
    ctx.fillText(well.depth.toFixed(0) + ' MeV', wx + 6, wy + 12);
  }

  // legend
  const lx = P.l + pw - 100, ly = P.t + 14;
  ctx.font = '9px system-ui';
  ctx.strokeStyle = '#e05050'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
  ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 18, ly); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#e05050'; ctx.textAlign = 'left'; ctx.fillText('Coulomb', lx + 22, ly + 3);

  ctx.strokeStyle = '#50b0e0'; ctx.setLineDash([5, 3]);
  ctx.beginPath(); ctx.moveTo(lx, ly + 14); ctx.lineTo(lx + 18, ly + 14); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#50b0e0'; ctx.fillText('Strong (Ma)', lx + 22, ly + 17);

  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lx, ly + 28); ctx.lineTo(lx + 18, ly + 28); ctx.stroke();
  ctx.fillStyle = '#e0e0e0'; ctx.fillText('Total', lx + 22, ly + 31);

  // coupling annotation
  ctx.fillStyle = '#555'; ctx.font = '9px system-ui'; ctx.textAlign = 'left';
  const coupRatio = (S.V0 * S.R / KE2).toFixed(0);
  ctx.fillText('\u03B1s/\u03B1 \u2248 ' + coupRatio, P.l + 8, P.t + 14);

  // hover crosshair
  if (S.hover) {
    const mx = S.hover.x, my = S.hover.y;
    const rr = xMin + (mx - P.l) / pw * (xMax - xMin);
    if (rr > 0.25 && rr < xMax && mx > P.l && mx < P.l + pw && my > P.t && my < P.t + ph) {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(mx, P.t); ctx.lineTo(mx, P.t + ph); ctx.stroke();
      const vv = V_total(rr);
      ctx.fillStyle = '#4fc3f7'; ctx.font = '10px system-ui'; ctx.textAlign = 'left';
      ctx.fillText('r=' + rr.toFixed(2) + '  V=' + vv.toFixed(2) + ' MeV', mx + 6, Math.max(P.t + 16, my - 8));
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  Rate chart
// ═══════════════════════════════════════════════════════════════
const RATE_PAD = { t:32, r:16, b:44, l:62 };

function drawRateChart() {
  const cv = $('cv-rate');
  const { ctx, w, h } = reuseCanvas(cv);
  const P = RATE_PAD;
  const pw = w - P.l - P.r, ph = h - P.t - P.b;

  const logTmin = 5, logTmax = 10;
  const logRmin = -55, logRmax = -35;

  function toX(logT) { return P.l + (logT - logTmin) / (logTmax - logTmin) * pw; }
  function toY(logR) { return P.t + (1 - (logR - logRmin) / (logRmax - logRmin)) * ph; }

  // background
  ctx.fillStyle = '#0e0e12'; ctx.fillRect(0, 0, w, h);

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  for (let lt = logTmin; lt <= logTmax; lt++) {
    const px = toX(lt);
    ctx.beginPath(); ctx.moveTo(px, P.t); ctx.lineTo(px, P.t + ph); ctx.stroke();
  }
  for (let lr = logRmin; lr <= logRmax; lr += 5) {
    const py = toY(lr);
    ctx.beginPath(); ctx.moveTo(P.l, py); ctx.lineTo(P.l + pw, py); ctx.stroke();
  }

  // axes
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.moveTo(P.l, P.t); ctx.lineTo(P.l, P.t + ph); ctx.lineTo(P.l + pw, P.t + ph); ctx.stroke();

  // axis labels
  ctx.fillStyle = '#888'; ctx.font = '10px system-ui';
  for (let lt = logTmin; lt <= logTmax; lt++) {
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('10' + supStr(lt), toX(lt), P.t + ph + 6);
  }
  for (let lr = logRmin; lr <= logRmax; lr += 5) {
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText('10' + supStr(lr), P.l - 6, toY(lr));
  }
  ctx.fillStyle = '#666'; ctx.font = '10px system-ui';
  ctx.textAlign = 'center'; ctx.fillText('Temperature  (K)', P.l + pw / 2, h - 6);
  ctx.save(); ctx.translate(12, P.t + ph / 2); ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center'; ctx.fillText('\u27E8\u03C3v\u27E9  (cm\u00B3/s)', 0, 0);
  ctx.restore();

  // title
  ctx.fillStyle = '#aaa'; ctx.font = 'bold 11px system-ui';
  ctx.textAlign = 'left'; ctx.fillText('Fusion Rate vs Temperature', P.l + 4, P.t - 10);

  // compute rates
  const N = 200;
  const dlt = (logTmax - logTmin) / N;
  const pts_std = [], pts_mast = [];
  for (let i = 0; i <= N; i++) {
    const lt = logTmin + i * dlt;
    const T = Math.pow(10, lt);
    const rs = ppRate(T);
    const rm = mastRate(T);
    if (rs > 0) pts_std.push({ lt, lr: Math.log10(rs) });
    if (rm > 0) pts_mast.push({ lt, lr: Math.log10(rm) });
  }

  function drawRateCurve(pts, color, lineW, dash) {
    ctx.strokeStyle = color; ctx.lineWidth = lineW;
    ctx.setLineDash(dash || []);
    ctx.beginPath();
    let started = false;
    for (const p of pts) {
      if (p.lr < logRmin - 5 || p.lr > logRmax + 5) continue;
      const px = toX(p.lt), py = toY(Math.max(logRmin, Math.min(logRmax, p.lr)));
      if (!started) { ctx.moveTo(px, py); started = true; }
      else ctx.lineTo(px, py);
    }
    ctx.stroke(); ctx.setLineDash([]);
  }

  drawRateCurve(pts_std,  '#888888', 1.5, [5, 4]);  // standard pp
  drawRateCurve(pts_mast, '#4fc3f7', 2);              // MaSt enhanced

  // solar core marker
  const logT_sun = Math.log10(T_SUN);
  if (logT_sun >= logTmin && logT_sun <= logTmax) {
    ctx.strokeStyle = '#ff8c00'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
    const sx = toX(logT_sun);
    ctx.beginPath(); ctx.moveTo(sx, P.t); ctx.lineTo(sx, P.t + ph); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ff8c00'; ctx.font = '9px system-ui'; ctx.textAlign = 'left';
    ctx.fillText('\u2609 Solar core', sx + 4, P.t + 14);
  }

  // current temperature marker
  const clx = toX(S.logT);
  if (clx >= P.l && clx <= P.l + pw) {
    ctx.strokeStyle = '#fdd835'; ctx.lineWidth = 1.5; ctx.setLineDash([3, 2]);
    ctx.beginPath(); ctx.moveTo(clx, P.t); ctx.lineTo(clx, P.t + ph); ctx.stroke();
    ctx.setLineDash([]);
    const T = Math.pow(10, S.logT);
    const rm = mastRate(T);
    if (rm > 0) {
      const ry = toY(Math.max(logRmin, Math.log10(rm)));
      ctx.fillStyle = '#fdd835';
      ctx.beginPath(); ctx.arc(clx, ry, 4, 0, Math.PI * 2); ctx.fill();
    }
  }

  // legend
  const lx = P.l + 10, ly = P.t + 14;
  ctx.font = '9px system-ui';
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
  ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 16, ly); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = '#888'; ctx.textAlign = 'left'; ctx.fillText('Standard pp', lx + 20, ly + 3);
  ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lx, ly + 14); ctx.lineTo(lx + 16, ly + 14); ctx.stroke();
  ctx.fillStyle = '#4fc3f7'; ctx.fillText('MaSt enhanced', lx + 20, ly + 17);
}

// ═══════════════════════════════════════════════════════════════
//  Info panel
// ═══════════════════════════════════════════════════════════════
const SCENARIOS = {
  solar:   'Gravity-confined plasma.  Negative feedback: T rise \u2192 expansion \u2192 cooling.  Stable equilibrium at ~15 MK.  This IS the sun\u2019s mechanism.',
  tokamak: 'Magnetic confinement, active heating.  Lawson criterion: n\u00B7T\u00B7\u03C4 > 5\u00D710\u00B2\u00B9 keV\u00B7s/m\u00B3.  Requires ~100 MK.  Unstable without active control.',
  gas:     'Unconfined H\u2082 gas.  Fusion energy \u2192 expansion \u2192 density drops \u2192 rate plummets.  Cannot sustain fusion without confinement.  Pure hydrogen: always goes unstable IF confined (H-bomb), always fizzles IF free.',
  water:   'Electrolysis produces H at controlled rate (~10\u00B9\u2078 atoms/s per amp).  Even at impossible 100% fusion efficiency, power \u2248 4 pW/A.  Self-limiting by fuel supply.  Cannot go unstable \u2014 nature\u2019s own rate limiter.',
};

function updateInfo() {
  const T = Math.pow(10, S.logT);
  const kT = KB * T;
  const barrier = findBarrier();
  const well = findWellMin();
  const E0 = gamowPeakE(T);
  const Pstd = gamowFactor(E0);
  const Pwkb = wkbTunnel(E0);
  const enhancement = Pstd > 0 ? Pwkb / Pstd : 1;
  const fa = alignFrac(S.B, T);
  const rate = mastRate(T);
  const rateSolar = mastRate(T_SUN);
  const nu = tempExponent(T);
  const coupling = (S.V0 * S.R / KE2).toFixed(0);

  function kv(k, v) { return '<span class="kv"><span class="k">' + k + '</span><span class="v">' + v + '</span></span>'; }
  const sep = '<span class="sep-i"></span>';

  let html = '';
  html += kv('Barrier:', barrier.height.toFixed(3) + ' MeV at ' + barrier.radius.toFixed(1) + ' fm');
  html += kv('Well:', well.depth.toFixed(0) + ' MeV');
  html += kv('\u03B1\u209B/\u03B1:', coupling);
  html += sep;
  html += kv('kT:', (kT * 1e3).toFixed(3) + ' keV');
  html += kv('E\u2080(Gamow):', (E0 * 1e3).toFixed(1) + ' keV');
  html += kv('kT/V\u2095:', fmtSci(kT / barrier.height, 1));
  html += sep;
  html += kv('P\u209C\u1d64\u2099(E\u2080):', fmtSci(Pwkb, 1));
  html += kv('WKB/Gamow:', enhancement.toFixed(2) + '\u00D7');
  html += kv('Align:', (fa * 100).toFixed(1) + '%');
  html += sep;
  html += kv('\u27E8\u03C3v\u27E9:', rate > 0 ? fmtSci(rate, 1) + ' cm\u00B3/s' : '\u22480');
  html += kv('\u03BD:', nu.toFixed(1) + (nu > 4 ? ' \u26A0 runaway' : ' stable'));
  html += kv('vs \u2609:', rateSolar > 0 && rate > 0 ? fmtSci(rate / rateSolar, 1) + '\u00D7' : '\u2014');
  html += '<div id="scenario-text">' + (SCENARIOS[S.scenario] || '') + '</div>';

  $('info').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════════════════════════════
function niceStep(range, targetTicks) {
  const rough = range / targetTicks;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / mag;
  const nice = norm < 1.5 ? 1 : norm < 3.5 ? 2 : norm < 7.5 ? 5 : 10;
  return nice * mag;
}

function supStr(n) {
  const s = String(n);
  return s.replace(/-/g, '\u207B')
    .replace(/0/g,'\u2070').replace(/1/g,'\u00B9').replace(/2/g,'\u00B2')
    .replace(/3/g,'\u00B3').replace(/4/g,'\u2074').replace(/5/g,'\u2075')
    .replace(/6/g,'\u2076').replace(/7/g,'\u2077').replace(/8/g,'\u2078')
    .replace(/9/g,'\u2079');
}

// ═══════════════════════════════════════════════════════════════
//  Event handlers
// ═══════════════════════════════════════════════════════════════
function update() {
  setupCanvas($('cv-pot'));
  setupCanvas($('cv-rate'));
  drawPotentialChart();
  drawRateChart();
  updateInfo();
}

function bindSlider(id, valId, key, fmt) {
  const sl = $(id);
  sl.addEventListener('input', () => {
    S[key] = parseFloat(sl.value);
    $(valId).textContent = fmt(S[key]);
    update();
  });
}

bindSlider('sl-temp', 'v-temp', 'logT', v => fmtTemp(v));
bindSlider('sl-B',    'v-B',    'B',    v => v + ' T');
bindSlider('sl-V0',   'v-V0',   'V0',   v => v + ' MeV');
bindSlider('sl-range', 'v-range','R',    v => v.toFixed(2) + ' fm');

// presets
$('btn-mast').addEventListener('click', () => {
  S.V0 = 149; S.R = 1.32;
  $('sl-V0').value = 149; $('v-V0').textContent = '149 MeV';
  $('sl-range').value = 1.32; $('v-range').textContent = '1.32 fm';
  $('btn-mast').classList.add('on'); $('btn-empirical').classList.remove('on');
  update();
});
$('btn-empirical').addEventListener('click', () => {
  S.V0 = 50; S.R = 1.25;
  $('sl-V0').value = 50; $('v-V0').textContent = '50 MeV';
  $('sl-range').value = 1.25; $('v-range').textContent = '1.25 fm';
  $('btn-empirical').classList.add('on'); $('btn-mast').classList.remove('on');
  update();
});

// scenario buttons
document.querySelectorAll('[data-sc]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-sc]').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    S.scenario = btn.dataset.sc;
    updateInfo();
  });
});

// hover on potential chart
$('cv-pot').addEventListener('mousemove', e => {
  const rect = $('cv-pot').getBoundingClientRect();
  S.hover = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  drawPotentialChart();
});
$('cv-pot').addEventListener('mouseleave', () => {
  S.hover = null;
  drawPotentialChart();
});

// resize
window.addEventListener('resize', update);

// init
update();

})();
</script>
