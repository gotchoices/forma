<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Torus Modes — totu viz</title>
<link rel="stylesheet" href="totu-viz.css">
<style>
#modes-panel {
  position: absolute; top: 0; right: 0; width: 280px; height: 100%;
  background: rgba(14,14,18,0.92); border-left: 1px solid var(--border);
  overflow-y: auto; z-index: 10; font-size: 11px;
  backdrop-filter: blur(8px);
}
.top-bar { position: relative; z-index: 30; }
#modes-panel::-webkit-scrollbar { width: 4px; }
#modes-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.mp-head { padding: 8px 12px; display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid var(--border); }
.mp-head h2 { font-size: 12px; margin: 0; flex: 1; }
.mode-slot {
  border-bottom: 1px solid var(--border); padding: 6px 12px;
}
.mode-slot .ms-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.mode-slot .ms-top .ms-color {
  -webkit-appearance: none; border: none; width: 18px; height: 18px;
  border-radius: 3px; cursor: pointer; padding: 0; background: none;
}
.mode-slot .ms-top .ms-color::-webkit-color-swatch-wrapper { padding: 0; }
.mode-slot .ms-top .ms-color::-webkit-color-swatch { border: none; border-radius: 2px; }
.mode-slot .ms-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
.mode-slot .ms-lbl { color: #888; min-width: 18px; }
.mode-slot input[type=number] {
  width: 42px; background: var(--surface); border: 1px solid var(--border);
  color: var(--fg); border-radius: 3px; padding: 1px 4px; font-size: 11px;
}
.mode-slot .ms-info { color: #666; font-size: 10px; margin-top: 2px; }
.preset-row { padding: 6px 12px; border-bottom: 1px solid var(--border); }
.preset-row select { font-size: 10px; background: var(--surface); color: var(--fg);
  border: 1px solid var(--border); border-radius: 3px; padding: 2px 4px; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Torus Modes</h1><div class="sep"></div>
  <div class="cg">
    <label>ε (a/R)</label>
    <input type="range" id="sl-eps" min="0.01" max="0.95" step="0.01" value="0.30">
    <span class="val" id="v-eps">0.30</span>
  </div>
  <div class="cg">
    <label>shear s</label>
    <input type="range" id="sl-s" min="0" max="0.5" step="0.001" value="0.165">
    <span class="val" id="v-s">0.165</span>
  </div><div class="sep"></div>
  <div class="cg">
    <label>shell α</label>
    <input type="range" id="sl-shell" min="0" max="1" step="0.02" value="0.12">
    <span class="val" id="v-shell">0.12</span>
  </div>
  <div class="cg tog"><label><input type="checkbox" id="cb-wire"> wire</label></div>
  <div class="cg tog"><label>grid</label>
    <button class="btn" id="btn-grid" style="font-size:10px;min-width:40px">3D</button>
  </div>
  <div class="sep"></div>
  <button class="btn" id="btn-reset">Reset</button>
</div>

<div class="view-full" id="view" style="margin-right:280px">
  <div class="info-line" id="info"></div>
</div>

<div id="modes-panel">
  <div class="preset-row">
    <select id="sel-preset">
      <option value="">— presets —</option>
      <option value="electron">Electron (1,2)</option>
      <option value="r21trio">R21 trio</option>
      <option value="harmonics">Harmonics 1–3</option>
      <option value="lighter">R20 lighter charged</option>
    </select>
  </div>
  <div class="mp-head">
    <h2>Modes</h2>
    <button class="btn" id="btn-add" title="Add mode">+</button>
  </div>
  <div id="mode-list"></div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}}
</script>
<script type="module">
import { THREE, createScene, autoResize, animLoop, buildTorusGeom, torusMaterials } from './totu-viz.js';

const $ = id => document.getElementById(id);
const TAU = 2 * Math.PI;

/* ── State ─────────────────────────────────────────── */

const KEY = 'torus-modes';
const MODE_COLORS = ['#ff6e40','#4fc3f7','#66bb6a','#ab47bc','#fdd835','#e05050','#26c6da','#ff7043'];
const DEFAULTS = {
  eps: 0.30, shear: 0.165, shellAlpha: 0.12, wire: false,
  gridMode: 'arc',
  modes: [{ n1: 1, n2: 2, parity: 'even', color: '#ff6e40', brightness: 0.8, visible: true }],
};

function load() {
  try {
    const r = localStorage.getItem(KEY);
    if (r) {
      const parsed = JSON.parse(r);
      if (!parsed.gridMode) parsed.gridMode = 'arc';
      return parsed;
    }
  } catch {}
  return structuredClone(DEFAULTS);
}
let S = load();
function save() { localStorage.setItem(KEY, JSON.stringify(S)); }

/* ── Eigensolver ───────────────────────────────────── */

const NFOURIER = 16;

/**
 * Solve the poloidal Sturm-Liouville equation in a Fourier basis.
 * Returns { eigenvalues: Float64Array, eigenvectors: Float64Array[] }
 * sorted ascending by eigenvalue.
 *
 * parity = 'even': basis cos(0θ), cos(1θ), ..., cos(Nθ)  (N+1 functions)
 * parity = 'odd':  basis sin(1θ), sin(2θ), ..., sin(Nθ)  (N functions)
 */
function solveEigenmodes(eps, qeff, parity) {
  const N = NFOURIER;
  const isEven = parity === 'even';
  const dim = isEven ? N + 1 : N;

  /* Build matrix H where H v = λ v.
   *
   * The SL equation in standard form:
   *   -d/dθ[(1+ε cosθ) df/dθ] + ε²q²/(1+ε cosθ) f = λ (1+ε cosθ) f
   *
   * Multiply through by 1/(1+ε cosθ) and rearrange:
   * We work with the weak form ⟨φ_i, operator, φ_j⟩ using numerical quadrature.
   */
  const NQ = 512;
  const dth = TAU / NQ;
  const H = new Float64Array(dim * dim);
  const M = new Float64Array(dim * dim);

  for (let q = 0; q < NQ; q++) {
    const th = (q + 0.5) * dth;
    const ct = Math.cos(th);
    const p = 1 + eps * ct;
    const pot = eps * eps * qeff * qeff / p;
    const w = p;

    const phi = new Float64Array(dim);
    const dphi = new Float64Array(dim);
    if (isEven) {
      for (let n = 0; n <= N; n++) {
        phi[n] = n === 0 ? 1 : Math.cos(n * th);
        dphi[n] = n === 0 ? 0 : -n * Math.sin(n * th);
      }
    } else {
      for (let n = 0; n < N; n++) {
        phi[n] = Math.sin((n + 1) * th);
        dphi[n] = (n + 1) * Math.cos((n + 1) * th);
      }
    }

    for (let i = 0; i < dim; i++) {
      for (let j = i; j < dim; j++) {
        const hij = (p * dphi[i] * dphi[j] + pot * phi[i] * phi[j]) * dth;
        const mij = (w * phi[i] * phi[j]) * dth;
        H[i * dim + j] += hij;
        M[i * dim + j] += mij;
        if (j !== i) {
          H[j * dim + i] += hij;
          M[j * dim + i] += mij;
        }
      }
    }
  }

  /* Solve generalized eigenproblem H v = λ M v via Cholesky: M = L Lᵀ,
   * then solve L⁻¹ H L⁻ᵀ u = λ u, v = L⁻ᵀ u.
   * Since M is SPD (weight function > 0), Cholesky is safe. */
  const L = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++) {
    for (let j = 0; j <= i; j++) {
      let sum = M[i * dim + j];
      for (let k = 0; k < j; k++) sum -= L[i * dim + k] * L[j * dim + k];
      L[i * dim + j] = i === j ? Math.sqrt(Math.max(sum, 1e-30)) : sum / L[j * dim + j];
    }
  }

  /* A = L⁻¹ H L⁻ᵀ */
  const Linv = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++) {
    Linv[i * dim + i] = 1 / L[i * dim + i];
    for (let j = i + 1; j < dim; j++) {
      let sum = 0;
      for (let k = i; k < j; k++) sum -= L[j * dim + k] * Linv[k * dim + i];
      Linv[j * dim + i] = sum / L[j * dim + j];
    }
  }

  const A = new Float64Array(dim * dim);
  const tmp = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++)
    for (let j = 0; j < dim; j++) {
      let s = 0;
      for (let k = 0; k < dim; k++) s += Linv[i * dim + k] * H[k * dim + j];
      tmp[i * dim + j] = s;
    }
  for (let i = 0; i < dim; i++)
    for (let j = 0; j < dim; j++) {
      let s = 0;
      for (let k = 0; k < dim; k++) s += tmp[i * dim + k] * Linv[j * dim + k];
      A[i * dim + j] = s;
    }

  /* Jacobi eigenvalue algorithm */
  const V = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++) V[i * dim + i] = 1;
  const evals = new Float64Array(dim);
  for (let i = 0; i < dim; i++) evals[i] = A[i * dim + i];

  for (let iter = 0; iter < 200; iter++) {
    let offDiag = 0;
    for (let i = 0; i < dim; i++)
      for (let j = i + 1; j < dim; j++) offDiag += A[i * dim + j] ** 2;
    if (offDiag < 1e-24) break;

    for (let i = 0; i < dim; i++)
      for (let j = i + 1; j < dim; j++) {
        const aij = A[i * dim + j];
        if (Math.abs(aij) < 1e-15) continue;
        const diff = evals[j] - evals[i];
        let t;
        if (Math.abs(diff) < 1e-30) t = 1;
        else { const tau = diff / (2 * aij); t = Math.sign(tau) / (Math.abs(tau) + Math.sqrt(1 + tau * tau)); }
        const c = 1 / Math.sqrt(1 + t * t), s2 = t * c;

        evals[i] -= t * aij; evals[j] += t * aij;
        A[i * dim + j] = 0; A[j * dim + i] = 0;
        A[i * dim + i] = evals[i]; A[j * dim + j] = evals[j];

        for (let k = 0; k < dim; k++) {
          if (k === i || k === j) continue;
          const aki = A[k * dim + i], akj = A[k * dim + j];
          A[k * dim + i] = A[i * dim + k] = c * aki - s2 * akj;
          A[k * dim + j] = A[j * dim + k] = s2 * aki + c * akj;
        }
        for (let k = 0; k < dim; k++) {
          const vki = V[k * dim + i], vkj = V[k * dim + j];
          V[k * dim + i] = c * vki - s2 * vkj;
          V[k * dim + j] = s2 * vki + c * vkj;
        }
      }
  }

  /* Sort by eigenvalue ascending */
  const order = Array.from({ length: dim }, (_, i) => i);
  order.sort((a, b) => evals[a] - evals[b]);

  /* Transform back: v = L⁻ᵀ u */
  const evecs = [];
  const sortedEvals = new Float64Array(dim);
  for (let idx = 0; idx < dim; idx++) {
    const oi = order[idx];
    sortedEvals[idx] = evals[oi];
    const u = new Float64Array(dim);
    for (let k = 0; k < dim; k++) u[k] = V[k * dim + oi];
    const v = new Float64Array(dim);
    for (let i = dim - 1; i >= 0; i--) {
      let s = u[i];
      for (let k = i + 1; k < dim; k++) s -= L[k * dim + i] * v[k];
      v[i] = s / L[i * dim + i];
    }
    evecs.push(v);
  }

  return { eigenvalues: sortedEvals, eigenvectors: evecs };
}

/**
 * Evaluate eigenfunction f(θ₁) from Fourier coefficients.
 * Returns Float64Array of |f(θ₁)|² on nSamples grid.
 */
function evalDensity(coeffs, parity, nSamples) {
  const isEven = parity === 'even';
  const out = new Float64Array(nSamples);
  for (let i = 0; i < nSamples; i++) {
    const th = (i / nSamples) * TAU;
    let f = 0;
    if (isEven) {
      for (let n = 0; n < coeffs.length; n++)
        f += coeffs[n] * (n === 0 ? 1 : Math.cos(n * th));
    } else {
      for (let n = 0; n < coeffs.length; n++)
        f += coeffs[n] * Math.sin((n + 1) * th);
    }
    out[i] = f * f;
  }
  /* Normalize so max = 1 */
  let mx = 0;
  for (let i = 0; i < nSamples; i++) if (out[i] > mx) mx = out[i];
  if (mx > 0) for (let i = 0; i < nSamples; i++) out[i] /= mx;
  return out;
}

/* ── Scene ─────────────────────────────────────────── */

const { scene, camera, renderer, controls } = createScene($('view'), {
  camPos: [3.0, 2.0, 3.5], far: 200, maxDistance: 50,
});
autoResize(renderer, camera, $('view'));

/* Torus shell */
const R_MAJOR = 2.0;
let torusGeom, torusMesh, torusWire;
const shellMat = new THREE.MeshPhongMaterial({
  color: 0x4488aa, transparent: true, opacity: S.shellAlpha,
  side: THREE.DoubleSide, depthWrite: false, shininess: 60,
});
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x4488aa, wireframe: true, transparent: true, opacity: 0.05,
  side: THREE.DoubleSide,
});

function rebuildTorus() {
  const a = S.eps * R_MAJOR;
  if (torusMesh) { scene.remove(torusMesh); torusGeom.dispose(); }
  if (torusWire) scene.remove(torusWire);
  torusGeom = buildTorusGeom(R_MAJOR, a, 48, 96);
  torusMesh = new THREE.Mesh(torusGeom, shellMat);
  torusWire = new THREE.Mesh(torusGeom, wireMat);
  torusWire.visible = S.wire;
  scene.add(torusMesh);
  scene.add(torusWire);
}

/* ── Mode cloud management ─────────────────────────── */

const MAX_PARTICLES = 40000;
const GRID_TARGET   = 15000;
const DENSITY_SAMPLES = 256;

const modeClouds = []; // parallel to S.modes: { points, density, eigenvalue }

/**
 * Generate a structured dot grid inside the torus tube.
 *
 * gridMode = 'arc':     constant arc-length spacing in θ₁ and θ₂ →
 *                        uniform 3D density (what a 3D camera sees)
 * gridMode = 'angular': constant angular spacing in θ₁ and θ₂ →
 *                        uniform coordinate density (Ma intrinsic view)
 *
 * Radial (ρ) spacing is constant in both modes.
 */
function generateGridPositions(eps, gridMode) {
  const a = eps * R_MAJOR;
  const positions = new Float32Array(MAX_PARTICLES * 3);
  const thetas    = new Float32Array(MAX_PARTICLES);
  const radFracs  = new Float32Array(MAX_PARTICLES);
  let count = 0;

  if (a < 1e-6) return { positions, thetas, radFracs, count: 0 };

  if (gridMode === 'arc') {
    /* Derive isotropic arc spacing from target count.
     * Total ≈ 2π²R a² / s³  (when Δρ = s), so s = (2π²Ra²/T)^(1/3). */
    const s = Math.cbrt(2 * Math.PI * Math.PI * R_MAJOR * a * a / GRID_TARGET);
    const nRho = Math.max(3, Math.min(12, Math.round(a / s)));
    const dRho = a / nRho;

    for (let ir = 1; ir <= nRho && count < MAX_PARTICLES; ir++) {
      const rho = (ir - 0.5) * dRho;
      const nTh1 = Math.max(6, Math.min(64, Math.round(TAU * rho / s)));
      for (let it1 = 0; it1 < nTh1 && count < MAX_PARTICLES; it1++) {
        const th1 = (it1 / nTh1) * TAU;
        const circ = R_MAJOR + rho * Math.cos(th1);
        const nTh2 = Math.max(6, Math.min(400, Math.round(TAU * circ / s)));
        for (let it2 = 0; it2 < nTh2 && count < MAX_PARTICLES; it2++) {
          const th2 = (it2 / nTh2) * TAU;
          const rr = R_MAJOR + rho * Math.cos(th1);
          positions[count * 3]     = rr * Math.cos(th2);
          positions[count * 3 + 1] = rho * Math.sin(th1);
          positions[count * 3 + 2] = rr * Math.sin(th2);
          thetas[count]   = th1;
          radFracs[count] = rho / a;
          count++;
        }
      }
    }
  } else {
    /* Angular mode: constant angle spacing in both θ₁ and θ₂. */
    const nRho = 8;
    const nTh1 = 32;
    const nTh2 = Math.max(6, Math.round(GRID_TARGET / (nRho * nTh1)));
    const dRho = a / nRho;

    for (let ir = 1; ir <= nRho && count < MAX_PARTICLES; ir++) {
      const rho = (ir - 0.5) * dRho;
      for (let it1 = 0; it1 < nTh1 && count < MAX_PARTICLES; it1++) {
        const th1 = (it1 / nTh1) * TAU;
        for (let it2 = 0; it2 < nTh2 && count < MAX_PARTICLES; it2++) {
          const th2 = (it2 / nTh2) * TAU;
          const rr = R_MAJOR + rho * Math.cos(th1);
          positions[count * 3]     = rr * Math.cos(th2);
          positions[count * 3 + 1] = rho * Math.sin(th1);
          positions[count * 3 + 2] = rr * Math.sin(th2);
          thetas[count]   = th1;
          radFracs[count] = rho / a;
          count++;
        }
      }
    }
  }

  return { positions, thetas, radFracs, count };
}

let sharedPositions = null;
let sharedThetas    = null;
let sharedRadFracs  = null;
let sharedCount     = 0;

function ensureParticles() {
  const data = generateGridPositions(S.eps, S.gridMode);
  sharedPositions = data.positions;
  sharedThetas    = data.thetas;
  sharedRadFracs  = data.radFracs;
  sharedCount     = data.count;
}

function makeCloud(modeIdx) {
  const m = S.modes[modeIdx];
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(sharedPositions.slice(), 3));
  const colors = new Float32Array(MAX_PARTICLES * 4);
  geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 4));
  geometry.setDrawRange(0, sharedCount);

  const material = new THREE.PointsMaterial({
    size: 0.035,
    sizeAttenuation: true,
    vertexColors: true,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const points = new THREE.Points(geometry, material);
  points.visible = m.visible;
  scene.add(points);
  return { points, density: null, eigenvalue: 0 };
}

function updateCloudColors(modeIdx) {
  const cloud = modeClouds[modeIdx];
  const m = S.modes[modeIdx];
  if (!cloud || !cloud.density) return;

  const col = new THREE.Color(m.color);
  const colors = cloud.points.geometry.attributes.color;
  const arr = colors.array;

  for (let i = 0; i < sharedCount; i++) {
    const th1 = sharedThetas[i];
    const sampleIdx = Math.floor((th1 / TAU) * DENSITY_SAMPLES) % DENSITY_SAMPLES;
    const d = cloud.density[sampleIdx];
    const radFade = 1 - 0.5 * sharedRadFracs[i] * sharedRadFracs[i];
    const alpha = d * m.brightness * radFade;

    arr[i * 4]     = col.r;
    arr[i * 4 + 1] = col.g;
    arr[i * 4 + 2] = col.b;
    arr[i * 4 + 3] = alpha;
  }
  colors.needsUpdate = true;
}

function computeModeDensity(modeIdx) {
  const m = S.modes[modeIdx];
  const qeff = m.n2 - S.shear * m.n1;
  const result = solveEigenmodes(S.eps, qeff, m.parity);

  /* Pick the eigenfunction with |n₁| nodes. For the ground state (n1=0 even),
   * it's the first (lowest λ). For n1=1 even, it's the second. etc. */
  const absN1 = Math.abs(m.n1);
  const eigIdx = m.parity === 'even' ? absN1 : Math.max(0, absN1 - 1);
  const clampedIdx = Math.min(eigIdx, result.eigenvectors.length - 1);

  const cloud = modeClouds[modeIdx];
  cloud.density = evalDensity(result.eigenvectors[clampedIdx], m.parity, DENSITY_SAMPLES);
  cloud.eigenvalue = result.eigenvalues[clampedIdx];
}

function rebuildAllClouds() {
  for (const c of modeClouds) {
    if (c.points) { scene.remove(c.points); c.points.geometry.dispose(); c.points.material.dispose(); }
  }
  modeClouds.length = 0;
  ensureParticles();
  for (let i = 0; i < S.modes.length; i++) {
    modeClouds.push(makeCloud(i));
    computeModeDensity(i);
    updateCloudColors(i);
  }
}

function refreshDensities() {
  for (let i = 0; i < S.modes.length; i++) {
    computeModeDensity(i);
    updateCloudColors(i);
  }
}

/* ── Info panel ────────────────────────────────────── */

function updateInfo() {
  const parts = [`ε=${S.eps.toFixed(2)}`, `s=${S.shear.toFixed(3)}`, `${S.modes.length} mode${S.modes.length !== 1 ? 's' : ''}`];
  $('info').textContent = parts.join('   ');
}

/* ── Mode slot UI ──────────────────────────────────── */

function renderModeList() {
  const list = $('mode-list');
  list.innerHTML = '';
  S.modes.forEach((m, idx) => {
    const div = document.createElement('div');
    div.className = 'mode-slot';
    const qeff = m.n2 - S.shear * m.n1;
    const lam = modeClouds[idx] ? modeClouds[idx].eigenvalue : 0;
    div.innerHTML = `
      <div class="ms-top">
        <input type="color" class="ms-color" value="${m.color}" data-i="${idx}">
        <span style="color:${m.color};font-weight:700">(${m.n1},${m.n2}) ${m.parity}</span>
        <span style="flex:1"></span>
        <label style="font-size:10px"><input type="checkbox" class="ms-vis" data-i="${idx}" ${m.visible ? 'checked' : ''}> vis</label>
        <button class="btn ms-del" data-i="${idx}" title="Remove">✕</button>
      </div>
      <div class="ms-row">
        <span class="ms-lbl">n₁</span>
        <input type="number" class="ms-n1" data-i="${idx}" value="${m.n1}" min="-5" max="5" step="1">
        <span class="ms-lbl">n₂</span>
        <input type="number" class="ms-n2" data-i="${idx}" value="${m.n2}" min="-10" max="10" step="1">
        <button class="btn ms-parity" data-i="${idx}" style="font-size:10px;min-width:36px">${m.parity}</button>
      </div>
      <div class="ms-row">
        <span class="ms-lbl">☀</span>
        <input type="range" class="ms-bright" data-i="${idx}" min="0" max="1" step="0.05" value="${m.brightness}">
        <span class="val">${m.brightness.toFixed(2)}</span>
      </div>
      <div class="ms-info">q_eff=${qeff.toFixed(3)}  λ=${lam.toFixed(4)}</div>
    `;
    list.appendChild(div);
  });

  /* Wire events */
  list.querySelectorAll('.ms-n1').forEach(el => el.onchange = function () {
    const i = +this.dataset.i;
    S.modes[i].n1 = +this.value;
    computeModeDensity(i); updateCloudColors(i);
    save(); renderModeList();
  });
  list.querySelectorAll('.ms-n2').forEach(el => el.onchange = function () {
    const i = +this.dataset.i;
    S.modes[i].n2 = +this.value;
    computeModeDensity(i); updateCloudColors(i);
    save(); renderModeList();
  });
  list.querySelectorAll('.ms-parity').forEach(el => el.onclick = function () {
    const i = +this.dataset.i;
    S.modes[i].parity = S.modes[i].parity === 'even' ? 'odd' : 'even';
    computeModeDensity(i); updateCloudColors(i);
    save(); renderModeList();
  });
  list.querySelectorAll('.ms-color').forEach(el => el.oninput = function () {
    const i = +this.dataset.i;
    S.modes[i].color = this.value;
    updateCloudColors(i); save();
  });
  list.querySelectorAll('.ms-bright').forEach(el => el.oninput = function () {
    const i = +this.dataset.i;
    S.modes[i].brightness = +this.value;
    this.nextElementSibling.textContent = (+this.value).toFixed(2);
    updateCloudColors(i); save();
  });
  list.querySelectorAll('.ms-vis').forEach(el => el.onchange = function () {
    const i = +this.dataset.i;
    S.modes[i].visible = this.checked;
    modeClouds[i].points.visible = this.checked;
    save();
  });
  list.querySelectorAll('.ms-del').forEach(el => el.onclick = function () {
    const i = +this.dataset.i;
    scene.remove(modeClouds[i].points);
    modeClouds[i].points.geometry.dispose();
    modeClouds[i].points.material.dispose();
    modeClouds.splice(i, 1);
    S.modes.splice(i, 1);
    save(); renderModeList(); updateInfo();
  });
}

function addMode(n1 = 0, n2 = 1, parity = 'even', color = null) {
  const c = color || MODE_COLORS[S.modes.length % MODE_COLORS.length];
  S.modes.push({ n1, n2, parity, color: c, brightness: 0.8, visible: true });
  const idx = S.modes.length - 1;
  modeClouds.push(makeCloud(idx));
  computeModeDensity(idx);
  updateCloudColors(idx);
  save(); renderModeList(); updateInfo();
}

/* ── Presets ────────────────────────────────────────── */

function applyPreset(name) {
  for (const c of modeClouds) {
    scene.remove(c.points); c.points.geometry.dispose(); c.points.material.dispose();
  }
  modeClouds.length = 0;
  S.modes = [];

  if (name === 'electron') {
    S.modes.push({ n1: 1, n2: 2, parity: 'even', color: '#ff6e40', brightness: 0.8, visible: true });
  } else if (name === 'r21trio') {
    S.modes.push({ n1: 0, n2: 2, parity: 'even', color: '#4fc3f7', brightness: 0.8, visible: true });
    S.modes.push({ n1: 1, n2: 2, parity: 'even', color: '#ff6e40', brightness: 0.8, visible: true });
    S.modes.push({ n1: 1, n2: 2, parity: 'odd', color: '#66bb6a', brightness: 0.8, visible: true });
  } else if (name === 'harmonics') {
    S.modes.push({ n1: 1, n2: 2, parity: 'even', color: '#ff6e40', brightness: 0.8, visible: true });
    S.modes.push({ n1: 2, n2: 4, parity: 'even', color: '#4fc3f7', brightness: 0.8, visible: true });
    S.modes.push({ n1: 3, n2: 6, parity: 'even', color: '#66bb6a', brightness: 0.8, visible: true });
  } else if (name === 'lighter') {
    S.modes.push({ n1: 1, n2: 2, parity: 'even', color: '#ff6e40', brightness: 0.8, visible: true });
    S.modes.push({ n1: -1, n2: 1, parity: 'even', color: '#4fc3f7', brightness: 0.8, visible: true });
    S.modes.push({ n1: 1, n2: 1, parity: 'even', color: '#66bb6a', brightness: 0.8, visible: true });
  }

  for (let i = 0; i < S.modes.length; i++) {
    modeClouds.push(makeCloud(i));
    computeModeDensity(i);
    updateCloudColors(i);
  }
  save(); renderModeList(); updateInfo();
}

/* ── Global controls ───────────────────────────────── */

$('sl-eps').value = S.eps;
$('v-eps').textContent = S.eps.toFixed(2);
$('sl-s').value = S.shear;
$('v-s').textContent = S.shear.toFixed(3);
$('sl-shell').value = S.shellAlpha;
$('v-shell').textContent = S.shellAlpha.toFixed(2);
$('cb-wire').checked = S.wire;

$('sl-eps').oninput = function () {
  S.eps = +this.value;
  $('v-eps').textContent = S.eps.toFixed(2);
  rebuildTorus();
  rebuildAllClouds();
  renderModeList();
  updateInfo();
  save();
};

$('sl-s').oninput = function () {
  S.shear = +this.value;
  $('v-s').textContent = S.shear.toFixed(3);
  refreshDensities();
  renderModeList();
  updateInfo();
  save();
};

$('sl-shell').oninput = function () {
  S.shellAlpha = +this.value;
  $('v-shell').textContent = S.shellAlpha.toFixed(2);
  shellMat.opacity = S.shellAlpha;
  save();
};

$('cb-wire').onchange = function () {
  S.wire = this.checked;
  torusWire.visible = S.wire;
  save();
};

const gridBtn = $('btn-grid');
gridBtn.textContent = S.gridMode === 'arc' ? '3D' : 'Ma';
gridBtn.onclick = () => {
  S.gridMode = S.gridMode === 'arc' ? 'angular' : 'arc';
  gridBtn.textContent = S.gridMode === 'arc' ? '3D' : 'Ma';
  rebuildAllClouds();
  renderModeList();
  save();
};

$('btn-add').onclick = () => addMode();
$('sel-preset').onchange = function () {
  if (this.value) { applyPreset(this.value); this.value = ''; }
};

$('btn-reset').onclick = () => {
  localStorage.removeItem(KEY);
  S = structuredClone(DEFAULTS);
  $('sl-eps').value = S.eps; $('v-eps').textContent = S.eps.toFixed(2);
  $('sl-s').value = S.shear; $('v-s').textContent = S.shear.toFixed(3);
  $('sl-shell').value = S.shellAlpha; $('v-shell').textContent = S.shellAlpha.toFixed(2);
  $('cb-wire').checked = S.wire;
  gridBtn.textContent = S.gridMode === 'arc' ? '3D' : 'Ma';
  rebuildTorus();
  rebuildAllClouds();
  renderModeList();
  updateInfo();
};

/* ── Init ──────────────────────────────────────────── */

rebuildTorus();
rebuildAllClouds();
renderModeList();
updateInfo();
animLoop(() => {}, { renderer, scene, camera, controls });
</script>
</body>
</html>
