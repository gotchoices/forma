<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"

<script type="module">
import { THREE, createScene, autoResize, animLoop } from './totu-viz.js';

const $ = id => document.getElementById(id);
const TAU = 2 * Math.PI;

/* ── Non-linear a/R slider (same mapping as torus-studio) ──
   Lower half [0, 0.5] → a/R [0.01, 1]   (ring / horn range)
   Upper half [0.5, 1] → a/R [1,   10]   (spindle / WvM range)
   Horn (a/R = 1) falls exactly at slider = 0.5.            */
function sliderToAR(v) {
  return v <= 0.5 ? 0.01 + (v / 0.5) * 0.99 : 1 + ((v - 0.5) / 0.5) * 9;
}
function arToSlider(r) {
  return r <= 1 ? ((r - 0.01) / 0.99) * 0.5 : 0.5 + ((r - 1) / 9) * 0.5;
}

/* ── State ─────────────────────────────────────────── */

const KEY = 'torus-modes-v2';
const MODE_COLORS = ['#ff6e40','#4fc3f7','#66bb6a','#ab47bc','#fdd835','#e05050','#26c6da','#ff7043'];
const DEFAULTS = {
  eps: 0.50, shear: 0.157, shellAlpha: 0.5, wire: false, geodesics: true,
  modes: [{ n1: 1, n2: 2, parity: 'even', color: '#ff6e40',
            brightness: 0.8, visible: true, showGeodesic: true }],
};

function load() {
  try {
    const r = localStorage.getItem(KEY);
    if (r) return JSON.parse(r);
  } catch {}
  return structuredClone(DEFAULTS);
}
let S = load();
function save() { localStorage.setItem(KEY, JSON.stringify(S)); }

/* ── Eigensolver (unchanged) ───────────────────────── */

const NFOURIER = 16;

function solveEigenmodes(eps, qeff, parity) {
  const N = NFOURIER;
  const isEven = parity === 'even';
  const dim = isEven ? N + 1 : N;
  const NQ = 512;
  const dth = TAU / NQ;
  const H = new Float64Array(dim * dim);
  const M = new Float64Array(dim * dim);

  for (let q = 0; q < NQ; q++) {
    const th = (q + 0.5) * dth;
    const ct = Math.cos(th);
    const p = 1 + eps * ct;
    const pot = eps * eps * qeff * qeff / p;
    const w = p;
    const phi = new Float64Array(dim);
    const dphi = new Float64Array(dim);
    if (isEven) {
      for (let n = 0; n <= N; n++) {
        phi[n] = n === 0 ? 1 : Math.cos(n * th);
        dphi[n] = n === 0 ? 0 : -n * Math.sin(n * th);
      }
    } else {
      for (let n = 0; n < N; n++) {
        phi[n] = Math.sin((n + 1) * th);
        dphi[n] = (n + 1) * Math.cos((n + 1) * th);
      }
    }
    for (let i = 0; i < dim; i++) {
      for (let j = i; j < dim; j++) {
        const hij = (p * dphi[i] * dphi[j] + pot * phi[i] * phi[j]) * dth;
        const mij = (w * phi[i] * phi[j]) * dth;
        H[i * dim + j] += hij; M[i * dim + j] += mij;
        if (j !== i) { H[j * dim + i] += hij; M[j * dim + i] += mij; }
      }
    }
  }

  const L = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++) {
    for (let j = 0; j <= i; j++) {
      let sum = M[i * dim + j];
      for (let k = 0; k < j; k++) sum -= L[i * dim + k] * L[j * dim + k];
      L[i * dim + j] = i === j ? Math.sqrt(Math.max(sum, 1e-30)) : sum / L[j * dim + j];
    }
  }
  const Linv = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++) {
    Linv[i * dim + i] = 1 / L[i * dim + i];
    for (let j = i + 1; j < dim; j++) {
      let sum = 0;
      for (let k = i; k < j; k++) sum -= L[j * dim + k] * Linv[k * dim + i];
      Linv[j * dim + i] = sum / L[j * dim + j];
    }
  }
  const A = new Float64Array(dim * dim);
  const tmp = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++)
    for (let j = 0; j < dim; j++) {
      let s = 0;
      for (let k = 0; k < dim; k++) s += Linv[i * dim + k] * H[k * dim + j];
      tmp[i * dim + j] = s;
    }
  for (let i = 0; i < dim; i++)
    for (let j = 0; j < dim; j++) {
      let s = 0;
      for (let k = 0; k < dim; k++) s += tmp[i * dim + k] * Linv[j * dim + k];
      A[i * dim + j] = s;
    }

  const V = new Float64Array(dim * dim);
  for (let i = 0; i < dim; i++) V[i * dim + i] = 1;
  const evals = new Float64Array(dim);
  for (let i = 0; i < dim; i++) evals[i] = A[i * dim + i];

  for (let iter = 0; iter < 200; iter++) {
    let off = 0;
    for (let i = 0; i < dim; i++)
      for (let j = i + 1; j < dim; j++) off += A[i * dim + j] ** 2;
    if (off < 1e-24) break;
    for (let i = 0; i < dim; i++)
      for (let j = i + 1; j < dim; j++) {
        const aij = A[i * dim + j];
        if (Math.abs(aij) < 1e-15) continue;
        const diff = evals[j] - evals[i];
        let t;
        if (Math.abs(diff) < 1e-30) t = 1;
        else { const tau = diff / (2 * aij); t = Math.sign(tau) / (Math.abs(tau) + Math.sqrt(1 + tau * tau)); }
        const c = 1 / Math.sqrt(1 + t * t), s2 = t * c;
        evals[i] -= t * aij; evals[j] += t * aij;
        A[i * dim + j] = 0; A[j * dim + i] = 0;
        A[i * dim + i] = evals[i]; A[j * dim + j] = evals[j];
        for (let k = 0; k < dim; k++) {
          if (k === i || k === j) continue;
          const aki = A[k * dim + i], akj = A[k * dim + j];
          A[k * dim + i] = A[i * dim + k] = c * aki - s2 * akj;
          A[k * dim + j] = A[j * dim + k] = s2 * aki + c * akj;
        }
        for (let k = 0; k < dim; k++) {
          const vki = V[k * dim + i], vkj = V[k * dim + j];
          V[k * dim + i] = c * vki - s2 * vkj;
          V[k * dim + j] = s2 * vki + c * vkj;
        }
      }
  }

  const order = Array.from({ length: dim }, (_, i) => i).sort((a, b) => evals[a] - evals[b]);
  const evecs = [];
  const sortedEvals = new Float64Array(dim);
  for (let idx = 0; idx < dim; idx++) {
    const oi = order[idx];
    sortedEvals[idx] = evals[oi];
    const u = new Float64Array(dim);
    for (let k = 0; k < dim; k++) u[k] = V[k * dim + oi];
    const v = new Float64Array(dim);
    for (let i = dim - 1; i >= 0; i--) {
      let s = u[i];
      for (let k = i + 1; k < dim; k++) s -= L[k * dim + i] * v[k];
      v[i] = s / L[i * dim + i];
    }
    evecs.push(v);
  }
  return { eigenvalues: sortedEvals, eigenvectors: evecs };
}

const DENSITY_SAMPLES = 256;

function evalDensity(coeffs, parity, nSamples) {
  const isEven = parity === 'even';
  const out = new Float64Array(nSamples);
  for (let i = 0; i < nSamples; i++) {
    const th = (i / nSamples) * TAU;
    let f = 0;
    if (isEven) {
      for (let n = 0; n < coeffs.length; n++)
        f += coeffs[n] * (n === 0 ? 1 : Math.cos(n * th));
    } else {
      for (let n = 0; n < coeffs.length; n++)
        f += coeffs[n] * Math.sin((n + 1) * th);
    }
    out[i] = f * f;
  }
  let mx = 0;
  for (let i = 0; i < nSamples; i++) if (out[i] > mx) mx = out[i];
  if (mx > 0) for (let i = 0; i < nSamples; i++) out[i] /= mx;
  return out;
}

// C = ∫ f(θ₁) cosθ₁ (1 + ε cosθ₁) dθ₁  (charge overlap integral)
function computeChargeOverlap(coeffs, parity, eps) {
  const NQ = 512, dth = TAU / NQ;
  let c = 0, norm = 0;
  for (let q = 0; q < NQ; q++) {
    const th = (q + 0.5) * dth;
    const ct = Math.cos(th);
    const isEven = parity === 'even';
    let f = 0;
    if (isEven) {
      for (let n = 0; n < coeffs.length; n++)
        f += coeffs[n] * (n === 0 ? 1 : Math.cos(n * th));
    } else {
      for (let n = 0; n < coeffs.length; n++)
        f += coeffs[n] * Math.sin((n + 1) * th);
    }
    const w = 1 + eps * ct;
    c    += f * ct * w * dth;
    norm += f * f * w * dth;
  }
  return norm > 0 ? c / Math.sqrt(norm) : 0;
}

/* ── Scene ─────────────────────────────────────────── */

const { scene, camera, renderer, controls } = createScene($('view'), {
  camPos: [3.0, 2.0, 3.5], far: 300, maxDistance: 80,
});
autoResize(renderer, camera, $('view'));

const R_MAJOR = 2.0;

/* ── Torus mesh with per-vertex θ₁ ──────────────────── */

function buildColoredTorusGeom(R, a, segU, segV) {
  const nv = (segU + 1) * (segV + 1);
  const pos = new Float32Array(nv * 3);
  const col = new Float32Array(nv * 3); // RGB, initially black
  const theta1s = new Float32Array(nv);  // θ₁ per vertex
  const idx = [];
  let vi = 0, ci = 0, ti = 0;
  for (let i = 0; i <= segU; i++) {
    const th = (i / segU) * TAU;
    const ct = Math.cos(th), st = Math.sin(th);
    for (let j = 0; j <= segV; j++) {
      const ph = (j / segV) * TAU;
      const rr = R + a * ct;
      pos[vi++] = rr * Math.cos(ph);
      pos[vi++] = a * st;
      pos[vi++] = rr * Math.sin(ph);
      col[ci++] = 0; col[ci++] = 0; col[ci++] = 0;
      theta1s[ti++] = th;
    }
  }
  for (let i = 0; i < segU; i++)
    for (let j = 0; j < segV; j++) {
      const a_ = i * (segV + 1) + j, b_ = a_ + segV + 1;
      idx.push(a_, b_, a_ + 1, b_, b_ + 1, a_ + 1);
    }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('color',    new THREE.Float32BufferAttribute(col, 3));
  g.setIndex(idx);
  g.computeVertexNormals();
  g.userData.theta1s = theta1s;
  return g;
}

// Base dark shell (Phong, for depth/shape)
const shellMat = new THREE.MeshPhongMaterial({
  color: 0x0d1520, transparent: true, opacity: S.shellAlpha * 0.4,
  side: THREE.DoubleSide, depthWrite: false, shininess: 50,
});
// Additive vertex-color glow layer
const glowMat = new THREE.MeshBasicMaterial({
  vertexColors: true, transparent: true, opacity: S.shellAlpha,
  side: THREE.DoubleSide, depthWrite: false,
  blending: THREE.AdditiveBlending,
});
// Wireframe overlay
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x334455, wireframe: true, transparent: true, opacity: 0.07,
  side: THREE.DoubleSide,
});

let torusGeom = null, shellMesh = null, glowMesh = null, wireMesh = null;

function rebuildTorus() {
  if (shellMesh) { scene.remove(shellMesh, glowMesh, wireMesh); }
  if (torusGeom) torusGeom.dispose();

  const a = S.eps * R_MAJOR;
  const segU = 64, segV = 128;
  torusGeom = buildColoredTorusGeom(R_MAJOR, a, segU, segV);

  shellMesh = new THREE.Mesh(torusGeom, shellMat);
  glowMesh  = new THREE.Mesh(torusGeom, glowMat);
  wireMesh  = new THREE.Mesh(torusGeom, wireMat);
  wireMesh.visible = S.wire;
  scene.add(shellMesh, glowMesh, wireMesh);

  // Auto-fit camera
  const bound = R_MAJOR + a + 0.2;
  const dist = bound * 2.5;
  camera.position.set(dist * 0.50, dist * 0.65, dist * 0.68);
  controls.target.set(0, 0, 0);
  controls.update();
}

/* ── Vertex color update ─────────────────────────────── */

function updateVertexColors() {
  if (!torusGeom) return;
  const theta1s = torusGeom.userData.theta1s;
  const nv = theta1s.length;
  const colAttr = torusGeom.attributes.color;
  const arr = colAttr.array;

  for (let vi = 0; vi < nv; vi++) {
    const th1 = theta1s[vi];
    const si = Math.floor(((th1 / TAU + 1) % 1) * DENSITY_SAMPLES) % DENSITY_SAMPLES;
    let r = 0, g = 0, b = 0;
    for (let mi = 0; mi < S.modes.length; mi++) {
      const m = S.modes[mi];
      if (!m.visible) continue;
      const md = modeData[mi];
      if (!md || !md.density) continue;
      const d = md.density[si];
      const col = md.color3;
      r += col.r * d * m.brightness;
      g += col.g * d * m.brightness;
      b += col.b * d * m.brightness;
    }
    arr[vi * 3]     = Math.min(1, r);
    arr[vi * 3 + 1] = Math.min(1, g);
    arr[vi * 3 + 2] = Math.min(1, b);
  }
  colAttr.needsUpdate = true;
}

/* ── Mode data (density + geodesic mesh) ─────────────── */

// modeData[i] = { density, eigenvalue, chargeOverlap, color3, geodesicMesh }
const modeData = [];

function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }

function buildGeodesicMesh(m) {
  const n1 = m.n1, n2 = m.n2;
  const a = S.eps * R_MAJOR;
  if (a < 1e-6) return null;
  const nSeg = Math.max(200, (Math.abs(n1) + Math.abs(n2)) * 60);
  const pts = [];
  for (let i = 0; i <= nSeg; i++) {
    const t = (i / nSeg) * TAU;
    const th1 = n1 * t, ph = n2 * t;
    const rr = R_MAJOR + a * Math.cos(th1);
    pts.push(new THREE.Vector3(rr * Math.cos(ph), a * Math.sin(th1), rr * Math.sin(ph)));
  }
  const curve  = new THREE.CatmullRomCurve3(pts, true);
  const tubeR  = Math.max(0.007, Math.min(0.025, 0.012 / Math.max(1, S.eps * 0.5)));
  const geo    = new THREE.TubeGeometry(curve, nSeg, tubeR, 6, true);
  const mat    = new THREE.MeshBasicMaterial({ color: new THREE.Color(m.color) });
  const mesh   = new THREE.Mesh(geo, mat);
  mesh.visible = S.geodesics && m.showGeodesic && m.visible;
  return mesh;
}

function computeOneModeData(mi) {
  const m = S.modes[mi];
  const qeff = m.n2 - S.shear * m.n1;
  const result = solveEigenmodes(S.eps, qeff, m.parity);
  const absN1 = Math.abs(m.n1);
  const eigIdx = Math.min(
    m.parity === 'even' ? absN1 : Math.max(0, absN1 - 1),
    result.eigenvectors.length - 1
  );
  const coeffs = result.eigenvectors[eigIdx];
  const density = evalDensity(coeffs, m.parity, DENSITY_SAMPLES);
  const eigenvalue = result.eigenvalues[eigIdx];
  const chargeOverlap = computeChargeOverlap(coeffs, m.parity, S.eps);
  const color3 = new THREE.Color(m.color);
  return { density, eigenvalue, chargeOverlap, color3 };
}

function addModeData(mi) {
  const m = S.modes[mi];
  const data = computeOneModeData(mi);
  const geoMesh = buildGeodesicMesh(m);
  if (geoMesh) scene.add(geoMesh);
  modeData[mi] = { ...data, geodesicMesh: geoMesh };
}

function removeModeData(mi) {
  const md = modeData[mi];
  if (!md) return;
  if (md.geodesicMesh) {
    scene.remove(md.geodesicMesh);
    md.geodesicMesh.geometry.dispose();
    md.geodesicMesh.material.dispose();
  }
}

function rebuildAllModeData() {
  for (let i = 0; i < modeData.length; i++) removeModeData(i);
  modeData.length = 0;
  for (let i = 0; i < S.modes.length; i++) addModeData(i);
  updateVertexColors();
}

function refreshOneModeData(mi) {
  const md = modeData[mi];
  const newData = computeOneModeData(mi);
  // Rebuild geodesic if winding/eps changed
  if (md.geodesicMesh) {
    scene.remove(md.geodesicMesh);
    md.geodesicMesh.geometry.dispose();
    md.geodesicMesh.material.dispose();
  }
  const geoMesh = buildGeodesicMesh(S.modes[mi]);
  if (geoMesh) scene.add(geoMesh);
  modeData[mi] = { ...newData, geodesicMesh: geoMesh };
}

function refreshAllDensities() {
  for (let i = 0; i < S.modes.length; i++) refreshOneModeData(i);
  updateVertexColors();
}

/* ── Info panel ────────────────────────────────────── */

function updateInfo() {
  const parts = [
    `ε=${S.eps.toFixed(2)}`,
    `s=${S.shear.toFixed(3)}`,
    `${S.modes.length} mode${S.modes.length !== 1 ? 's' : ''}`,
  ];
  if (modeData[0]) {
    const qeff = (S.modes[0].n2 - S.shear * S.modes[0].n1).toFixed(3);
    parts.push(`q_eff=${qeff}  λ=${modeData[0].eigenvalue.toFixed(4)}`);
  }
  $('info').textContent = parts.join('   ');
}

/* ── Mode slot UI ──────────────────────────────────── */

function renderModeList() {
  const list = $('mode-list');
  list.innerHTML = '';
  S.modes.forEach((m, idx) => {
    const md = modeData[idx];
    const qeff = (m.n2 - S.shear * m.n1).toFixed(3);
    const lam  = md ? md.eigenvalue.toFixed(4) : '—';
    const C    = md ? md.chargeOverlap.toFixed(3) : '—';

    const div = document.createElement('div');
    div.className = 'mode-slot';
    div.innerHTML = `
      <div class="ms-top">
        <input type="color" class="ms-color" value="${m.color}" data-i="${idx}">
        <span style="color:${m.color};font-weight:700">(${m.n1},${m.n2}) ${m.parity}</span>
        <span style="flex:1"></span>
        <label style="font-size:10px"><input type="checkbox" class="ms-vis" data-i="${idx}" ${m.visible ? 'checked' : ''}> vis</label>
        <button class="btn ms-del" data-i="${idx}" title="Remove">✕</button>
      </div>
      <div class="ms-row">
        <span class="ms-lbl">n₁</span>
        <input type="number" class="ms-n1" data-i="${idx}" value="${m.n1}" min="-5" max="5" step="1">
        <span class="ms-lbl">n₂</span>
        <input type="number" class="ms-n2" data-i="${idx}" value="${m.n2}" min="-10" max="10" step="1">
        <button class="btn ms-parity" data-i="${idx}">${m.parity}</button>
      </div>
      <div class="ms-row">
        <span class="ms-lbl">☀</span>
        <input type="range" class="ms-bright" data-i="${idx}" min="0" max="1" step="0.05" value="${m.brightness}">
        <span class="val ms-bval">${m.brightness.toFixed(2)}</span>
        <label style="font-size:10px;margin-left:4px"><input type="checkbox" class="ms-geo" data-i="${idx}" ${m.showGeodesic ? 'checked' : ''}> geo</label>
      </div>
      <div class="ms-info">q_eff=${qeff}  λ=${lam}  C=${C}</div>
    `;
    list.appendChild(div);
  });

  list.querySelectorAll('.ms-n1').forEach(el => el.onchange = function () {
    const i = +this.dataset.i;
    S.modes[i].n1 = +this.value;
    refreshOneModeData(i); updateVertexColors();
    save(); renderModeList(); updateInfo();
  });
  list.querySelectorAll('.ms-n2').forEach(el => el.onchange = function () {
    const i = +this.dataset.i;
    S.modes[i].n2 = +this.value;
    refreshOneModeData(i); updateVertexColors();
    save(); renderModeList(); updateInfo();
  });
  list.querySelectorAll('.ms-parity').forEach(el => el.onclick = function () {
    const i = +this.dataset.i;
    S.modes[i].parity = S.modes[i].parity === 'even' ? 'odd' : 'even';
    refreshOneModeData(i); updateVertexColors();
    save(); renderModeList(); updateInfo();
  });
  list.querySelectorAll('.ms-color').forEach(el => el.oninput = function () {
    const i = +this.dataset.i;
    S.modes[i].color = this.value;
    if (modeData[i]) {
      modeData[i].color3.set(this.value);
      if (modeData[i].geodesicMesh)
        modeData[i].geodesicMesh.material.color.set(this.value);
    }
    updateVertexColors(); save();
  });
  list.querySelectorAll('.ms-bright').forEach(el => el.oninput = function () {
    const i = +this.dataset.i;
    S.modes[i].brightness = +this.value;
    this.closest('.ms-row').querySelector('.ms-bval').textContent = (+this.value).toFixed(2);
    updateVertexColors(); save();
  });
  list.querySelectorAll('.ms-vis').forEach(el => el.onchange = function () {
    const i = +this.dataset.i;
    S.modes[i].visible = this.checked;
    const md = modeData[i];
    if (md && md.geodesicMesh)
      md.geodesicMesh.visible = S.geodesics && this.checked && S.modes[i].showGeodesic;
    updateVertexColors(); save();
  });
  list.querySelectorAll('.ms-geo').forEach(el => el.onchange = function () {
    const i = +this.dataset.i;
    S.modes[i].showGeodesic = this.checked;
    const md = modeData[i];
    if (md && md.geodesicMesh)
      md.geodesicMesh.visible = S.geodesics && this.checked && S.modes[i].visible;
    save();
  });
  list.querySelectorAll('.ms-del').forEach(el => el.onclick = function () {
    const i = +this.dataset.i;
    removeModeData(i);
    modeData.splice(i, 1);
    S.modes.splice(i, 1);
    updateVertexColors(); save(); renderModeList(); updateInfo();
  });
}

function mkMode(n1, n2, parity = 'even', color = null) {
  return {
    n1, n2, parity,
    color: color || MODE_COLORS[S.modes.length % MODE_COLORS.length],
    brightness: 0.8, visible: true, showGeodesic: true,
  };
}

function addMode(n1 = 0, n2 = 1, parity = 'even', color = null) {
  S.modes.push(mkMode(n1, n2, parity, color));
  const idx = S.modes.length - 1;
  addModeData(idx);
  updateVertexColors();
  save(); renderModeList(); updateInfo();
}

/* ── Presets ────────────────────────────────────────── */

function applyPreset(name) {
  rebuildAllModeData(); // removes all existing
  modeData.length = 0;
  S.modes = [];

  const sets = {
    electron:    [mkMode(1, 2, 'even', '#ff6e40')],
    ghost:       [mkMode(1, 1, 'even', '#fdd835')],
    r21trio:     [mkMode(0, 2, 'even', '#4fc3f7'),
                  mkMode(1, 2, 'even', '#ff6e40'),
                  mkMode(1, 2, 'odd',  '#66bb6a')],
    harmonics:   [mkMode(1, 2, 'even', '#ff6e40'),
                  mkMode(2, 4, 'even', '#4fc3f7'),
                  mkMode(3, 6, 'even', '#66bb6a')],
    chargefamily:[mkMode(1, 1, 'even', '#fdd835'),
                  mkMode(1, 2, 'even', '#ff6e40'),
                  mkMode(1, 3, 'even', '#4fc3f7')],
  };

  S.modes = sets[name] || [mkMode(1, 2)];
  for (let i = 0; i < S.modes.length; i++) addModeData(i);
  updateVertexColors();
  save(); renderModeList(); updateInfo();
}

/* ── Global controls ───────────────────────────────── */

function setEps(val) {
  S.eps = val;
  $('sl-eps').value = arToSlider(val).toFixed(4);
  $('v-eps').textContent = val.toFixed(2);
  // Highlight matching preset button
  document.querySelectorAll('[data-ar]').forEach(b =>
    b.classList.toggle('on', Math.abs(+b.dataset.ar - val) < 0.005));
}

function setShear(val) {
  S.shear = val;
  $('sl-s').value = val.toFixed(3);
  $('v-s').textContent = val.toFixed(3);
  document.querySelectorAll('[data-sh]').forEach(b =>
    b.classList.toggle('on', Math.abs(+b.dataset.sh - val) < 0.001));
}

// Init slider/readout from state
setEps(S.eps);
setShear(S.shear);
$('sl-shell').value = S.shellAlpha;
$('v-shell').textContent = S.shellAlpha.toFixed(2);
$('cb-wire').checked = S.wire;

$('sl-eps').oninput = function () {
  setEps(sliderToAR(+this.value));
  rebuildTorus();
  rebuildAllModeData();
  renderModeList(); updateInfo(); save();
};

document.querySelectorAll('[data-ar]').forEach(btn => {
  btn.onclick = () => {
    setEps(+btn.dataset.ar);
    rebuildTorus(); rebuildAllModeData();
    renderModeList(); updateInfo(); save();
  };
});

$('sl-s').oninput = function () {
  setShear(+this.value);
  refreshAllDensities();
  renderModeList(); updateInfo(); save();
};

document.querySelectorAll('[data-sh]').forEach(btn => {
  btn.onclick = () => {
    setShear(+btn.dataset.sh);
    refreshAllDensities();
    renderModeList(); updateInfo(); save();
  };
});

$('sl-shell').oninput = function () {
  S.shellAlpha = +this.value;
  $('v-shell').textContent = S.shellAlpha.toFixed(2);
  shellMat.opacity = S.shellAlpha * 0.4;
  glowMat.opacity  = S.shellAlpha;
  save();
};

$('cb-geo').checked = S.geodesics;
$('cb-geo').onchange = function () {
  S.geodesics = this.checked;
  modeData.forEach((md, i) => {
    if (md && md.geodesicMesh)
      md.geodesicMesh.visible = S.geodesics && S.modes[i].showGeodesic && S.modes[i].visible;
  });
  save();
};

$('cb-wire').onchange = function () {
  S.wire = this.checked;
  if (wireMesh) wireMesh.visible = S.wire;
  save();
};

$('btn-add').onclick = () => addMode();
$('sel-preset').onchange = function () {
  if (this.value) { applyPreset(this.value); this.value = ''; }
};

$('btn-reset').onclick = () => {
  for (let i = 0; i < modeData.length; i++) removeModeData(i);
  modeData.length = 0;
  localStorage.removeItem(KEY);
  S = structuredClone(DEFAULTS);
  setEps(S.eps); setShear(S.shear);
  $('sl-shell').value = S.shellAlpha; $('v-shell').textContent = S.shellAlpha.toFixed(2);
  $('cb-geo').checked = S.geodesics;
  $('cb-wire').checked = S.wire;
  shellMat.opacity = S.shellAlpha * 0.4;
  glowMat.opacity  = S.shellAlpha;
  rebuildTorus(); rebuildAllModeData();
  renderModeList(); updateInfo();
};

/* ── Init ──────────────────────────────────────────── */

rebuildTorus();
rebuildAllModeData();
renderModeList();
updateInfo();
animLoop(() => {}, { renderer, scene, camera, controls });
</script>
</body>
</html>
