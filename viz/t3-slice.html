<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T³ Slicer — totu viz</title>
<link rel="stylesheet" href="totu-viz.css">
<style>
select {
  background: #1a1a2e; color: #4fc3f7; border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px; padding: 2px 6px; font: inherit; font-size: 11px;
  cursor: pointer;
}
#diagram {
  position: absolute; top: 60px; right: 14px;
  pointer-events: none; z-index: 10;
}
.lbl { color: #777; }
.v   { font-weight: 700; }
.v.cyan   { color: #4fc3f7; }
.v.orange { color: #ff8a50; }
.v.white  { color: #e0e0e0; }
#info-panel {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(10,10,18,0.9); padding: 8px 18px; border-radius: 8px;
  backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.06);
  font-size: 11px; display: flex; gap: 18px; white-space: nowrap;
  pointer-events: none; z-index: 10;
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>T³ Slicer</h1><div class="sep"></div>

  <div class="cg">
    <label>Mode</label>
    <select id="sel-mode">
      <option value="tube" selected>Tube sweep</option>
      <option value="ring">Ring sweep</option>
    </select>
  </div><div class="sep"></div>

  <div class="cg">
    <label>a/R</label>
    <input type="range" id="sl-ar" min="0.10" max="0.90" step="0.01" value="0.40">
    <span class="val" id="v-ar">0.40</span>
  </div>
  <div class="cg">
    <label>b/a</label>
    <input type="range" id="sl-ba" min="0.05" max="1.00" step="0.01" value="0.50">
    <span class="val" id="v-ba">0.50</span>
  </div><div class="sep"></div>

  <button class="btn on" id="btn-play">▶ Play</button>
  <div class="cg">
    <label>Period</label>
    <input type="range" id="sl-period" min="0.5" max="15" step="0.1" value="4.0">
    <span class="val" id="v-period">4.0s</span>
  </div><div class="sep"></div>

  <div class="cg">
    <label>θ₃</label>
    <input type="range" id="sl-theta3" min="0" max="6.283" step="0.01" value="0">
    <span class="val" id="v-theta3">0.00</span>
  </div><div class="sep"></div>

  <div class="tog"><label><input type="checkbox" id="t-outer" checked> Outer</label></div>
  <div class="tog"><label><input type="checkbox" id="t-inner" checked> Inner</label></div>
  <div class="tog"><label><input type="checkbox" id="t-wire"> Wire</label></div>
</div>

<div class="view-full" id="view">
  <canvas id="diagram" width="150" height="150"></canvas>
  <div id="info-panel">
    <div><span class="lbl">θ₃ = </span><span class="v white" id="i-theta3">0.000</span></div>
    <div><span class="lbl">w/b = </span><span class="v white" id="i-w">0.000</span></div>
    <div><span class="lbl">Outer </span><span class="v cyan" id="i-outer">—</span></div>
    <div><span class="lbl">Inner </span><span class="v orange" id="i-inner">—</span></div>
    <div><span class="v white" id="i-state">split</span></div>
  </div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}}
</script>
<script type="module">
import { THREE, createScene, autoResize, PALETTE } from './totu-viz.js';

const $ = id => document.getElementById(id);
const R = 1.0;
const SEG_U = 64, SEG_V = 32;

const S = {
  mode: 'tube', aR: 0.40, bA: 0.50,
  period: 4.0, playing: true,
  showOuter: true, showInner: true, showWire: false,
};

const { scene, camera, renderer, controls, clock } = createScene($('view'), {
  camPos: [2.2, 1.6, 2.8],
});
autoResize(renderer, camera, $('view'));

/* ── Reusable torus buffer geometry ───────────────────── */
function createTorusBuf() {
  const count = (SEG_U + 1) * (SEG_V + 1);
  const pos = new Float32Array(count * 3);
  const norm = new Float32Array(count * 3);
  const idx = [];
  for (let j = 0; j < SEG_V; j++)
    for (let i = 0; i < SEG_U; i++) {
      const a = j * (SEG_U + 1) + i, b = a + 1;
      const c = a + SEG_U + 1, d = c + 1;
      idx.push(a, b, c, b, d, c);
    }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('normal',   new THREE.BufferAttribute(norm, 3));
  g.setIndex(idx);
  return g;
}

function fillTorusBuf(g, majR, tubeR) {
  const pos = g.attributes.position;
  const norm = g.attributes.normal;
  let k = 0;
  for (let j = 0; j <= SEG_V; j++) {
    const v = (j / SEG_V) * 2 * Math.PI;
    const cv = Math.cos(v), sv = Math.sin(v);
    for (let i = 0; i <= SEG_U; i++) {
      const u = (i / SEG_U) * 2 * Math.PI;
      const cu = Math.cos(u), su = Math.sin(u);
      const rr = majR + tubeR * cv;
      pos.setXYZ(k, rr * cu, tubeR * sv, rr * su);
      norm.setXYZ(k, cv * cu, sv, cv * su);
      k++;
    }
  }
  pos.needsUpdate = true;
  norm.needsUpdate = true;
}

/* ── Materials ────────────────────────────────────────── */
const outerMat = new THREE.MeshPhongMaterial({
  color: 0x4fc3f7, transparent: true, opacity: 0.32,
  side: THREE.DoubleSide, depthWrite: false,
});
const innerMat = new THREE.MeshPhongMaterial({
  color: 0xff8a50, transparent: true, opacity: 0.32,
  side: THREE.DoubleSide, depthWrite: false,
});
const outerWireMat = new THREE.MeshBasicMaterial({
  color: 0x4fc3f7, wireframe: true, transparent: true, opacity: 0.06,
});
const innerWireMat = new THREE.MeshBasicMaterial({
  color: 0xff8a50, wireframe: true, transparent: true, opacity: 0.06,
});

/* ── Meshes (share geometry between surface & wireframe) */
const outerGeom = createTorusBuf();
const innerGeom = createTorusBuf();

const outerMesh = new THREE.Mesh(outerGeom, outerMat);
const outerWire = new THREE.Mesh(outerGeom, outerWireMat);
const innerMesh = new THREE.Mesh(innerGeom, innerMat);
const innerWire = new THREE.Mesh(innerGeom, innerWireMat);

[outerMesh, outerWire, innerMesh, innerWire].forEach(m => {
  m.frustumCulled = false;
});
outerWire.visible = false;
innerWire.visible = false;

const world = new THREE.Group();
world.add(outerMesh, outerWire, innerMesh, innerWire);
scene.add(world);

/* ── Update slice at given θ₃ ─────────────────────────── */
function updateSlice(theta3) {
  const a = S.aR * R;
  const b = S.bA * a;
  const span = b * Math.abs(Math.cos(theta3));

  let majOuter, majInner, rOuter, rInner;
  if (S.mode === 'tube') {
    majOuter = majInner = R;
    rOuter = a + span;
    rInner = Math.max(0.002, a - span);
  } else {
    rOuter = rInner = a;
    majOuter = R + span;
    majInner = Math.max(rInner + 0.002, R - span);
  }

  fillTorusBuf(outerGeom, majOuter, rOuter);
  fillTorusBuf(innerGeom, majInner, rInner);

  const maxExt = Math.max(majOuter + rOuter, majInner + rInner);
  world.scale.setScalar(1.8 / maxExt);

  outerMesh.visible = S.showOuter;
  outerWire.visible = S.showOuter && S.showWire;
  innerMesh.visible = S.showInner;
  innerWire.visible = S.showInner && S.showWire;

  const w_norm = Math.sin(theta3);
  const merged = span < 0.005 * a;

  $('i-theta3').textContent = theta3.toFixed(3);
  $('i-w').textContent = w_norm.toFixed(3);
  $('i-state').textContent = merged ? 'merged' : 'split';

  if (S.mode === 'tube') {
    $('i-outer').textContent = `r = ${rOuter.toFixed(3)}`;
    $('i-inner').textContent = `r = ${rInner.toFixed(3)}`;
  } else {
    $('i-outer').textContent = `R = ${majOuter.toFixed(3)}`;
    $('i-inner').textContent = `R = ${majInner.toFixed(3)}`;
  }

  drawDiagram(theta3);
}

/* ── θ₃ diagram (2D overlay) ─────────────────────────── */
const dCtx = $('diagram').getContext('2d');
function drawDiagram(theta3) {
  const W = 150, H = 150, cx = W / 2, cy = H / 2, cr = 48;
  dCtx.clearRect(0, 0, W, H);

  // S¹ circle
  dCtx.strokeStyle = 'rgba(255,255,255,0.15)';
  dCtx.lineWidth = 1;
  dCtx.beginPath();
  dCtx.arc(cx, cy, cr, 0, 2 * Math.PI);
  dCtx.stroke();

  // w-level line (horizontal at sin θ₃)
  const sy = cy - cr * Math.sin(theta3);
  dCtx.strokeStyle = 'rgba(255,255,255,0.12)';
  dCtx.setLineDash([3, 3]);
  dCtx.beginPath();
  dCtx.moveTo(cx - cr - 8, sy);
  dCtx.lineTo(cx + cr + 8, sy);
  dCtx.stroke();
  dCtx.setLineDash([]);

  // Dot 1 (outer): angle = theta3 on unit circle
  const x1 = cx + cr * Math.cos(theta3);
  const y1 = cy - cr * Math.sin(theta3);
  dCtx.fillStyle = '#4fc3f7';
  dCtx.beginPath();
  dCtx.arc(x1, y1, 5, 0, 2 * Math.PI);
  dCtx.fill();

  // Dot 2 (inner): angle = π − theta3
  const x2 = cx + cr * Math.cos(Math.PI - theta3);
  const y2 = cy - cr * Math.sin(Math.PI - theta3);
  dCtx.fillStyle = '#ff8a50';
  dCtx.beginPath();
  dCtx.arc(x2, y2, 5, 0, 2 * Math.PI);
  dCtx.fill();

  // Label
  dCtx.fillStyle = 'rgba(255,255,255,0.35)';
  dCtx.font = '10px monospace';
  dCtx.textAlign = 'center';
  dCtx.fillText('S¹ (θ₃)', cx, cy + cr + 14);
  dCtx.textAlign = 'right';
  dCtx.fillText('w', cx + cr + 16, cy + 3);
}

/* ── Controls ─────────────────────────────────────────── */
$('sel-mode').onchange = e => { S.mode = e.target.value; };
$('sl-ar').oninput   = e => { S.aR = +e.target.value; $('v-ar').textContent = S.aR.toFixed(2); };
$('sl-ba').oninput   = e => { S.bA = +e.target.value; $('v-ba').textContent = S.bA.toFixed(2); };
$('sl-period').oninput = e => {
  S.period = +e.target.value;
  $('v-period').textContent = S.period.toFixed(1) + 's';
};

let phase = 0;

$('sl-theta3').oninput = e => {
  if (!S.playing) {
    phase = +e.target.value;
    $('v-theta3').textContent = phase.toFixed(2);
    updateSlice(phase);
  }
};

$('btn-play').addEventListener('click', () => {
  S.playing = !S.playing;
  const btn = $('btn-play');
  btn.textContent = S.playing ? '▶ Play' : '⏸ Pause';
  btn.classList.toggle('on', S.playing);
});

$('t-outer').onchange = e => { S.showOuter = e.target.checked; };
$('t-inner').onchange = e => { S.showInner = e.target.checked; };
$('t-wire').onchange  = e => { S.showWire  = e.target.checked; };

/* ── Animation loop ───────────────────────────────────── */

(function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const dt = clock.getDelta();
  if (S.playing) {
    phase += (2 * Math.PI * dt) / S.period;
    if (phase > 2 * Math.PI) phase -= 2 * Math.PI;
    $('sl-theta3').value = phase;
    $('v-theta3').textContent = phase.toFixed(2);
  }

  updateSlice(phase);
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
