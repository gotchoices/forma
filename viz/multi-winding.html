<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R8 Multi-Winding Visualizer</title>
<link rel="stylesheet" href="totu-viz.css">
<style>
#row2 {
  display: flex; align-items: center; gap: 12px;
  padding: 6px 16px;
  background: rgba(10,10,18,0.92);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0; flex-wrap: wrap;
}
#main { display: flex; flex: 1; min-height: 0; }
#view-3d { flex: 1; position: relative; }
#view-2d {
  flex: 1; position: relative;
  border-left: 1px solid rgba(255,255,255,0.08);
}
#flat-canvas { display: block; width: 100%; height: 100%; }
.view-label {
  position: absolute; top: 8px; left: 12px;
  font-size: 11px; color: #555; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  pointer-events: none;
}
#info-panel {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(10,10,18,0.9); padding: 8px 16px; border-radius: 8px;
  backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.06);
  font-size: 11px; display: flex; gap: 14px; flex-wrap: wrap;
  justify-content: center; max-width: 96vw;
  pointer-events: none; z-index: 10;
}
.lbl { color: #777; }
.v { color: #4fc3f7; font-weight: 700; }
.warn { color: #ef5350; font-weight: 700; }
.ok { color: #66bb6a; font-weight: 700; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>R8 Multi-Winding</h1><div class="sep"></div>

  <div class="cg">
    <label>a/R</label>
    <input type="range" id="sl-ar" min="0.05" max="3" step="0.01" value="0.34">
    <span class="val" id="v-ar">0.34</span>
  </div>
  <div class="cg" style="gap:3px">
    <button class="btn ar-btn on" data-v="0.34">R8</button>
    <button class="btn ar-btn" data-v="1.00">Horn</button>
    <button class="btn ar-btn" data-v="0.10">Thin</button>
  </div><div class="sep"></div>

  <div class="cg">
    <label>Speed</label>
    <input type="range" id="sl-speed" min="0.1" max="5" step="0.1" value="1.0">
    <span class="val" id="v-speed">1.0</span>
  </div>
  <div class="tog"><label><input type="checkbox" id="t-surface" checked> Surface</label></div>
  <div class="tog"><label><input type="checkbox" id="t-path" checked> Path</label></div>
  <div class="tog"><label><input type="checkbox" id="t-photon" checked> Photon</label></div>
</div>

<div id="row2">
  <div class="cg">
    <label>q (major)</label>
    <input type="range" id="sl-q" min="2" max="21" step="1" value="2">
    <span class="val" id="v-q">2</span>
  </div>
  <div class="cg">
    <label>p (minor)</label>
    <input type="range" id="sl-p" min="1" max="10" step="1" value="1">
    <span class="val" id="v-p">1</span>
  </div><div class="sep"></div>
  <div class="cg">
    <label>Shear</label>
    <input type="checkbox" id="t-shear">
    <span class="val" id="v-shear" style="min-width:50px; font-size:10px; color:#888">off</span>
  </div><div class="sep"></div>
  <div class="cg" style="gap:3px">
    <button class="btn wbtn" data-p="1" data-q="2" data-s="0">(1,2)</button>
    <button class="btn wbtn" data-p="2" data-q="4" data-s="0">(2,4) ✗</button>
    <button class="btn wbtn" data-p="3" data-q="6" data-s="0">(3,6) ✗</button>
    <button class="btn wbtn" data-p="1" data-q="3" data-s="0">(1,3)</button>
    <button class="btn wbtn" data-p="3" data-q="7" data-s="0">(3,7)</button>
    <button class="btn wbtn" data-p="5" data-q="11" data-s="1">(5,11)+δ</button>
    <button class="btn wbtn" data-p="7" data-q="15" data-s="1">(7,15)+δ</button>
    <button class="btn wbtn" data-p="9" data-q="19" data-s="1">(9,19)+δ</button>
  </div>
</div>

<div id="main">
  <div id="view-3d">
    <div class="view-label">3D Torus</div>
  </div>
  <div id="view-2d">
    <canvas id="flat-canvas"></canvas>
    <div class="view-label">Flat Ma (material space)</div>
  </div>
</div>

<div id="info-panel">
  <div><span class="lbl">Knot </span><span class="v" id="i-knot">(1,2)</span></div>
  <div><span class="lbl">gcd = </span><span class="v" id="i-gcd">1</span></div>
  <div><span class="lbl">Loops: </span><span class="v" id="i-loops">1</span></div>
  <div><span class="lbl">Ratio p/q = </span><span class="v" id="i-ratio">0.500</span></div>
  <div><span class="lbl">Physical = </span><span class="v" id="i-phys">0.500</span></div>
  <div><span class="lbl">Spin </span><span class="v" id="i-spin">½</span></div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}}
</script>
<script type="module">
import {
  THREE, createScene, autoResize, buildTorusGeom,
  torusPt, createPhoton, torusMaterials, PALETTE
} from './totu-viz.js';

const $ = id => document.getElementById(id);
const R = 1.0, FIT = 2.2, PATH_N = 1200;

function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }

const LOOP_COLORS_3D = [0xff6e40,0x42a5f5,0x66bb6a,0xab47bc,0xffca28,0xef5350,0x26c6da,0xff7043];
const LOOP_COLORS_2D = ['#ff6e40','#42a5f5','#66bb6a','#ab47bc','#ffca28','#ef5350','#26c6da','#ff7043'];

const S = { aR: 0.34, p: 1, q: 2, speed: 1, shear: false,
            showSurface: true, showPath: true, showPhoton: true };

/* ── 3D Scene ──────────────────────────────────────────── */

const { scene, camera, renderer, controls, clock } = createScene($('view-3d'));
autoResize(renderer, camera, $('view-3d'));

const world = new THREE.Group();
scene.add(world);

const mats = torusMaterials({ opacity: 0.3 });
let surfMesh, wireSurf;
let pathMeshes = [];

const photon = createPhoton();
world.add(photon.mesh);

function rebuild3D() {
  const a = S.aR * R;
  const gs = FIT / (R + a);
  world.scale.setScalar(gs);

  if (surfMesh) { surfMesh.geometry.dispose(); world.remove(surfMesh); }
  if (wireSurf) { wireSurf.geometry.dispose(); world.remove(wireSurf); }
  pathMeshes.forEach(m => { m.geometry.dispose(); world.remove(m); });
  pathMeshes = [];

  const tg = buildTorusGeom(R, a);
  surfMesh = new THREE.Mesh(tg, mats.surface);
  wireSurf = new THREE.Mesh(tg, mats.wire);
  surfMesh.visible = S.showSurface;
  wireSurf.visible = S.showSurface;
  world.add(surfMesh, wireSurf);

  const g = gcd(S.p, S.q);
  const p0 = S.p / g, q0 = S.q / g;

  for (let i = 0; i < g; i++) {
    const col = LOOP_COLORS_3D[i % LOOP_COLORS_3D.length];
    const mat = new THREE.MeshPhongMaterial({
      color: col, emissive: new THREE.Color(col).multiplyScalar(0.3), shininess: 80,
    });
    const pts = [];
    const t_off = (2 * Math.PI * i) / (g * q0);
    for (let j = 0; j <= PATH_N; j++) {
      const t = t_off + (j / PATH_N) * 2 * Math.PI;
      pts.push(torusPt(t, R, a, p0, q0));
    }
    const curve = new THREE.CatmullRomCurve3(pts, true);
    const tubeR = Math.max(0.008, 0.02 / gs);
    const mesh = new THREE.Mesh(
      new THREE.TubeGeometry(curve, PATH_N, tubeR, 5, true), mat
    );
    mesh.visible = S.showPath;
    world.add(mesh);
    pathMeshes.push(mesh);
  }

  photon.mesh.scale.setScalar(Math.max(0.03, 0.05 / gs));
  photon.glow.distance = 3 / gs;
  photon.mesh.visible = S.showPhoton;
}

/* ── 2D Flat View ──────────────────────────────────────── */

const fc = $('flat-canvas');
const ctx = fc.getContext('2d');

function draw2D(phase) {
  const W = fc.width, H = fc.height;
  const dpr = devicePixelRatio || 1;
  ctx.clearRect(0, 0, W, H);

  const { p, q, aR, shear } = S;
  const r = aR, g = gcd(p, q);
  const delta = shear ? 1 / (2 * q) : 0;

  const pad = 36 * dpr;
  const avW = W - 2 * pad, avH = H - 2 * pad - 16 * dpr;
  const dispR = Math.max(r, 0.15);
  const sc = Math.min(avW / 1.0, avH / dispR);
  const rW = sc * 1.0, rH = sc * dispR;
  const ox = (W - rW) / 2, oy = (H - rH) / 2;
  const shearScreen = delta * rH;

  ctx.strokeStyle = '#1e1e2e'; ctx.lineWidth = 1 * dpr;
  for (let i = 0; i <= 8; i++) {
    const x = ox + (i / 8) * rW, s = (i / 8) * shearScreen;
    ctx.beginPath(); ctx.moveTo(x, oy - s); ctx.lineTo(x, oy + rH - s); ctx.stroke();
  }
  const nG = Math.max(2, Math.round(8 * dispR));
  for (let i = 0; i <= nG; i++) {
    const y = oy + rH - (i / nG) * rH;
    ctx.beginPath(); ctx.moveTo(ox, y); ctx.lineTo(ox + rW, y - shearScreen); ctx.stroke();
  }

  ctx.lineWidth = 2 * dpr;
  ctx.strokeStyle = '#e05050';
  ctx.setLineDash([5 * dpr, 3 * dpr]);
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox, oy + rH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox + rW, oy - shearScreen); ctx.lineTo(ox + rW, oy + rH - shearScreen); ctx.stroke();
  ctx.strokeStyle = '#50b0e0';
  ctx.beginPath(); ctx.moveTo(ox, oy + rH); ctx.lineTo(ox + rW, oy + rH - shearScreen); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox + rW, oy - shearScreen); ctx.stroke();
  ctx.setLineDash([]);

  if (shear && delta > 0.001) {
    ctx.strokeStyle = '#ffca28'; ctx.lineWidth = 1.5 * dpr;
    ctx.setLineDash([3 * dpr, 2 * dpr]);
    const xR = ox + rW + 4 * dpr;
    ctx.beginPath(); ctx.moveTo(xR, oy); ctx.lineTo(xR, oy - shearScreen); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ffca28'; ctx.font = `${9 * dpr}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'left'; ctx.fillText('δ', xR + 3 * dpr, oy - shearScreen / 2 + 3 * dpr);
  }

  ctx.font = `${11 * dpr}px 'Segoe UI', sans-serif`; ctx.textAlign = 'center';
  ctx.fillStyle = '#e05050';
  ctx.fillText('φ  (major circle)', ox + rW / 2, oy + rH + 16 * dpr);
  ctx.save();
  ctx.translate(ox - 14 * dpr, oy + rH / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#50b0e0'; ctx.fillText('θ  (minor circle)', 0, 0);
  ctx.restore();

  const p0 = p / g, q0 = q / g;
  const steps = Math.max(2000, q * 200);

  for (let loop = 0; loop < g; loop++) {
    ctx.strokeStyle = LOOP_COLORS_2D[loop % LOOP_COLORS_2D.length];
    ctx.lineWidth = (g === 1 ? 2 : 1.8) * dpr;
    ctx.globalAlpha = g === 1 ? 0.85 : 0.75;
    const theta_off = loop / g;
    let prevSx = null, prevSy = null;
    for (let i = 0; i <= steps; i++) {
      const frac = i / steps;
      const rawPhi = frac * q0;
      const rawTheta = theta_off + frac * p0;
      const nPhi = Math.floor(rawPhi);
      const phiLocal = rawPhi - nPhi;
      let thetaLocal = rawTheta - nPhi * delta;
      thetaLocal = thetaLocal - Math.floor(thetaLocal);
      const sx = ox + phiLocal * rW;
      const sy = oy + rH - thetaLocal * rH + phiLocal * shearScreen;
      if (prevSx !== null) {
        const dx = Math.abs(sx - prevSx), dy = Math.abs(sy - prevSy);
        if (dx < rW * 0.4 && dy < rH * 0.4) {
          ctx.beginPath(); ctx.moveTo(prevSx, prevSy); ctx.lineTo(sx, sy); ctx.stroke();
        }
      }
      prevSx = sx; prevSy = sy;
    }
  }
  ctx.globalAlpha = 1.0;

  if (S.showPhoton) {
    const totalAng = 2 * Math.PI * q;
    const t = phase % totalAng, frac = t / totalAng;
    const rawPhi = frac * q, rawTheta = frac * p;
    const nPhi = Math.floor(rawPhi);
    const phiLocal = rawPhi - nPhi;
    let thetaLocal = rawTheta - nPhi * delta;
    thetaLocal = thetaLocal - Math.floor(thetaLocal);
    const sx = ox + phiLocal * rW;
    const sy = oy + rH - thetaLocal * rH + phiLocal * shearScreen;

    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 16 * dpr);
    grad.addColorStop(0, 'rgba(253,216,53,0.6)');
    grad.addColorStop(1, 'rgba(253,216,53,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(sx, sy, 16 * dpr, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fdd835';
    ctx.beginPath(); ctx.arc(sx, sy, 4 * dpr, 0, Math.PI * 2); ctx.fill();
  }

  ctx.font = `${12 * dpr}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'center';
  const cx = W / 2, ty = oy - 22 * dpr;
  if (g > 1) {
    ctx.fillStyle = '#ef5350';
    ctx.fillText(`gcd(${p},${q}) = ${g}  →  ${g} disconnected loops`, cx, ty);
    ctx.font = `${10 * dpr}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = '#999';
    ctx.fillText(`Each loop is a (${p/g},${q/g}) knot — path never covers the full torus`, cx, ty + 14 * dpr);
  } else if (shear && Math.abs((p + 0.5) / q - 0.5) < 0.001) {
    ctx.fillStyle = '#66bb6a';
    ctx.fillText(`Single path, coprime (${p},${q}) — physical ratio exactly ½`, cx, ty);
    ctx.font = `${10 * dpr}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = '#ffca28';
    ctx.fillText(`Shear δ/L_θ = 1/${2*q} shifts each pass by δ → spin-½ exact`, cx, ty + 14 * dpr);
  } else if (g === 1) {
    ctx.fillStyle = '#66bb6a';
    let msg = `Single path, coprime (${p},${q})`;
    if (Math.abs(p / q - 0.5) < 0.001) msg += ' — ratio exactly ½, spin-½';
    ctx.fillText(msg, cx, ty);
  }
}

/* ── Info Panel ─────────────────────────────────────────── */

function updateInfo() {
  const { p, q, shear } = S;
  const g = gcd(p, q);
  const delta = shear ? 1 / (2 * q) : 0;
  const physRatio = (p + q * delta) / q;

  $('i-knot').textContent = `(${p},${q})`;
  const gcdEl = $('i-gcd');
  gcdEl.textContent = g; gcdEl.className = g === 1 ? 'v ok' : 'v warn';
  const loopEl = $('i-loops');
  loopEl.textContent = g === 1 ? '1 ✓' : `${g} ✗`; loopEl.className = g === 1 ? 'v ok' : 'v warn';
  $('i-ratio').textContent = (p / q).toFixed(4);
  $('i-phys').textContent = physRatio.toFixed(4);

  const spinEl = $('i-spin');
  if (g > 1) { spinEl.textContent = `✗ (${g} loops)`; spinEl.className = 'v warn'; }
  else if (Math.abs(physRatio - 0.5) < 0.0001) { spinEl.textContent = '½ exact'; spinEl.className = 'v ok'; }
  else if (Math.abs(physRatio - 0.5) < 0.05) { spinEl.textContent = `≈½ (${(physRatio*2).toFixed(3)}/2)`; spinEl.className = 'v'; }
  else { spinEl.textContent = `${p + (shear ? 0.5 : 0)}/${q}`; spinEl.className = 'v'; }
}

/* ── Controls ──────────────────────────────────────────── */

function setAR(v) {
  S.aR = v; $('sl-ar').value = v; $('v-ar').textContent = v.toFixed(2);
  rebuild3D(); updateInfo();
}

function setWinding(p, q, shear) {
  S.p = p; S.q = q; S.shear = !!shear;
  $('sl-p').value = p; $('sl-p').max = Math.max(10, q - 1);
  $('sl-q').value = Math.min(q, 21);
  $('v-p').textContent = p; $('v-q').textContent = q;
  $('t-shear').checked = S.shear;
  updateShearLabel();
  rebuild3D(); updateInfo();
}

function updateShearLabel() {
  const el = $('v-shear');
  if (S.shear) {
    el.textContent = `δ/Lθ = 1/${2 * S.q}`; el.style.color = '#ffca28';
  } else {
    el.textContent = 'off'; el.style.color = '#888';
  }
}

$('sl-ar').addEventListener('input', e => {
  S.aR = parseFloat(e.target.value); $('v-ar').textContent = S.aR.toFixed(2);
  document.querySelectorAll('.ar-btn').forEach(b => b.classList.remove('on'));
  rebuild3D(); updateInfo();
});

document.querySelectorAll('.ar-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ar-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    setAR(parseFloat(btn.dataset.v));
  });
});

$('sl-q').addEventListener('input', e => {
  S.q = parseInt(e.target.value); $('v-q').textContent = S.q;
  $('sl-p').max = Math.max(10, S.q - 1);
  if (S.p >= S.q) { S.p = S.q - 1; $('sl-p').value = S.p; $('v-p').textContent = S.p; }
  document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('on'));
  updateShearLabel(); rebuild3D(); updateInfo();
});

$('sl-p').addEventListener('input', e => {
  S.p = parseInt(e.target.value); $('v-p').textContent = S.p;
  document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('on'));
  rebuild3D(); updateInfo();
});

$('sl-speed').addEventListener('input', e => {
  S.speed = parseFloat(e.target.value); $('v-speed').textContent = S.speed.toFixed(1);
});

$('t-shear').addEventListener('change', e => {
  S.shear = e.target.checked; updateShearLabel(); rebuild3D(); updateInfo();
});
$('t-surface').addEventListener('change', e => {
  S.showSurface = e.target.checked;
  if (surfMesh) surfMesh.visible = S.showSurface;
  if (wireSurf) wireSurf.visible = S.showSurface;
});
$('t-path').addEventListener('change', e => {
  S.showPath = e.target.checked;
  pathMeshes.forEach(m => m.visible = S.showPath);
});
$('t-photon').addEventListener('change', e => {
  S.showPhoton = e.target.checked;
  photon.mesh.visible = S.showPhoton;
});

document.querySelectorAll('.wbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    setWinding(parseInt(btn.dataset.p), parseInt(btn.dataset.q), parseInt(btn.dataset.s));
  });
});

/* ── Resize ───────────────────────────────────────────── */

function resize2D() {
  const dpr = devicePixelRatio || 1;
  const v2 = $('view-2d');
  fc.width = v2.clientWidth * dpr;
  fc.height = v2.clientHeight * dpr;
  fc.style.width = v2.clientWidth + 'px';
  fc.style.height = v2.clientHeight + 'px';
}
window.addEventListener('resize', resize2D);
resize2D();

/* ── Animation ─────────────────────────────────────────── */

rebuild3D(); updateInfo(); updateShearLabel();

(function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const elapsed = clock.getElapsedTime() * S.speed;
  const a = S.aR * R;
  const totalAng = 2 * Math.PI * S.q;
  const phase = elapsed % totalAng;

  if (photon.mesh.visible) {
    const pt = torusPt(phase, R, a, S.p, S.q);
    photon.mesh.position.copy(pt);
  }

  renderer.render(scene, camera);
  draw2D(phase);
})();

</script>
</body>
</html>
