<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dual Visualizer — 3D Torus + 2D Flat</title>
<link rel="stylesheet" href="totu-viz.css">
<style>
#main { display: flex; flex: 1; min-height: 0; }
#view-3d { flex: 1; position: relative; }
#view-2d {
  flex: 1; position: relative;
  border-left: 1px solid rgba(255,255,255,0.08);
}
#flat-canvas { display: block; width: 100%; height: 100%; }
.view-label {
  position: absolute; top: 8px; left: 12px;
  font-size: 11px; color: #666; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  pointer-events: none;
}
#info-panel {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(10,10,18,0.88); padding: 10px 18px; border-radius: 8px;
  backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.06);
  font-size: 11px; display: flex; gap: 24px; white-space: nowrap;
  pointer-events: none; z-index: 10;
}
.lbl { color: #777; }
.v { color: #4fc3f7; font-weight: 700; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Dual Visualizer</h1><div class="sep"></div>

  <div class="cg">
    <label>a/R</label>
    <input type="range" id="ar" min="0.1" max="12" step="0.01" value="6.60">
    <span class="val" id="ar-v">6.60</span>
  </div>
  <div class="cg" style="gap:3px">
    <button class="btn" data-v="0.50">Ring 0.5</button>
    <button class="btn" data-v="1.00">Horn</button>
    <button class="btn on" data-v="6.60">q = e</button>
  </div><div class="sep"></div>

  <div class="cg">
    <label>Knot (p,q)</label>
    <button class="btn knot on" data-p="1" data-q="2">(1,2)</button>
    <button class="btn knot" data-p="1" data-q="1">(1,1)</button>
    <button class="btn knot" data-p="2" data-q="3">(2,3)</button>
    <button class="btn knot" data-p="3" data-q="2">(3,2)</button>
  </div><div class="sep"></div>

  <div class="cg">
    <label>Speed</label>
    <input type="range" id="speed" min="0.1" max="4" step="0.1" value="1.0">
    <span class="val" id="speed-v">1.0</span>
  </div>
  <div class="tog"><label><input type="checkbox" id="t-surface" checked> Surface</label></div>
  <div class="tog"><label><input type="checkbox" id="t-path" checked> Path</label></div>
  <div class="tog"><label><input type="checkbox" id="t-photon" checked> Photon</label></div>
</div>

<div id="main">
  <div id="view-3d">
    <div class="view-label">3D Torus</div>
  </div>
  <div id="view-2d">
    <canvas id="flat-canvas"></canvas>
    <div class="view-label">2D Flat (material dimensions)</div>
  </div>
</div>

<div id="info-panel">
  <div><span class="lbl">a/R = </span><span class="v" id="i-ar">6.60</span></div>
  <div><span class="lbl">Knot </span><span class="v" id="i-knot">(1,2)</span></div>
  <div><span class="lbl">Type </span><span class="v" id="i-type">SPINDLE</span></div>
  <div><span class="lbl">L<sub>θ</sub>/L<sub>φ</sub> = </span><span class="v" id="i-r">6.60</span></div>
  <div><span class="lbl">Path = </span><span class="v" id="i-path">—</span><span class="lbl"> λ<sub>C</sub></span></div>
  <div><span class="lbl">Slope = </span><span class="v" id="i-slope">—</span></div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}}
</script>
<script type="module">
import {
  THREE, createScene, autoResize, buildTorusGeom,
  torusPt, torusPathGeom, createPhoton, torusMaterials, PALETTE
} from './totu-viz.js';

const $ = id => document.getElementById(id);
const R = 1.0, FIT = 2.2;

const state = {
  aR: 6.60, p: 1, q: 2, speed: 1.0,
  showSurface: true, showPath: true, showPhoton: true,
};

/* ── 3D View ──────────────────────────────────────────── */

const { scene, camera, renderer, controls, clock } = createScene($('view-3d'));
autoResize(renderer, camera, $('view-3d'));

const world = new THREE.Group();
scene.add(world);

const mats = torusMaterials();
const pathMat = new THREE.MeshPhongMaterial({
  color: PALETTE.path, emissive: 0x661800, shininess: 80,
});
let torusMesh, wireMesh, pathMesh;

const photon = createPhoton();
world.add(photon.mesh);

function rebuild3D() {
  const a = state.aR * R;
  const gs = FIT / (R + a);
  world.scale.setScalar(gs);

  if (torusMesh) { torusMesh.geometry.dispose(); world.remove(torusMesh); }
  if (wireMesh)  { wireMesh.geometry.dispose();  world.remove(wireMesh); }
  if (pathMesh)  { pathMesh.geometry.dispose();  world.remove(pathMesh); }

  torusMesh = new THREE.Mesh(buildTorusGeom(R, a), mats.surface);
  wireMesh  = new THREE.Mesh(buildTorusGeom(R, a), mats.wire);
  pathMesh  = new THREE.Mesh(
    torusPathGeom(R, a, state.p, state.q, { tubeR: 0.02 / gs }),
    pathMat
  );

  torusMesh.visible = state.showSurface;
  wireMesh.visible  = state.showSurface;
  pathMesh.visible  = state.showPath;
  photon.mesh.visible = state.showPhoton;

  world.add(torusMesh, wireMesh, pathMesh);
  photon.mesh.scale.setScalar(0.05 / gs);
  photon.glow.distance = 3 / gs;
}

/* ── 2D Flat View ─────────────────────────────────────── */

const flatCanvas = $('flat-canvas');
const ctx = flatCanvas.getContext('2d');

function draw2D(phase) {
  const W = flatCanvas.width, H = flatCanvas.height;
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, W, H);

  const { p, q, aR } = state;
  const r = aR;

  const pad = 40 * dpr, labelPad = 20 * dpr;
  const availW = W - 2 * pad, availH = H - 2 * pad - labelPad;
  const scale = Math.min(availW / 1.0, availH / r);
  const rectW = scale * 1.0, rectH = scale * r;
  const ox = (W - rectW) / 2, oy = (H - rectH) / 2;

  ctx.strokeStyle = '#2a2a3a'; ctx.lineWidth = 1 * dpr;
  const gridN_phi = 8, gridN_theta = Math.max(2, Math.round(8 * r));
  for (let i = 0; i <= gridN_phi; i++) {
    const x = ox + (i / gridN_phi) * rectW;
    ctx.beginPath(); ctx.moveTo(x, oy); ctx.lineTo(x, oy + rectH); ctx.stroke();
  }
  for (let i = 0; i <= gridN_theta; i++) {
    const y = oy + (i / gridN_theta) * rectH;
    ctx.beginPath(); ctx.moveTo(ox, y); ctx.lineTo(ox + rectW, y); ctx.stroke();
  }

  ctx.lineWidth = 2 * dpr;
  ctx.strokeStyle = '#e05050';
  ctx.setLineDash([6 * dpr, 4 * dpr]);
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox, oy + rectH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox + rectW, oy); ctx.lineTo(ox + rectW, oy + rectH); ctx.stroke();
  ctx.strokeStyle = '#50b0e0';
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox + rectW, oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, oy + rectH); ctx.lineTo(ox + rectW, oy + rectH); ctx.stroke();
  ctx.setLineDash([]);

  const arrowSize = 8 * dpr;
  ctx.fillStyle = '#e05050';
  drawArrow(ctx, ox, oy + rectH * 0.5, 0, -1, arrowSize);
  drawArrow(ctx, ox + rectW, oy + rectH * 0.5, 0, -1, arrowSize);
  ctx.fillStyle = '#50b0e0';
  drawArrow(ctx, ox + rectW * 0.5, oy, 1, 0, arrowSize);
  drawArrow(ctx, ox + rectW * 0.5, oy + rectH, 1, 0, arrowSize);

  ctx.font = `${12 * dpr}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e05050';
  ctx.fillText('L_φ  →', ox + rectW / 2, oy + rectH + 18 * dpr);
  ctx.save();
  ctx.translate(ox - 14 * dpr, oy + rectH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#50b0e0';
  ctx.fillText('L_θ  →', 0, 0);
  ctx.restore();

  ctx.strokeStyle = '#ff6e40'; ctx.lineWidth = 2.5 * dpr; ctx.globalAlpha = 0.9;
  const steps = 2000;
  let prevX = null, prevY = null;
  for (let i = 0; i <= steps; i++) {
    const frac = i / steps;
    const wx = (frac * q) % 1.0;
    const wy = (frac * p * r) % r;
    const sx = ox + wx * rectW;
    const sy = oy + rectH - wy * (rectH / r);
    if (prevX !== null) {
      const dx = Math.abs(sx - prevX), dy = Math.abs(sy - prevY);
      if (dx < rectW * 0.5 && dy < rectH * 0.5) {
        ctx.beginPath(); ctx.moveTo(prevX, prevY); ctx.lineTo(sx, sy); ctx.stroke();
      }
    }
    prevX = sx; prevY = sy;
  }
  ctx.globalAlpha = 1.0;

  if (state.showPhoton) {
    const totalAngle = 2 * Math.PI * q;
    const t = phase % totalAngle;
    const frac = t / totalAngle;
    const wx = (frac * q) % 1.0;
    const wy = (frac * p * r) % r;
    const sx = ox + wx * rectW;
    const sy = oy + rectH - wy * (rectH / r);

    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 18 * dpr);
    grad.addColorStop(0, 'rgba(253, 216, 53, 0.6)');
    grad.addColorStop(1, 'rgba(253, 216, 53, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(sx, sy, 18 * dpr, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fdd835';
    ctx.beginPath(); ctx.arc(sx, sy, 5 * dpr, 0, Math.PI * 2); ctx.fill();
  }

  ctx.font = `${10 * dpr}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = '#555'; ctx.textAlign = 'left';
  ctx.fillText('(0, 0)', ox + 4 * dpr, oy + rectH - 4 * dpr);
}

function drawArrow(ctx, x, y, dx, dy, size) {
  ctx.beginPath();
  ctx.moveTo(x + dy * size * 0.5, y - dx * size * 0.5);
  ctx.lineTo(x + dx * size, y + dy * size);
  ctx.lineTo(x - dy * size * 0.5, y + dx * size * 0.5);
  ctx.closePath(); ctx.fill();
}

/* ── Info Panel ───────────────────────────────────────── */

function updateInfo() {
  const { aR, p, q: q_ } = state;
  const pathLen = Math.sqrt((q_ * 1) ** 2 + (p * aR) ** 2);
  const slope = (p * aR) / q_;

  $('i-ar').textContent = aR.toFixed(2);
  $('i-knot').textContent = `(${p},${q_})`;
  $('i-r').textContent = aR.toFixed(2);
  $('i-path').textContent = pathLen.toFixed(3);
  $('i-slope').textContent = slope.toFixed(3);

  const ty = $('i-type');
  if (aR < 0.999) { ty.textContent = 'RING'; ty.style.color = '#81c784'; }
  else if (aR < 1.001) { ty.textContent = 'HORN'; ty.style.color = '#ffb74d'; }
  else { ty.textContent = 'SPINDLE'; ty.style.color = '#ef9a9a'; }
}

/* ── Controls ─────────────────────────────────────────── */

$('ar').addEventListener('input', e => {
  state.aR = parseFloat(e.target.value);
  $('ar-v').textContent = state.aR.toFixed(2);
  document.querySelectorAll('[data-v]').forEach(b => b.classList.remove('on'));
  rebuild3D(); updateInfo();
});

$('speed').addEventListener('input', e => {
  state.speed = parseFloat(e.target.value);
  $('speed-v').textContent = state.speed.toFixed(1);
});

document.querySelectorAll('[data-v]').forEach(btn => {
  btn.addEventListener('click', () => {
    state.aR = parseFloat(btn.dataset.v);
    $('ar').value = state.aR; $('ar-v').textContent = state.aR.toFixed(2);
    document.querySelectorAll('[data-v]').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    rebuild3D(); updateInfo();
  });
});

document.querySelectorAll('.knot').forEach(btn => {
  btn.addEventListener('click', () => {
    state.p = parseInt(btn.dataset.p); state.q = parseInt(btn.dataset.q);
    document.querySelectorAll('.knot').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    rebuild3D(); updateInfo();
  });
});

$('t-surface').addEventListener('change', e => {
  state.showSurface = e.target.checked;
  if (torusMesh) torusMesh.visible = state.showSurface;
  if (wireMesh) wireMesh.visible = state.showSurface;
});
$('t-path').addEventListener('change', e => {
  state.showPath = e.target.checked;
  if (pathMesh) pathMesh.visible = state.showPath;
});
$('t-photon').addEventListener('change', e => {
  state.showPhoton = e.target.checked;
  photon.mesh.visible = state.showPhoton;
});

/* ── Resize ───────────────────────────────────────────── */

function resize2D() {
  const dpr = window.devicePixelRatio || 1;
  const v2 = $('view-2d');
  flatCanvas.width = v2.clientWidth * dpr;
  flatCanvas.height = v2.clientHeight * dpr;
  flatCanvas.style.width = v2.clientWidth + 'px';
  flatCanvas.style.height = v2.clientHeight + 'px';
}
window.addEventListener('resize', resize2D);
resize2D();

/* ── Animation ────────────────────────────────────────── */

rebuild3D();
updateInfo();

(function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const elapsed = clock.getElapsedTime() * state.speed;
  const a = state.aR * R;
  const totalAngle = 2 * Math.PI * state.q;
  const phase = elapsed % totalAngle;

  if (photon.mesh.visible) {
    const pt = torusPt(phase, R, a, state.p, state.q);
    photon.mesh.position.copy(pt);
  }

  renderer.render(scene, camera);
  draw2D(phase);
})();

</script>
</body>
</html>
