<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R8 Multi-Winding Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0e0e12; color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden; display: flex; flex-direction: column;
  height: 100vh;
}

#top-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px;
  background: rgba(10,10,18,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0; flex-wrap: wrap;
}
#top-bar h1 { font-size: 14px; color: #ccc; font-weight: 600; margin-right: 4px; }

.ctrl-group { display: flex; align-items: center; gap: 5px; }
.ctrl-group label { font-size: 11px; color: #888; white-space: nowrap; }
.ctrl-group .val { color: #4fc3f7; font-weight: 700; font-size: 12px; min-width: 28px; text-align: right; }
input[type=range] {
  -webkit-appearance: none; width: 100px; height: 4px; border-radius: 3px;
  background: #2a2a3a; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
  background: #4fc3f7; cursor: pointer;
}
.pbtn {
  background: #1e1e2e; border: 1px solid #333; color: #aaa; padding: 2px 7px;
  border-radius: 4px; font-size: 10px; cursor: pointer; white-space: nowrap;
}
.pbtn:hover { background: #2a2a40; color: #ddd; border-color: #4fc3f7; }
.pbtn.active { background: #1a3050; border-color: #4fc3f7; color: #4fc3f7; }
.toggle label { font-size: 11px; cursor: pointer; color: #bbb; }
.toggle input { margin-right: 2px; accent-color: #4fc3f7; }
.sep { width: 1px; height: 22px; background: #333; flex-shrink: 0; }

#row2 {
  display: flex; align-items: center; gap: 12px;
  padding: 6px 16px;
  background: rgba(10,10,18,0.92);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0; flex-wrap: wrap;
}

#main { display: flex; flex: 1; min-height: 0; }
#view-3d { flex: 1; position: relative; }
#view-3d canvas { display: block; width: 100%; height: 100%; }
#view-2d {
  flex: 1; position: relative;
  border-left: 1px solid rgba(255,255,255,0.08);
}
#flat-canvas { display: block; width: 100%; height: 100%; }
.view-label {
  position: absolute; top: 8px; left: 12px;
  font-size: 11px; color: #555; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  pointer-events: none;
}

#info-panel {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(10,10,18,0.9); padding: 8px 16px; border-radius: 8px;
  backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.06);
  font-size: 11px; display: flex; gap: 14px; flex-wrap: wrap;
  justify-content: center; max-width: 96vw;
  z-index: 10;
}
.info-item .lbl { color: #777; }
.info-item .v { color: #4fc3f7; font-weight: 700; }
.info-item .warn { color: #ef5350; font-weight: 700; }
.info-item .ok { color: #66bb6a; font-weight: 700; }
</style>
</head>
<body>

<div id="top-bar">
  <h1>R8 Multi-Winding</h1>
  <div class="sep"></div>

  <div class="ctrl-group">
    <label>a/R</label>
    <input type="range" id="sl-ar" min="0.05" max="3" step="0.01" value="0.34">
    <span class="val" id="v-ar">0.34</span>
  </div>
  <div class="ctrl-group" style="gap:3px">
    <button class="pbtn ar-btn active" data-v="0.34">R8</button>
    <button class="pbtn ar-btn" data-v="1.00">Horn</button>
    <button class="pbtn ar-btn" data-v="0.10">Thin</button>
  </div>

  <div class="sep"></div>

  <div class="ctrl-group">
    <label>Speed</label>
    <input type="range" id="sl-speed" min="0.1" max="5" step="0.1" value="1.0">
    <span class="val" id="v-speed">1.0</span>
  </div>

  <div class="toggle"><label><input type="checkbox" id="t-surface" checked> Surface</label></div>
  <div class="toggle"><label><input type="checkbox" id="t-path" checked> Path</label></div>
  <div class="toggle"><label><input type="checkbox" id="t-photon" checked> Photon</label></div>
</div>

<div id="row2">
  <div class="ctrl-group">
    <label>q (major)</label>
    <input type="range" id="sl-q" min="2" max="21" step="1" value="2">
    <span class="val" id="v-q">2</span>
  </div>
  <div class="ctrl-group">
    <label>p (minor)</label>
    <input type="range" id="sl-p" min="1" max="10" step="1" value="1">
    <span class="val" id="v-p">1</span>
  </div>
  <div class="sep"></div>
  <div class="ctrl-group">
    <label>Shear</label>
    <input type="checkbox" id="t-shear">
    <span class="val" id="v-shear" style="min-width:50px; font-size:10px; color:#888">off</span>
  </div>
  <div class="sep"></div>
  <div class="ctrl-group" style="gap:3px">
    <button class="pbtn wbtn" data-p="1" data-q="2" data-s="0">(1,2)</button>
    <button class="pbtn wbtn" data-p="2" data-q="4" data-s="0">(2,4) ✗</button>
    <button class="pbtn wbtn" data-p="3" data-q="6" data-s="0">(3,6) ✗</button>
    <button class="pbtn wbtn" data-p="1" data-q="3" data-s="0">(1,3)</button>
    <button class="pbtn wbtn" data-p="3" data-q="7" data-s="0">(3,7)</button>
    <button class="pbtn wbtn" data-p="5" data-q="11" data-s="1">(5,11)+δ</button>
    <button class="pbtn wbtn" data-p="7" data-q="15" data-s="1">(7,15)+δ</button>
    <button class="pbtn wbtn" data-p="9" data-q="19" data-s="1">(9,19)+δ</button>
  </div>
</div>

<div id="main">
  <div id="view-3d">
    <canvas id="c3d"></canvas>
    <div class="view-label">3D Torus</div>
  </div>
  <div id="view-2d">
    <canvas id="flat-canvas"></canvas>
    <div class="view-label">Flat T² (compact space)</div>
  </div>
</div>

<div id="info-panel">
  <div class="info-item"><span class="lbl">Knot </span><span class="v" id="i-knot">(1,2)</span></div>
  <div class="info-item"><span class="lbl">gcd = </span><span class="v" id="i-gcd">1</span></div>
  <div class="info-item"><span class="lbl">Loops: </span><span class="v" id="i-loops">1</span></div>
  <div class="info-item"><span class="lbl">Ratio p/q = </span><span class="v" id="i-ratio">0.500</span></div>
  <div class="info-item"><span class="lbl">Physical = </span><span class="v" id="i-phys">0.500</span></div>
  <div class="info-item"><span class="lbl">Spin </span><span class="v" id="i-spin">½</span></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ── State ─────────────────────────────────────────────── */

const S = { aR: 0.34, p: 1, q: 2, speed: 1, shear: false,
            showSurface: true, showPath: true, showPhoton: true };

const R_U = 1.0;
const FIT = 2.2;
const PATH_N = 1200;
const TORUS_U = 64, TORUS_V = 128;

function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while(b){[a,b]=[b,a%b];} return a; }

const LOOP_COLORS_3D = [0xff6e40,0x42a5f5,0x66bb6a,0xab47bc,0xffca28,0xef5350,0x26c6da,0xff7043];
const LOOP_COLORS_2D = ['#ff6e40','#42a5f5','#66bb6a','#ab47bc','#ffca28','#ef5350','#26c6da','#ff7043'];

/* ── 3D Scene ──────────────────────────────────────────── */

const c3d = document.getElementById('c3d');
const renderer = new THREE.WebGLRenderer({ canvas: c3d, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e0e12);

const cam = new THREE.PerspectiveCamera(45, 1, 0.01, 200);
cam.position.set(2.5, 1.8, 3.5);

const orbit = new OrbitControls(cam, c3d);
orbit.enableDamping = true; orbit.dampingFactor = 0.07;

scene.add(new THREE.AmbientLight(0x606070, 1.5));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(4, 6, 5); scene.add(sun);

const world = new THREE.Group();
scene.add(world);

const surfMat = new THREE.MeshPhongMaterial({
  color: 0x4fc3f7, transparent: true, opacity: 0.3,
  side: THREE.DoubleSide, depthWrite: false, shininess: 60,
});
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x4fc3f7, wireframe: true, transparent: true, opacity: 0.05,
  side: THREE.DoubleSide,
});

let surfMesh, wireSurf;
let pathMeshes = [];

function buildTorusGeom(a) {
  const pos = [], idx = [];
  for (let i = 0; i <= TORUS_U; i++) {
    const th = (i / TORUS_U) * Math.PI * 2;
    const ct = Math.cos(th), st = Math.sin(th);
    for (let j = 0; j <= TORUS_V; j++) {
      const ph = (j / TORUS_V) * Math.PI * 2;
      const rr = R_U + a * ct;
      pos.push(rr * Math.cos(ph), a * st, rr * Math.sin(ph));
    }
  }
  for (let i = 0; i < TORUS_U; i++)
    for (let j = 0; j < TORUS_V; j++) {
      const a_ = i * (TORUS_V + 1) + j, b_ = a_ + TORUS_V + 1;
      idx.push(a_, b_, a_ + 1, b_, b_ + 1, a_ + 1);
    }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setIndex(idx); g.computeVertexNormals();
  return g;
}

function pt3d(t, a, p_eff, q_val) {
  const phi = q_val * t, theta = p_eff * t;
  const rr = R_U + a * Math.cos(theta);
  return new THREE.Vector3(rr * Math.cos(phi), a * Math.sin(theta), rr * Math.sin(phi));
}

function buildPathGeom(a, p_eff, q_val, closePath) {
  const pts = [];
  for (let i = 0; i <= PATH_N; i++) {
    const t = (i / PATH_N) * 2 * Math.PI;
    pts.push(pt3d(t, a, p_eff, q_val));
  }
  const curve = new THREE.CatmullRomCurve3(pts, closePath);
  const gs = FIT / (R_U + a);
  return new THREE.TubeGeometry(curve, PATH_N, Math.max(0.008, 0.02 / gs), 5, closePath);
}

const photonGeo = new THREE.SphereGeometry(0.05, 16, 12);
const photonMat = new THREE.MeshBasicMaterial({ color: 0xfdd835 });
const photon3d = new THREE.Mesh(photonGeo, photonMat);
const glow = new THREE.PointLight(0xfdd835, 2, 3);
photon3d.add(glow);
world.add(photon3d);

function rebuild3D() {
  const a = S.aR * R_U;
  const gs = FIT / (R_U + a);
  world.scale.setScalar(gs);

  if (surfMesh) { surfMesh.geometry.dispose(); world.remove(surfMesh); }
  if (wireSurf) { wireSurf.geometry.dispose(); world.remove(wireSurf); }
  pathMeshes.forEach(m => { m.geometry.dispose(); world.remove(m); });
  pathMeshes = [];

  const tg = buildTorusGeom(a);
  surfMesh = new THREE.Mesh(tg, surfMat);
  wireSurf = new THREE.Mesh(tg, wireMat);
  surfMesh.visible = S.showSurface;
  wireSurf.visible = S.showSurface;
  world.add(surfMesh); world.add(wireSurf);

  const g = gcd(S.p, S.q);
  const p0 = S.p / g, q0 = S.q / g;

  for (let i = 0; i < g; i++) {
    const col = LOOP_COLORS_3D[i % LOOP_COLORS_3D.length];
    const mat = new THREE.MeshPhongMaterial({ color: col, emissive: new THREE.Color(col).multiplyScalar(0.3), shininess: 80 });

    const pts = [];
    const t_off = (2 * Math.PI * i) / (g * q0);
    for (let j = 0; j <= PATH_N; j++) {
      const t = t_off + (j / PATH_N) * 2 * Math.PI;
      pts.push(pt3d(t, a, p0, q0));
    }
    const curve = new THREE.CatmullRomCurve3(pts, true);
    const tubeR = Math.max(0.008, 0.02 / gs);
    const geom2 = new THREE.TubeGeometry(curve, PATH_N, tubeR, 5, true);
    const mesh2 = new THREE.Mesh(geom2, mat);
    mesh2.visible = S.showPath;
    world.add(mesh2);
    pathMeshes.push(mesh2);
  }

  photon3d.scale.setScalar(Math.max(0.03, 0.05 / gs));
  glow.distance = 3 / gs;
  photon3d.visible = S.showPhoton;
}

/* ── 2D Flat View ──────────────────────────────────────── */

const fc = document.getElementById('flat-canvas');
const ctx = fc.getContext('2d');

function draw2D(phase) {
  const W = fc.width, H = fc.height;
  const dpr = devicePixelRatio || 1;
  ctx.clearRect(0, 0, W, H);

  const { p, q, aR, shear } = S;
  const r = aR;
  const g = gcd(p, q);
  const delta = shear ? 1 / (2 * q) : 0; // δ/L_θ

  const pad = 36 * dpr;
  const avW = W - 2 * pad, avH = H - 2 * pad - 16 * dpr;

  // Aspect: φ horizontal (width 1), θ vertical (height = r in normalized units)
  // But if r is very small, scale so rectangle is visible
  const dispR = Math.max(r, 0.15);
  const scX = avW / 1.0, scY = avH / dispR;
  const sc = Math.min(scX, scY);
  const rW = sc * 1.0, rH = sc * dispR;
  const ox = (W - rW) / 2, oy = (H - rH) / 2;

  // Shear offset in pixels
  const shearPx = delta * (rH / dispR) * r; // δ/L_θ × (pixels per θ-unit) × L_θ_in_dispR_units
  // Actually: delta is δ/L_θ. In normalized coords (θ in [0,1]), delta is the shift per φ-period.
  // On screen: one θ-unit = rH / dispR. delta shift in screen pixels:
  const shearScreen = delta * rH;

  // Grid
  ctx.strokeStyle = '#1e1e2e';
  ctx.lineWidth = 1 * dpr;
  for (let i = 0; i <= 8; i++) {
    const x = ox + (i / 8) * rW;
    const s = (i / 8) * shearScreen;
    ctx.beginPath(); ctx.moveTo(x, oy - s); ctx.lineTo(x, oy + rH - s); ctx.stroke();
  }
  const nG = Math.max(2, Math.round(8 * dispR));
  for (let i = 0; i <= nG; i++) {
    const frac = i / nG;
    const y = oy + rH - frac * rH;
    ctx.beginPath(); ctx.moveTo(ox, y); ctx.lineTo(ox + rW, y - shearScreen); ctx.stroke();
  }

  // Parallelogram border
  ctx.lineWidth = 2 * dpr;
  // Left/right edges (φ identification)
  ctx.strokeStyle = '#e05050';
  ctx.setLineDash([5 * dpr, 3 * dpr]);
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox, oy + rH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox + rW, oy - shearScreen); ctx.lineTo(ox + rW, oy + rH - shearScreen); ctx.stroke();
  // Top/bottom edges (θ identification)
  ctx.strokeStyle = '#50b0e0';
  ctx.beginPath(); ctx.moveTo(ox, oy + rH); ctx.lineTo(ox + rW, oy + rH - shearScreen); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox + rW, oy - shearScreen); ctx.stroke();
  ctx.setLineDash([]);

  // Shear annotation
  if (shear && delta > 0.001) {
    ctx.strokeStyle = '#ffca28';
    ctx.lineWidth = 1.5 * dpr;
    ctx.setLineDash([3 * dpr, 2 * dpr]);
    const xR = ox + rW + 4 * dpr;
    ctx.beginPath(); ctx.moveTo(xR, oy); ctx.lineTo(xR, oy - shearScreen); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ffca28';
    ctx.font = `${9 * dpr}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('δ', xR + 3 * dpr, oy - shearScreen / 2 + 3 * dpr);
  }

  // Labels
  ctx.font = `${11 * dpr}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e05050';
  ctx.fillText('φ  (major circle)', ox + rW / 2, oy + rH + 16 * dpr);
  ctx.save();
  ctx.translate(ox - 14 * dpr, oy + rH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#50b0e0';
  ctx.fillText('θ  (minor circle)', 0, 0);
  ctx.restore();

  // ── Draw geodesic paths ──
  const p0 = p / g, q0 = q / g;
  const steps = Math.max(2000, q * 200);

  for (let loop = 0; loop < g; loop++) {
    const col = LOOP_COLORS_2D[loop % LOOP_COLORS_2D.length];
    ctx.strokeStyle = col;
    ctx.lineWidth = (g === 1 ? 2 : 1.8) * dpr;
    ctx.globalAlpha = g === 1 ? 0.85 : 0.75;

    const theta_off = loop / g; // offset in normalized θ [0,1]

    let prevSx = null, prevSy = null;
    for (let i = 0; i <= steps; i++) {
      const frac = i / steps;
      // On the universal cover: this sub-path is a (p0, q0) geodesic
      const rawPhi = frac * q0;  // in units of L_φ
      const rawTheta = theta_off + frac * p0; // in units of L_θ

      // Fold into fundamental domain
      const nPhi = Math.floor(rawPhi);
      const phiLocal = rawPhi - nPhi;
      let thetaLocal = rawTheta - nPhi * delta;
      thetaLocal = thetaLocal - Math.floor(thetaLocal);

      // Map to screen
      const sx = ox + phiLocal * rW;
      const thetaFrac = thetaLocal; // 0..1
      // θ increases upward from bottom of rectangle
      const baseY = oy + rH - thetaFrac * rH;
      const sy = baseY + phiLocal * shearScreen; // shear tilt

      if (prevSx !== null) {
        const dx = Math.abs(sx - prevSx), dy = Math.abs(sy - prevSy);
        if (dx < rW * 0.4 && dy < rH * 0.4) {
          ctx.beginPath(); ctx.moveTo(prevSx, prevSy);
          ctx.lineTo(sx, sy); ctx.stroke();
        }
      }
      prevSx = sx; prevSy = sy;
    }
  }
  ctx.globalAlpha = 1.0;

  // ── Photon dot ──
  if (S.showPhoton) {
    const totalAng = 2 * Math.PI * q;
    const t = phase % totalAng;
    const frac = t / totalAng;

    const rawPhi = frac * q;
    const rawTheta = frac * p;
    const nPhi = Math.floor(rawPhi);
    const phiLocal = rawPhi - nPhi;
    let thetaLocal = rawTheta - nPhi * delta;
    thetaLocal = thetaLocal - Math.floor(thetaLocal);

    const sx = ox + phiLocal * rW;
    const baseY = oy + rH - thetaLocal * rH;
    const sy = baseY + phiLocal * shearScreen;

    // Glow
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 16 * dpr);
    grad.addColorStop(0, 'rgba(253,216,53,0.6)');
    grad.addColorStop(1, 'rgba(253,216,53,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(sx, sy, 16 * dpr, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fdd835';
    ctx.beginPath(); ctx.arc(sx, sy, 4 * dpr, 0, Math.PI * 2); ctx.fill();
  }

  // ── Status annotation ──
  ctx.font = `${12 * dpr}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'center';
  const cx = W / 2;
  const ty = oy - 22 * dpr;
  if (g > 1) {
    ctx.fillStyle = '#ef5350';
    ctx.fillText(`gcd(${p},${q}) = ${g}  →  ${g} disconnected loops`, cx, ty);
    ctx.font = `${10 * dpr}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = '#999';
    ctx.fillText(`Each loop is a (${p/g},${q/g}) knot — path never covers the full torus`, cx, ty + 14 * dpr);
  } else if (shear && Math.abs((p + 0.5) / q - 0.5) < 0.001) {
    ctx.fillStyle = '#66bb6a';
    ctx.fillText(`Single path, coprime (${p},${q}) — physical ratio exactly ½`, cx, ty);
    ctx.font = `${10 * dpr}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = '#ffca28';
    ctx.fillText(`Shear δ/L_θ = 1/${2*q} shifts each pass by δ → spin-½ exact`, cx, ty + 14 * dpr);
  } else if (g === 1) {
    const ratio = p / q;
    ctx.fillStyle = '#66bb6a';
    let msg = `Single path, coprime (${p},${q})`;
    if (Math.abs(ratio - 0.5) < 0.001) msg += ' — ratio exactly ½, spin-½';
    ctx.fillText(msg, cx, ty);
  }
}

/* ── Info Panel ─────────────────────────────────────────── */

function updateInfo() {
  const { p, q, shear } = S;
  const g = gcd(p, q);
  const delta = shear ? 1 / (2 * q) : 0;
  const latticeRatio = p / q;
  const physRatio = (p + q * delta) / q;

  document.getElementById('i-knot').textContent = `(${p},${q})`;

  const gcdEl = document.getElementById('i-gcd');
  gcdEl.textContent = g;
  gcdEl.className = g === 1 ? 'v ok' : 'v warn';

  const loopEl = document.getElementById('i-loops');
  loopEl.textContent = g === 1 ? '1 ✓' : `${g} ✗`;
  loopEl.className = g === 1 ? 'v ok' : 'v warn';

  document.getElementById('i-ratio').textContent = latticeRatio.toFixed(4);

  const physEl = document.getElementById('i-phys');
  physEl.textContent = physRatio.toFixed(4);

  const spinEl = document.getElementById('i-spin');
  if (g > 1) {
    spinEl.textContent = `✗ (${g} loops)`;
    spinEl.className = 'v warn';
  } else if (Math.abs(physRatio - 0.5) < 0.0001) {
    spinEl.textContent = '½ exact';
    spinEl.className = 'v ok';
  } else if (Math.abs(physRatio - 0.5) < 0.05) {
    spinEl.textContent = `≈½ (${(physRatio * 2).toFixed(3)}/2)`;
    spinEl.className = 'v';
  } else {
    const num = p + (shear ? 0.5 : 0);
    spinEl.textContent = `${num}/${q}`;
    spinEl.className = 'v';
  }
}

/* ── Controls ──────────────────────────────────────────── */

function setAR(v) {
  S.aR = v;
  document.getElementById('sl-ar').value = v;
  document.getElementById('v-ar').textContent = v.toFixed(2);
  rebuild3D(); updateInfo();
}

function setWinding(p, q, shear) {
  S.p = p; S.q = q;
  S.shear = !!shear;
  document.getElementById('sl-p').value = p;
  document.getElementById('sl-p').max = Math.max(10, q - 1);
  document.getElementById('sl-q').value = Math.min(q, 21);
  document.getElementById('v-p').textContent = p;
  document.getElementById('v-q').textContent = q;
  document.getElementById('t-shear').checked = S.shear;
  updateShearLabel();
  rebuild3D(); updateInfo();
}

function updateShearLabel() {
  const el = document.getElementById('v-shear');
  if (S.shear) {
    const d = 1 / (2 * S.q);
    el.textContent = `δ/Lθ = 1/${2 * S.q}`;
    el.style.color = '#ffca28';
  } else {
    el.textContent = 'off';
    el.style.color = '#888';
  }
}

document.getElementById('sl-ar').addEventListener('input', e => {
  S.aR = parseFloat(e.target.value);
  document.getElementById('v-ar').textContent = S.aR.toFixed(2);
  document.querySelectorAll('.ar-btn').forEach(b => b.classList.remove('active'));
  rebuild3D(); updateInfo();
});

document.querySelectorAll('.ar-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ar-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setAR(parseFloat(btn.dataset.v));
  });
});

document.getElementById('sl-q').addEventListener('input', e => {
  S.q = parseInt(e.target.value);
  document.getElementById('v-q').textContent = S.q;
  document.getElementById('sl-p').max = Math.max(10, S.q - 1);
  if (S.p >= S.q) { S.p = S.q - 1; document.getElementById('sl-p').value = S.p; document.getElementById('v-p').textContent = S.p; }
  document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('active'));
  updateShearLabel();
  rebuild3D(); updateInfo();
});

document.getElementById('sl-p').addEventListener('input', e => {
  S.p = parseInt(e.target.value);
  document.getElementById('v-p').textContent = S.p;
  document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('active'));
  rebuild3D(); updateInfo();
});

document.getElementById('sl-speed').addEventListener('input', e => {
  S.speed = parseFloat(e.target.value);
  document.getElementById('v-speed').textContent = S.speed.toFixed(1);
});

document.getElementById('t-shear').addEventListener('change', e => {
  S.shear = e.target.checked;
  updateShearLabel();
  rebuild3D(); updateInfo();
});

document.getElementById('t-surface').addEventListener('change', e => {
  S.showSurface = e.target.checked;
  if (surfMesh) surfMesh.visible = S.showSurface;
  if (wireSurf) wireSurf.visible = S.showSurface;
});
document.getElementById('t-path').addEventListener('change', e => {
  S.showPath = e.target.checked;
  pathMeshes.forEach(m => m.visible = S.showPath);
});
document.getElementById('t-photon').addEventListener('change', e => {
  S.showPhoton = e.target.checked;
  photon3d.visible = S.showPhoton;
});

document.querySelectorAll('.wbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setWinding(parseInt(btn.dataset.p), parseInt(btn.dataset.q), parseInt(btn.dataset.s));
  });
});

/* ── Resize ────────────────────────────────────────────── */

function resize() {
  const v3 = document.getElementById('view-3d');
  renderer.setSize(v3.clientWidth, v3.clientHeight);
  cam.aspect = v3.clientWidth / v3.clientHeight;
  cam.updateProjectionMatrix();

  const dpr = devicePixelRatio || 1;
  const v2 = document.getElementById('view-2d');
  fc.width = v2.clientWidth * dpr;
  fc.height = v2.clientHeight * dpr;
  fc.style.width = v2.clientWidth + 'px';
  fc.style.height = v2.clientHeight + 'px';
}

window.addEventListener('resize', resize);

/* ── Animation ─────────────────────────────────────────── */

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  orbit.update();

  const elapsed = clock.getElapsedTime() * S.speed;
  const a = S.aR * R_U;
  const totalAng = 2 * Math.PI * S.q;
  const phase = elapsed % totalAng;

  if (photon3d.visible) {
    const pt = pt3d(phase, a, S.p, S.q);
    photon3d.position.copy(pt);
  }

  renderer.render(scene, cam);
  draw2D(phase);
}

/* ── Init ──────────────────────────────────────────────── */

resize();
rebuild3D();
updateInfo();
updateShearLabel();
animate();

</script>
</body>
</html>
