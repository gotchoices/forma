<h2 id="what-this-is-not">What this is <em>not</em></h2>
<ul>
<li><strong>Not a competitor to the Standard Model.</strong> The SM is confirmed to 12 decimal places. Nothing here contradicts it.</li>
<li><strong>Not &quot;quantum gravity.&quot;</strong> No strings, no loops, no supersymmetry.</li>
<li><strong>Not a claim of truth.</strong> The numbers are suggestive, but coincidence and selection bias are live possibilities. The code is open so others can check.</li>
</ul>
<h2 id="what-this-is">What this <em>is</em></h2>
<p>A geometric model in which particles are <strong>standing electromagnetic waves</strong> on a compact 6-dimensional torus, and the SM's free parameters are outputs of the geometry rather than inputs.</p>
</section>

<h2 id="what-the-standard-model-leaves-open">What the Standard Model leaves open</h2>
<div class="tight">
<ul>
<li>~<strong>19 dimensionless parameters</strong> (masses, mixing angles, couplings) — measured, not explained</li>
<li><strong>Why three generations</strong> of matter?</li>
<li><strong>Why charge is quantized</strong> in integer multiples of e?</li>
<li><strong>Why the proton is three quarks</strong> (not two, not four)?</li>
<li><strong>α = 1/137</strong> — where does this number come from?</li>
<li><strong>Dark matter</strong> — no candidate in SM field content</li>
<li><strong>Matter/antimatter asymmetry</strong> from the Big Bang?</li>
<li><strong>Gravity</strong> — not in the SM at all</li>
</ul>
<p>This deck shows which of these MaSt addresses geometrically — and where it also falls short.</p>
</div>

<h2 id="the-core-move">The core move</h2>
<p>A free photon has energy <code>E = hf</code> and momentum <code>p = E/c</code>, but <strong>no rest mass</strong> — it never sits still.</p>

<h2 id="the-arena-11-degrees-11%C3%9711-metric">The arena: 11 degrees (11×11 metric)</h2>

<p><strong>Block order in the 11D metric (base directions 1…11):</strong><br />

<h2 id="the-11-base-blocks">The 11 base blocks</h2>

<h2 id="spin-the-standard-model-taxonomy-falls-out">Spin: the Standard Model taxonomy falls out</h2>
<p>Each active sheet hosts a spin-½ Dirac–Kähler tower (R62 derivation 7d).<br />
Compound modes compose via SU(2) angular-momentum addition:</p>
<table>
<thead>
<tr>
<th style="text-align:center">Active sheets</th>
<th style="text-align:left">SU(2) composition</th>
<th style="text-align:center">Spin</th>
<th style="text-align:left">SM class</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center"><strong>1</strong></td>
<td style="text-align:left">½</td>
<td style="text-align:center">½</td>
<td style="text-align:left"><strong>Lepton</strong></td>
</tr>
<tr>
<td style="text-align:center"><strong>2</strong></td>
<td style="text-align:left">½ ⊗ ½ = {0, 1}</td>
<td style="text-align:center">0 or 1</td>
<td style="text-align:left"><strong>Meson</strong> (scalar / vector)</td>
</tr>
<tr>
<td style="text-align:center"><strong>3</strong></td>
<td style="text-align:left">½ ⊗ ½ ⊗ ½ = {½, ³⁄₂}</td>
<td style="text-align:center">½ or ³⁄₂</td>
<td style="text-align:left"><strong>Baryon</strong> (octet / decuplet)</td>
</tr>

</table>
<p>Every row of the spectrum table satisfies this — sheet count and spin match in all 16 non-input particles. <strong>The taxonomy is derived, not postulated.</strong></p>

<h2 id="the-proton-is-three-things-z%E2%82%83-confinement">The proton is three things (Z₃ confinement)</h2>
<p>A single (1, 2) mode on the proton sheet carries a <strong>2ω density fluctuation</strong> the embedding can't stably support.</p>
<p><strong>Three copies at 120° phase offsets cancel the fluctuation exactly.</strong><br />
N = 3 is the minimum count that works (R60 Track 16).</p>
<p>Selection rule: only modes with <code>n_pt ≡ 0 (mod 3)</code> are free.<br />
The free proton mode is (3, 6) — a three-quark composite. Bare (1, 2) quarks are <strong>never</strong> free.</p>
<p>This reproduces QCD's &quot;only color singlets propagate&quot; rule from pure geometry, without SU(3) or color.</p>
<p><strong>Electron sheet is exempt:</strong> localization ratio <code>R_loc = m_e · L_er / ℏc &lt; 1</code>, so the electron is delocalized across the whole sheet and local phase coherence between copies can't form. Electron stays a free (1, 2).</p>
</section>

<h2 id="not-just-fits--a-derivation-chain">Not just fits — a derivation chain</h2>
<div class="tight">
<p><strong>D1</strong> Photon in a box → rest mass m = nh/(2Lc); m = inertial mass<br />
<strong>D2</strong> Kaluza-Klein on T² → two U(1)'s, Lorentz force, shear<br />
<strong>D3</strong> Mass formula m²c² = hᵃᵇ Pₐ Pᵦ from null condition on T² embedding<br />
<strong>D4</strong> MaSt formula μ² = (n_t/ε)² + (n_r − s·n_t)² — derived, not postulated<br />
<strong>D5</strong> Charge = tube Killing momentum; Q = -n₁ + n₅<br />
<strong>D6</strong> Lorentz force on the standing wave (minimal coupling derived)<br />
<strong>D7d</strong> Per-sheet Dirac–Kähler → spin ½ / sheet → SM taxonomy<br />
<strong>D8</strong> T⁴ with cross-shears; Schur-complement mass mixing<br />
<strong>D9</strong> KK-on-torus is scale-invariant — no Planck pinning<br />
<strong>D10</strong> Full T⁶ with three sheets — universal Q = e(−n₁ + n₅)<br />
<strong>D11</strong> Magnetic moment: g_e = 2 (tree), g_p = 6 = 3μ_N (tree)</p>
</div>
<p>Inputs: special relativity, E = hf, standing-wave boundary conditions, differential geometry. <strong>No QFT. No Lagrangians. No gauge groups postulated.</strong></p>

<li>α remains the one measured coupling; ε₀, μ₀, e all derive from it</li>

<li><strong>0νββ signal at |m_ββ| ~ 10–30 meV</strong> — within reach of KamLAND-Zen and LEGEND.</li>

<li><strong>Normal ν ordering</strong> — inverted hierarchy is geometrically excluded.</li>
<li><strong>No new fundamental particles</strong> below 2 GeV outside the 16-entry inventory.</li>
</ul>
<p>Falsifiable; reproducible numerics; open code.</p>
